<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173f38">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NZ English">
  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="Korean-to-English recall practice for real New Zealand life and work">
  <title>NZ Self-Thinking English</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
:root {
  color-scheme: light;
  --ink: #17312d;
  --muted: #60716d;
  --paper: #fffdf8;
  --canvas: #f0f5ef;
  --green: #176b5b;
  --green-dark: #0f5145;
  --mint: #dcece6;
  --gold: #e9b44c;
  --line: #d6e1dc;
  --danger: #a4453f;
  --shadow: 0 12px 30px rgba(20, 60, 52, 0.09);
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-width: 280px;
  background: linear-gradient(180deg, #e5f0eb 0, var(--canvas) 260px);
  color: var(--ink);
  line-height: 1.55;
  overflow-wrap: anywhere;
  -webkit-text-size-adjust: 100%;
}

button, input, select { font: inherit; }
button { touch-action: manipulation; }

.topbar, main, footer {
  width: min(100% - 28px, 920px);
  margin-inline: auto;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: max(22px, env(safe-area-inset-top)) 0 18px;
}

.eyebrow { margin: 0; color: var(--green); font-size: .72rem; font-weight: 800; letter-spacing: .14em; }
h1 { margin: 2px 0 0; font-family: Georgia, serif; font-size: clamp(1.45rem, 6vw, 2.25rem); line-height: 1.1; }

.search-panel, .practice-card, .result-card {
  background: rgba(255, 253, 248, .96);
  border: 1px solid rgba(214, 225, 220, .9);
  border-radius: 20px;
  box-shadow: var(--shadow);
}

.search-panel { padding: 18px; }
.search-panel label { display: block; margin-bottom: 8px; font-weight: 750; }
.search-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }

input, select {
  min-height: 46px;
  width: 100%;
  border: 1px solid #b9cbc4;
  border-radius: 12px;
  background: #fff;
  color: var(--ink);
  padding: 10px 12px;
  font-size: 16px;
}

input:focus, select:focus, button:focus-visible { outline: 3px solid rgba(233, 180, 76, .55); outline-offset: 2px; }

.button {
  min-height: 44px;
  border: 0;
  border-radius: 12px;
  background: var(--green);
  color: white;
  padding: 10px 14px;
  font-weight: 750;
  cursor: pointer;
}
.button:hover { background: var(--green-dark); }
.button:disabled { cursor: not-allowed; opacity: .48; }
.button--secondary { background: var(--mint); color: var(--green-dark); }
.button--secondary:hover { background: #c8e0d7; }
.button--quiet { min-height: 38px; border: 1px solid #b8d0c6; background: rgba(255,255,255,.55); color: var(--green-dark); white-space: nowrap; }

.suggestions { display: flex; gap: 7px; margin-top: 11px; overflow-x: auto; scrollbar-width: none; }
.suggestion { flex: none; border: 1px solid var(--line); border-radius: 999px; background: white; color: var(--muted); padding: 6px 10px; font-size: .82rem; }

.mode-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 18px 0 10px; padding: 5px; border-radius: 14px; background: #dfe9e4; }
.mode-tab { min-height: 42px; border: 0; border-radius: 10px; background: transparent; color: var(--muted); font-weight: 750; }
.mode-tab.is-active { background: var(--paper); color: var(--green-dark); box-shadow: 0 2px 9px rgba(20,60,52,.1); }

.toolbar { display: grid; grid-template-columns: auto 1fr; gap: 8px; align-items: center; }
.toolbar .button { min-width: 0; }
.select-label { font-size: .86rem; font-weight: 700; color: var(--muted); }
.status { min-height: 1.5em; margin: 14px 2px 8px; color: var(--muted); font-size: .88rem; }

.practice-card { padding: 22px 19px; }
.card-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 16px; }
.badge, .type-badge { display: inline-flex; align-items: center; border-radius: 999px; background: var(--mint); color: var(--green-dark); padding: 4px 9px; font-size: .76rem; font-weight: 800; }
.card-number { color: var(--muted); font-size: .8rem; }
.prompt-label, .answer-label { margin: 0 0 5px; color: var(--muted); font-size: .78rem; font-weight: 800; letter-spacing: .06em; }
.ko-prompt { margin: 0 0 21px; font-size: clamp(1.25rem, 5vw, 1.7rem); font-weight: 800; line-height: 1.45; word-break: keep-all; }
.answer { border-top: 1px solid var(--line); padding-top: 18px; }
.english { margin: 0 0 16px; font-family: Georgia, serif; font-size: 1.2rem; line-height: 1.5; }
.detail { margin-top: 14px; padding: 13px; border-radius: 12px; background: #f3f7f4; }
.detail strong { display: block; margin-bottom: 3px; color: var(--green-dark); font-size: .83rem; }
.detail p { margin: 0; }
.script-thought { margin: -10px 0 21px; color: var(--ink); font-size: 1rem; word-break: keep-all; }
.thinking-steps { margin: 6px 0 0; padding-left: 1.25rem; }
.thinking-steps li + li { margin-top: 3px; }
.card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 18px; }
.reveal-button { grid-column: 1 / -1; }
.rating-hard { background: #f7e5e3; color: var(--danger); }
.rating-good { background: var(--mint); color: var(--green-dark); }

.results-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 18px 2px 10px; }
.results-header h2 { margin: 0; font-size: 1.1rem; }
.text-button { border: 0; background: transparent; color: var(--green); font-weight: 750; }
.result-list { display: grid; gap: 12px; }
.result-card { padding: 17px; }
.result-head { display: flex; gap: 7px; align-items: center; margin-bottom: 10px; }
.match-reason { color: var(--muted); font-size: .78rem; }
.result-card h3 { margin: 0 0 8px; font-size: 1.05rem; word-break: keep-all; }
.result-card .english { font-size: 1.02rem; }
.result-grid { display: grid; gap: 8px; }
.result-field { padding-top: 8px; border-top: 1px solid var(--line); }
.result-field dt { color: var(--green-dark); font-size: .75rem; font-weight: 800; }
.result-field dd { margin: 2px 0 0; }
.empty { padding: 30px 16px; border: 1px dashed #aec2ba; border-radius: 16px; text-align: center; color: var(--muted); }

footer { padding: 25px 0 calc(30px + env(safe-area-inset-bottom)); color: var(--muted); text-align: center; font-size: .82rem; }
[hidden] { display: none !important; }

@media (min-width: 620px) {
  .toolbar { grid-template-columns: auto minmax(130px, 1fr) auto minmax(150px, 1fr) auto auto; }
  .practice-card { padding: 30px; }
  .result-grid { grid-template-columns: 1fr 1fr; }
  .result-field:last-child { grid-column: 1 / -1; }
}

@media (max-width: 380px) {
  .topbar { align-items: flex-start; }
  .button--quiet { padding-inline: 9px; font-size: .82rem; }
  .toolbar { grid-template-columns: auto 1fr; }
  .toolbar .button { font-size: .84rem; padding-inline: 8px; }
}

</style>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">MY REAL NZ ENGLISH</p>
      <h1>Self-Thinking Trainer</h1>
    </div>
    <button id="exportButton" class="button button--quiet" type="button">Anki CSV</button>
  </header>

  <main>
    <section class="search-panel" aria-label="상황 검색">
      <label for="searchInput">지금 영어로 말하고 싶은 상황</label>
      <div class="search-row">
        <input id="searchInput" type="search" inputmode="search" autocomplete="off" placeholder="예: 염도 측정 안됨">
        <button id="searchButton" class="button" type="button">검색</button>
      </div>
      <div id="suggestions" class="suggestions" aria-label="검색 예시"></div>
    </section>

    <nav class="mode-tabs" aria-label="연습 모드">
      <button class="mode-tab is-active" data-mode="recall" type="button">떠올리기</button>
      <button class="mode-tab" data-mode="speaking" type="button">말하기</button>
      <button class="mode-tab" data-mode="writing" type="button">쓰기 확장</button>
    </nav>

    <section class="toolbar" aria-label="연습 설정">
      <label class="select-label" for="contentFilter">자료</label>
      <select id="contentFilter">
        <option value="cards">전체 카드</option>
        <option value="daily">핵심 50</option>
        <option value="scripts">스크립트 연습</option>
      </select>
      <label class="select-label" for="topicFilter">주제</label>
      <select id="topicFilter"><option value="all">전체 주제</option></select>
      <button id="randomButton" class="button button--secondary" type="button">랜덤 연습</button>
      <button id="reviewButton" class="button button--secondary" type="button">복습 <span id="reviewCount">0</span></button>
    </section>

    <p id="status" class="status" role="status" aria-live="polite">앱을 준비하는 중…</p>
    <section id="practiceArea" class="practice-area" aria-label="연습 카드"></section>
    <section id="searchResults" class="results" aria-label="검색 결과" hidden></section>
  </main>

  <footer>
    <p>한국어 생각부터 시작하세요. 완벽함보다 실제로 쓸 수 있는 한 문장.</p>
  </footer>

  <script>
"use strict";

const TRAINER_DATA = {"topics":[{"id":"qc","labelKo":"QC·염도·pH","labelEn":"QC and lab checks","icon":"🧪","descriptionKo":"염도, pH, 전극, 질산은, 도징 팁, 샘플 상태와 재검","aliases":["QC","품질관리","식품 품질","염도","pH","전극","실버 나이트레이트","질산은","샘플","재검"]},{"id":"temperature","labelKo":"칠러·공정 온도","labelEn":"Chiller and process temperature","icon":"🌡️","descriptionKo":"칠러와 공정 온도 확인, 기록, 이탈과 후속 조치","aliases":["칠러","냉각기","공정 온도","온도 기록","온도 로그","냉장","temperature"]},{"id":"haccp","labelKo":"HACCP·식품안전","labelEn":"HACCP and food safety","icon":"✅","descriptionKo":"위해요소, 평가, 시정조치, 현장 사례와 증거","aliases":["HACCP","해썹","식품안전","심사","평가","시정조치","corrective action","audit"]},{"id":"nz-life","labelKo":"NZ 생활·서비스","labelEn":"New Zealand life and services","icon":"🇳🇿","descriptionKo":"전화, 인터넷, 전기, 주문, 서비스 문의와 플랜 비교","aliases":["뉴질랜드 생활","NZ 생활","서비스 문의","모바일","인터넷","전기","주문","요금제","플랜 비교"]},{"id":"child-family","labelKo":"아이·가족 결정","labelEn":"Child activities and family decisions","icon":"🎾","descriptionKo":"테니스, 로보틱스, 게임과 현실적인 가족 결정","aliases":["아이","자녀","어린이","테니스","로보틱스","로봇","게임","가족 결정","방과후 활동"]},{"id":"study","labelKo":"영어 공부·회상","labelEn":"English study and recall","icon":"🎧","descriptionKo":"오디오북, Anki, 한국어에서 영어로 떠올리기","aliases":["영어 공부","오디오북","안키","Anki","회상","말하기 연습","듣기","플래시카드"]},{"id":"problem-solving","labelKo":"문제 해결·다음 단계","labelEn":"Problem solving and next steps","icon":"🔎","descriptionKo":"추측을 피하고 변수를 하나씩 확인해 현실적인 다음 단계 선택","aliases":["문제 해결","트러블슈팅","원인 확인","변수","추측 금지","다음 단계","점검"]},{"id":"workplace","labelKo":"업무 이메일·보고","labelEn":"Workplace messages and reporting","icon":"✉️","descriptionKo":"업체 문의, 교육 질문, 이슈 보고와 후속 이메일","aliases":["업무 이메일","회사 메일","업체","공급업체","가격 문의","견적","교육 질문","이슈 보고","supplier"]},{"id":"career","labelKo":"커리어·포트폴리오","labelEn":"Career and portfolio","icon":"🧭","descriptionKo":"기술 경험 구조화, 포트폴리오, 역량과 다음 커리어 단계","aliases":["커리어","포트폴리오","기술 성장","PLC","시스템 통합","경력","이직","역량"]},{"id":"wellbeing","labelKo":"자기관리·멘탈","labelEn":"Self-management and wellbeing","icon":"🌱","descriptionKo":"하루 우선순위, 감정 조절, 꾸준한 실행과 생각 정리","aliases":["자기관리","멘탈","하루 정리","우선순위","꾸준함","감정 조절","마음 관리"]}],"patterns":[{"id":"p01","pattern":"The ___ looks unusual, so I need to check it again.","explanationKo":"결과가 평소와 달라 재확인이 필요할 때 쓰는 기본형.","exampleKo":"측정값이 이상해서 다시 확인해야겠다.","exampleEn":"The reading looks unusual, so I need to check it again.","topicIds":["qc","temperature"],"tags":["unusual","recheck"],"searchKeywords":["측정 이상","값 이상","다시 확인","재검"]},{"id":"p02","pattern":"I'm not getting ___ from ___.","explanationKo":"장비나 용액에서 기대한 출력이 나오지 않을 때.","exampleKo":"도징 팁에서 질산은이 나오지 않는다.","exampleEn":"I'm not getting any silver nitrate from the dosing tip.","topicIds":["qc"],"tags":["no-output","equipment"],"searchKeywords":["실버나이트레 안 나와","질산은 안나옴","도징 팁 문제"]},{"id":"p03","pattern":"Could you check whether ___ is ___?","explanationKo":"상대에게 한 가지 상태를 정중히 확인해 달라고 할 때.","exampleKo":"튜브가 막혔는지 확인해 줄래요?","exampleEn":"Could you check whether the tube is blocked?","topicIds":["qc","workplace"],"tags":["request","check"],"searchKeywords":["확인 요청","막힘 확인","체크 부탁"]},{"id":"p04","pattern":"Before I retest it, I'll ___.","explanationKo":"재검 전에 먼저 할 조치를 순서대로 말할 때.","exampleKo":"재검하기 전에 전극을 헹구겠다.","exampleEn":"Before I retest it, I'll rinse the electrode.","topicIds":["qc","problem-solving"],"tags":["retest","sequence"],"searchKeywords":["전극 린싱","재검 전","헹군 뒤 재시험"]},{"id":"p05","pattern":"The sample may have been affected by ___.","explanationKo":"샘플 결과에 영향을 준 가능성을 조심스럽게 말할 때.","exampleKo":"샘플이 실온에 있었던 시간의 영향을 받았을 수 있다.","exampleEn":"The sample may have been affected by the time it spent at room temperature.","topicIds":["qc"],"tags":["sample-condition","cause"],"searchKeywords":["샘플 상온 방치","시료 실온","샘플 상태 영향"]},{"id":"p06","pattern":"I got ___ on the first test and ___ on the retest.","explanationKo":"첫 결과와 재검 결과를 명확히 비교 보고할 때.","exampleKo":"첫 검사에서는 2.1, 재검에서는 2.4가 나왔다.","exampleEn":"I got 2.1 on the first test and 2.4 on the retest.","topicIds":["qc"],"tags":["results","comparison"],"searchKeywords":["첫 검사 재검 비교","결과 비교","재시험 값"]},{"id":"p07","pattern":"The ___ was outside the expected range.","explanationKo":"허용 또는 예상 범위를 벗어난 결과를 객관적으로 말할 때.","exampleKo":"pH가 예상 범위를 벗어났다.","exampleEn":"The pH was outside the expected range.","topicIds":["qc","temperature"],"tags":["out-of-range","result"],"searchKeywords":["범위 벗어남","기준 이탈","pH 이상"]},{"id":"p08","pattern":"I rinsed ___ with ___ and checked it again.","explanationKo":"세척 방법과 재확인을 한 문장으로 기록할 때.","exampleKo":"전극을 탈이온수로 헹군 뒤 다시 확인했다.","exampleEn":"I rinsed the electrode with deionised water and checked it again.","topicIds":["qc"],"tags":["rinse","electrode"],"searchKeywords":["전극 린싱","전극 세척","deionised water"]},{"id":"p09","pattern":"There may be an issue with ___.","explanationKo":"원인을 단정하지 않고 특정 부품의 문제 가능성을 제시할 때.","exampleKo":"도징 팁에 문제가 있을 수 있다.","exampleEn":"There may be an issue with the dosing tip.","topicIds":["qc","problem-solving"],"tags":["possible-issue","cautious"],"searchKeywords":["장비 문제 가능성","도징 팁 고장","원인 추정"]},{"id":"p10","pattern":"Let's rule out ___ first.","explanationKo":"여러 원인 중 하나를 먼저 배제하며 점검할 때.","exampleKo":"먼저 샘플 온도의 영향을 배제하자.","exampleEn":"Let's rule out the sample temperature first.","topicIds":["qc","problem-solving"],"tags":["rule-out","troubleshooting"],"searchKeywords":["하나씩 확인","원인 배제","변수 점검"]},{"id":"p11","pattern":"The temperature was ___ at ___.","explanationKo":"온도와 측정 시각 또는 위치를 함께 기록하는 형태.","exampleKo":"오전 9시에 칠러 온도는 4.2도였다.","exampleEn":"The chiller temperature was 4.2 degrees at 9 a.m.","topicIds":["temperature"],"tags":["temperature","record"],"searchKeywords":["칠러 온도 기록","몇 시 온도","온도 로그"]},{"id":"p12","pattern":"I noticed that ___ had risen to ___.","explanationKo":"온도가 올라간 사실을 발견했을 때 변화 중심으로 보고.","exampleKo":"공정 온도가 8도까지 올라간 것을 확인했다.","exampleEn":"I noticed that the process temperature had risen to 8 degrees.","topicIds":["temperature"],"tags":["temperature-rise","observation"],"searchKeywords":["온도 상승","공정 온도 높음","칠러 올라감"]},{"id":"p13","pattern":"It returned to ___ after ___.","explanationKo":"조치 후 정상 상태로 돌아온 결과를 말할 때.","exampleKo":"문을 닫은 뒤 온도가 4도로 돌아왔다.","exampleEn":"It returned to 4 degrees after the door was closed.","topicIds":["temperature","problem-solving"],"tags":["recovery","after-action"],"searchKeywords":["온도 정상 복귀","조치 후","다시 내려감"]},{"id":"p14","pattern":"The record is missing for ___.","explanationKo":"특정 시간대나 항목의 기록 누락을 명확히 알릴 때.","exampleKo":"오후 점검 기록이 빠져 있다.","exampleEn":"The record is missing for the afternoon check.","topicIds":["temperature","haccp"],"tags":["missing-record","documentation"],"searchKeywords":["온도 기록 누락","로그 빠짐","기록 없음"]},{"id":"p15","pattern":"Could we confirm how long ___ was ___?","explanationKo":"노출 시간이나 지속 시간을 함께 확인하자고 제안할 때.","exampleKo":"제품이 칠러 밖에 얼마나 오래 있었는지 확인할까요?","exampleEn":"Could we confirm how long the product was outside the chiller?","topicIds":["temperature","qc"],"tags":["duration","confirm"],"searchKeywords":["밖에 있던 시간","상온 시간","노출 시간"]},{"id":"p16","pattern":"The control measure is to ___.","explanationKo":"HACCP 관리 수단을 간단하고 직접적으로 설명할 때.","exampleKo":"관리 수단은 제품 온도를 한계값 이하로 유지하는 것이다.","exampleEn":"The control measure is to keep the product temperature below the limit.","topicIds":["haccp"],"tags":["control-measure","haccp"],"searchKeywords":["관리 수단","HACCP 조치","위해 관리"]},{"id":"p17","pattern":"If ___ happens, we need to ___.","explanationKo":"이탈 조건과 필수 조치를 연결하는 실무형 조건문.","exampleKo":"한계 기준을 벗어나면 제품을 보류해야 한다.","exampleEn":"If the critical limit is exceeded, we need to place the product on hold.","topicIds":["haccp","temperature"],"tags":["condition","corrective-action"],"searchKeywords":["기준 이탈 시","시정조치","제품 보류"]},{"id":"p18","pattern":"The immediate action was to ___.","explanationKo":"문제 발견 직후 취한 조치를 기록할 때.","exampleKo":"즉시 취한 조치는 영향을 받은 제품을 분리하는 것이었다.","exampleEn":"The immediate action was to isolate the affected product.","topicIds":["haccp","workplace"],"tags":["immediate-action","report"],"searchKeywords":["즉시 조치","현장 대응","제품 격리"]},{"id":"p19","pattern":"To prevent this from happening again, we will ___.","explanationKo":"재발 방지 계획을 구체적인 미래 행동으로 말할 때.","exampleKo":"재발 방지를 위해 점검표를 수정하겠다.","exampleEn":"To prevent this from happening again, we will update the checklist.","topicIds":["haccp","workplace"],"tags":["prevention","corrective-action"],"searchKeywords":["재발 방지","예방 조치","체크리스트 수정"]},{"id":"p20","pattern":"A practical workplace example would be ___.","explanationKo":"추상적인 식품안전 개념에 실제 현장 예를 붙일 때.","exampleKo":"현장 예로는 알레르겐 교체 후 라벨을 확인하는 것이 있다.","exampleEn":"A practical workplace example would be checking the label after an allergen changeover.","topicIds":["haccp"],"tags":["workplace-example","assessment"],"searchKeywords":["현장 사례","평가 예시","HACCP 예"]},{"id":"p21","pattern":"The evidence we can provide is ___.","explanationKo":"심사나 평가에서 제시할 기록·증거를 설명할 때.","exampleKo":"제시할 수 있는 증거는 완료된 온도 기록이다.","exampleEn":"The evidence we can provide is the completed temperature record.","topicIds":["haccp","workplace"],"tags":["evidence","assessment"],"searchKeywords":["심사 증거","제출 기록","assessment evidence"]},{"id":"p22","pattern":"I'd like to ask about ___.","explanationKo":"서비스나 활동에 관한 문의를 자연스럽게 시작하는 문장.","exampleKo":"어린이 테니스 레슨에 대해 문의하고 싶어요.","exampleEn":"I'd like to ask about tennis lessons for children.","topicIds":["nz-life","child-family","workplace"],"tags":["inquiry","opening"],"searchKeywords":["문의 시작","물어보고 싶다","아이 테니스 문의"]},{"id":"p23","pattern":"Could you tell me whether ___ is included?","explanationKo":"요금제나 서비스에 특정 항목이 포함되는지 확인할 때.","exampleKo":"이 플랜에 데이터 공유가 포함되는지 알려 주세요.","exampleEn":"Could you tell me whether data sharing is included?","topicIds":["nz-life"],"tags":["included","plan"],"searchKeywords":["포함 여부","요금제 문의","플랜 구성"]},{"id":"p24","pattern":"I'm comparing ___ with ___.","explanationKo":"두 서비스·옵션을 비교 중임을 먼저 밝힐 때.","exampleKo":"모바일 결합 플랜과 별도 플랜을 비교하고 있다.","exampleEn":"I'm comparing the mobile bundle with separate plans.","topicIds":["nz-life","child-family"],"tags":["comparison","options"],"searchKeywords":["모바일 인터넷 전기 비교","플랜 비교","두 옵션"]},{"id":"p25","pattern":"What would the total monthly cost be?","explanationKo":"할인까지 반영한 실제 월 총비용을 물을 때.","exampleKo":"월 총비용은 얼마인가요?","exampleEn":"What would the total monthly cost be?","topicIds":["nz-life"],"tags":["cost","monthly"],"searchKeywords":["월 비용","총 요금","가격 비교"]},{"id":"p26","pattern":"My phone has been ___ since ___.","explanationKo":"전화나 서비스 문제의 증상과 시작 시점을 함께 설명.","exampleKo":"어제부터 전화 수신이 되지 않는다.","exampleEn":"My phone has been unable to receive calls since yesterday.","topicIds":["nz-life"],"tags":["phone-problem","since"],"searchKeywords":["전화 안됨","수신 문제","폰 문제"]},{"id":"p27","pattern":"I've already tried ___, but ___.","explanationKo":"이미 해 본 조치와 남은 문제를 고객지원에 전달할 때.","exampleKo":"휴대폰을 재시작했지만 문제는 그대로다.","exampleEn":"I've already tried restarting the phone, but the problem is still there.","topicIds":["nz-life","problem-solving"],"tags":["tried","still-problem"],"searchKeywords":["이미 해봄","재시작 했지만","문제 그대로"]},{"id":"p28","pattern":"Can I change ___ without ___?","explanationKo":"불이익이나 중단 없이 변경 가능한지 확인할 때.","exampleKo":"위약금 없이 플랜을 바꿀 수 있나요?","exampleEn":"Can I change plans without paying an early termination fee?","topicIds":["nz-life"],"tags":["change-plan","condition"],"searchKeywords":["플랜 변경","위약금 없이","서비스 바꾸기"]},{"id":"p29","pattern":"We're considering ___ for our child.","explanationKo":"아이를 위한 활동이나 선택을 가족 관점에서 소개할 때.","exampleKo":"아이에게 로보틱스 수업을 시켜 볼까 생각 중이다.","exampleEn":"We're considering robotics classes for our child.","topicIds":["child-family"],"tags":["considering","child"],"searchKeywords":["아이 활동 고민","로보틱스 수업","가족 결정"]},{"id":"p30","pattern":"Is the class suitable for ___?","explanationKo":"나이·수준·경험에 맞는 수업인지 문의할 때.","exampleKo":"이 수업이 초보자에게 적합한가요?","exampleEn":"Is the class suitable for a complete beginner?","topicIds":["child-family"],"tags":["suitable","class"],"searchKeywords":["초보 적합","아이 수업 수준","테니스 레슨 문의"]},{"id":"p31","pattern":"We need to balance ___ with ___.","explanationKo":"가족 결정에서 두 가지 현실적 요소를 균형 있게 고려할 때.","exampleKo":"아이의 관심과 주간 일정을 함께 고려해야 한다.","exampleEn":"We need to balance our child's interest with the weekly schedule.","topicIds":["child-family","problem-solving"],"tags":["balance","decision"],"searchKeywords":["가족 결정","일정 고려","비용과 관심"]},{"id":"p32","pattern":"Let's try it for ___ and then decide.","explanationKo":"짧은 시험 기간 뒤 결정하자는 부담 적은 제안.","exampleKo":"한 학기 해 보고 결정하자.","exampleEn":"Let's try it for one term and then decide.","topicIds":["child-family","problem-solving"],"tags":["trial","decision"],"searchKeywords":["먼저 해보기","한 학기 체험","나중에 결정"]},{"id":"p33","pattern":"I want to practise turning ___ into ___.","explanationKo":"학습 목표를 ‘무엇에서 무엇으로’ 바꾸는 연습으로 표현.","exampleKo":"한국어 생각을 자연스러운 영어로 바꾸는 연습을 하고 싶다.","exampleEn":"I want to practise turning my Korean thoughts into natural English.","topicIds":["study"],"tags":["recall","goal"],"searchKeywords":["한국어 영어 회상","생각 영어로","영작 연습"]},{"id":"p34","pattern":"I can understand it, but I can't recall it quickly.","explanationKo":"이해는 되지만 즉시 말로 나오지 않는 학습 문제를 표현.","exampleKo":"이해는 하지만 빨리 떠올리지 못한다.","exampleEn":"I can understand it, but I can't recall it quickly.","topicIds":["study"],"tags":["recall-gap","speaking"],"searchKeywords":["알지만 안 나옴","영어 회상 느림","말이 안 나와"]},{"id":"p35","pattern":"I listen to ___ while ___.","explanationKo":"오디오북 같은 듣기 습관을 일상 행동과 연결할 때.","exampleKo":"운전하는 동안 영어 오디오북을 듣는다.","exampleEn":"I listen to an English audiobook while driving.","topicIds":["study"],"tags":["audiobook","habit"],"searchKeywords":["영어 오디오북 공부","운전 중 듣기","듣기 습관"]},{"id":"p36","pattern":"This card is useful because I can use it when ___.","explanationKo":"카드를 실제 사용 상황과 연결해 기억할 때.","exampleKo":"이 카드는 업체에 가격을 물을 때 쓸 수 있어서 유용하다.","exampleEn":"This card is useful because I can use it when I ask a supplier for pricing.","topicIds":["study","workplace"],"tags":["anki","context"],"searchKeywords":["안키 카드","실전 문장","사용 상황"]},{"id":"p37","pattern":"Instead of memorising ___, I'll practise ___.","explanationKo":"수동 암기 대신 실제 회상·발화 행동을 선택할 때.","exampleKo":"단어만 외우는 대신 문장 전체를 떠올리는 연습을 하겠다.","exampleEn":"Instead of memorising isolated words, I'll practise recalling the whole sentence.","topicIds":["study","problem-solving"],"tags":["study-method","practice"],"searchKeywords":["암기 대신 회상","문장 연습","공부 방법"]},{"id":"p38","pattern":"Let's check one variable at a time.","explanationKo":"추측을 줄이기 위해 변수를 하나씩 점검하자는 핵심 문제 해결 문장.","exampleKo":"변수를 한 번에 하나씩 확인하자.","exampleEn":"Let's check one variable at a time.","topicIds":["problem-solving","qc"],"tags":["one-variable","method"],"searchKeywords":["변수 하나씩","한 가지씩 확인","체계적 점검"]},{"id":"p39","pattern":"We don't have enough information to conclude that ___.","explanationKo":"증거가 부족할 때 성급한 결론을 막는 표현.","exampleKo":"아직 장비 고장이라고 결론 내릴 정보가 충분하지 않다.","exampleEn":"We don't have enough information to conclude that the equipment has failed.","topicIds":["problem-solving","qc"],"tags":["evidence","no-conclusion"],"searchKeywords":["추측 금지","근거 부족","단정 못함"]},{"id":"p40","pattern":"The next practical step is to ___.","explanationKo":"지금 바로 할 수 있는 현실적인 다음 행동을 정할 때.","exampleKo":"다음 현실적인 단계는 새 샘플로 재검하는 것이다.","exampleEn":"The next practical step is to retest with a fresh sample.","topicIds":["problem-solving","qc"],"tags":["next-step","practical"],"searchKeywords":["다음 단계","현실적 조치","뭘 먼저"]},{"id":"p41","pattern":"First, I'll check ___. If that's fine, I'll check ___.","explanationKo":"점검 순서를 두 단계로 간결하게 설명할 때.","exampleKo":"먼저 연결부를 확인하고 괜찮으면 시약을 확인하겠다.","exampleEn":"First, I'll check the connection. If that's fine, I'll check the reagent.","topicIds":["problem-solving","qc"],"tags":["sequence","troubleshooting"],"searchKeywords":["점검 순서","먼저 다음","문제 해결 순서"]},{"id":"p42","pattern":"Could you please provide a price for ___?","explanationKo":"업체에 제품이나 서비스 가격·견적을 정중히 요청할 때.","exampleKo":"교체용 전극 가격을 알려 주시겠어요?","exampleEn":"Could you please provide a price for a replacement electrode?","topicIds":["workplace"],"tags":["supplier","price"],"searchKeywords":["업체에 가격 문의","견적 요청","supplier quote"]},{"id":"p43","pattern":"Could you confirm the lead time for ___?","explanationKo":"주문 전 납기나 준비 기간을 확인할 때.","exampleKo":"배송 납기를 확인해 주시겠어요?","exampleEn":"Could you confirm the lead time for delivery?","topicIds":["workplace"],"tags":["lead-time","supplier"],"searchKeywords":["납기 문의","배송 기간","언제 도착"]},{"id":"p44","pattern":"I'm writing to report ___.","explanationKo":"업무 이메일에서 이슈 보고 목적을 첫 문장에 분명히 밝힐 때.","exampleKo":"오늘 아침 확인된 온도 이탈을 보고드립니다.","exampleEn":"I'm writing to report a temperature deviation identified this morning.","topicIds":["workplace","temperature"],"tags":["email","report"],"searchKeywords":["업무 이메일로 보고","이슈 보고 메일","문제 알리기"]},{"id":"p45","pattern":"For your information, ___.","explanationKo":"상대가 알아야 할 진행 상황을 부담 없이 공유할 때.","exampleKo":"참고로 해당 제품은 현재 보류 중입니다.","exampleEn":"For your information, the affected product is currently on hold.","topicIds":["workplace"],"tags":["fyi","update"],"searchKeywords":["참고로 알림","업데이트 공유","상황 전달"]},{"id":"p46","pattern":"Could you clarify what is meant by ___?","explanationKo":"교육이나 지침에서 모호한 용어를 정중히 질문할 때.","exampleKo":"‘적절한 모니터링’이 무엇을 뜻하는지 설명해 주시겠어요?","exampleEn":"Could you clarify what is meant by 'adequate monitoring'?","topicIds":["workplace","haccp"],"tags":["training","clarify"],"searchKeywords":["교육 질문","뜻 확인","지침 문의"]},{"id":"p47","pattern":"My understanding is that ___. Is that correct?","explanationKo":"내 이해를 먼저 말하고 맞는지 확인해 오해를 줄일 때.","exampleKo":"제 이해로는 매 배치마다 기록해야 합니다. 맞나요?","exampleEn":"My understanding is that we need to record it for every batch. Is that correct?","topicIds":["workplace","haccp"],"tags":["confirm-understanding","training"],"searchKeywords":["이해 확인","제가 이해한 게 맞나요","교육 내용 확인"]},{"id":"p48","pattern":"I've attached ___ for your review.","explanationKo":"검토할 파일이나 기록을 첨부했다고 알릴 때.","exampleKo":"검토를 위해 완료된 기록을 첨부했습니다.","exampleEn":"I've attached the completed record for your review.","topicIds":["workplace"],"tags":["attachment","email"],"searchKeywords":["파일 첨부","검토 요청","기록 보냄"]},{"id":"p49","pattern":"Please let me know if you need any further information.","explanationKo":"업무 메일을 협조적으로 마무리하는 범용 표현.","exampleKo":"추가 정보가 필요하시면 알려 주세요.","exampleEn":"Please let me know if you need any further information.","topicIds":["workplace"],"tags":["email-closing","information"],"searchKeywords":["업무 이메일 마무리","추가 정보","회신 요청"]},{"id":"p50","pattern":"Based on ___, I recommend ___.","explanationKo":"근거를 먼저 제시하고 실용적인 제안을 할 때.","exampleKo":"현재 결과를 바탕으로 새 샘플로 한 번 더 검사할 것을 제안한다.","exampleEn":"Based on the current results, I recommend one more test with a fresh sample.","topicIds":["workplace","problem-solving","qc"],"tags":["recommendation","evidence"],"searchKeywords":["근거로 제안","추천 조치","보고 의견"]},{"id":"p51","pattern":"I need to ___ before ___.","explanationKo":"결정이나 행동 전에 먼저 확인해야 할 일을 말하는 핵심형.","exampleKo":"결론을 내리기 전에 원인을 확인해야 한다.","exampleEn":"I need to check the cause before I draw a conclusion.","topicIds":["problem-solving","qc","career"],"tags":["need-to","sequence"],"searchKeywords":["먼저 해야 한다","확인 필요","전에"]},{"id":"p52","pattern":"I should / shouldn't ___.","explanationKo":"내가 취해야 하거나 피해야 할 행동을 스스로 정리할 때.","exampleKo":"추측에 의존하면 안 된다.","exampleEn":"I shouldn't rely on guesswork.","topicIds":["problem-solving","study","wellbeing"],"tags":["self-direction","should"],"searchKeywords":["해야 한다","하면 안 된다","스스로 다짐"]},{"id":"p53","pattern":"The first step is to ___.","explanationKo":"복잡한 상황에서 첫 행동을 명확히 정할 때.","exampleKo":"첫 단계는 증상을 명확히 정의하는 것이다.","exampleEn":"The first step is to define the symptom clearly.","topicIds":["problem-solving","qc"],"tags":["first-step","process"],"searchKeywords":["첫 단계","먼저 할 일","시작"]},{"id":"p54","pattern":"If ___, it may / can ___.","explanationKo":"조건이 결과에 미칠 가능성을 단정하지 않고 설명할 때.","exampleKo":"샘플을 오래 두면 결과가 달라질 수 있다.","exampleEn":"If the sample is left too long, the result may change.","topicIds":["qc","temperature","child-family"],"tags":["condition","possibility"],"searchKeywords":["하면 달라질 수 있다","조건","가능성"]},{"id":"p55","pattern":"What matters is ___.","explanationKo":"여러 요소 중 판단의 핵심을 한 문장으로 좁힐 때.","exampleKo":"중요한 것은 기준을 넘은 시간이다.","exampleEn":"What matters is how long it stayed above the limit.","topicIds":["temperature","career","child-family"],"tags":["key-point","priority"],"searchKeywords":["중요한 건","핵심은","결국"]},{"id":"p56","pattern":"It is better to ___ than to ___.","explanationKo":"두 행동을 비교해 더 현실적인 선택을 설명할 때.","exampleKo":"멀리 가기보다 가까운 곳을 제대로 즐기는 게 낫다.","exampleEn":"It is better to enjoy a nearby place properly than to travel far.","topicIds":["nz-life","wellbeing","study"],"tags":["better-choice","comparison"],"searchKeywords":["하는 게 낫다","대신","비교 선택"]},{"id":"p57","pattern":"We need to consider both ___ and ___.","explanationKo":"가족이나 커리어 결정에서 두 중요한 요소를 함께 볼 때.","exampleKo":"안정성과 성장 가능성을 같이 봐야 한다.","exampleEn":"We need to consider both stability and growth potential.","topicIds":["child-family","career","nz-life"],"tags":["consider-both","decision"],"searchKeywords":["둘 다 고려","같이 봐야","균형"]},{"id":"p58","pattern":"I'd like to know whether ___.","explanationKo":"서비스나 조건의 가능 여부를 부드럽게 문의할 때.","exampleKo":"주말에 가능한 시간이 있는지 알고 싶다.","exampleEn":"I'd like to know whether any weekend times are available.","topicIds":["nz-life","child-family","workplace"],"tags":["inquiry","whether"],"searchKeywords":["알고 싶다","가능한지","문의"]},{"id":"p59","pattern":"Could you let me know ___?","explanationKo":"시간, 가격, 조건 같은 구체적인 정보를 정중히 요청할 때.","exampleKo":"수업 시간과 비용을 알려 주실 수 있나요?","exampleEn":"Could you let me know the class time and cost?","topicIds":["nz-life","workplace","child-family"],"tags":["request-information","polite"],"searchKeywords":["알려주세요","문의 표현","시간 비용"]},{"id":"p60","pattern":"Do we need to ___, or can we ___?","explanationKo":"두 이용 방법이나 절차 중 무엇이 가능한지 물을 때.","exampleKo":"예약해야 하나요, 그냥 방문해도 되나요?","exampleEn":"Do we need to book, or can we just walk in?","topicIds":["nz-life"],"tags":["options","service-question"],"searchKeywords":["해야 하나요","아니면","예약 문의"]},{"id":"p61","pattern":"The ___ should be ___.","explanationKo":"기록, 답변, 절차가 갖춰야 할 상태를 설명할 때.","exampleKo":"코멘트는 짧지만 구체적이어야 한다.","exampleEn":"The comment should be short but specific.","topicIds":["temperature","haccp","workplace"],"tags":["standard","should-be"],"searchKeywords":["이어야 한다","기록 기준","답변 기준"]},{"id":"p62","pattern":"Without ___, it is hard to ___.","explanationKo":"증거나 조건이 없을 때 생기는 한계를 분명히 말할 때.","exampleKo":"증거가 없으면 했다고 입증하기 어렵다.","exampleEn":"Without evidence, it is hard to prove that it was done.","topicIds":["haccp","problem-solving","career"],"tags":["without","evidence"],"searchKeywords":["없으면 어렵다","증거 부족","한계"]},{"id":"p63","pattern":"My goal is not ___; it is ___.","explanationKo":"원하지 않는 방향과 진짜 목표를 대비해 말할 때.","exampleKo":"목표는 원어민처럼 보이는 게 아니라 명확히 말하는 것이다.","exampleEn":"My goal is not to sound native; it is to communicate clearly.","topicIds":["study","career"],"tags":["goal","contrast"],"searchKeywords":["목표는 아니다","진짜 목표","방향"]},{"id":"p64","pattern":"I want to build / practise ___.","explanationKo":"새로운 능력이나 습관을 기르고 싶은 목표를 말할 때.","exampleKo":"재사용할 수 있는 패턴을 만들고 싶다.","exampleEn":"I want to build reusable patterns.","topicIds":["study","career","wellbeing"],"tags":["want-to","growth"],"searchKeywords":["하고 싶다","능력 키우기","연습 목표"]},{"id":"p65","pattern":"___ may have been affected by ___.","explanationKo":"결과에 영향을 준 요인을 조심스럽게 제시할 때.","exampleKo":"결과가 보관 조건의 영향을 받았을 수 있다.","exampleEn":"The result may have been affected by the storage conditions.","topicIds":["qc","temperature","workplace"],"tags":["affected-by","cautious-cause"],"searchKeywords":["영향 받았을 수 있다","가능한 원인","보관 조건"]},{"id":"p66","pattern":"It is important to ___.","explanationKo":"결정이나 절차에서 놓치면 안 되는 원칙을 강조할 때.","exampleKo":"현실적인 계획을 세우는 것이 중요하다.","exampleEn":"It is important to make a realistic plan.","topicIds":["career","child-family","wellbeing"],"tags":["important","principle"],"searchKeywords":["중요하다","필수 원칙","계획"]},{"id":"p67","pattern":"___ is more important than ___.","explanationKo":"우선순위를 비교해 무엇을 먼저 볼지 정할 때.","exampleKo":"현실적인 다음 단계가 완벽한 답보다 중요하다.","exampleEn":"A practical next step is more important than a perfect answer.","topicIds":["problem-solving","study","nz-life"],"tags":["priority","more-important"],"searchKeywords":["보다 중요","우선순위","비교"]},{"id":"p68","pattern":"Once I ___, ___ becomes easier.","explanationKo":"한 행동이 다음 판단이나 실행을 쉽게 만드는 흐름을 말할 때.","exampleKo":"총비용을 계산하면 결정이 쉬워진다.","exampleEn":"Once I calculate the total cost, the decision becomes easier.","topicIds":["nz-life","problem-solving","wellbeing"],"tags":["once","result"],"searchKeywords":["하면 쉬워진다","계산 후","다음 결과"]},{"id":"p69","pattern":"The best ___ is one that ___.","explanationKo":"지속 가능성이나 적합성을 기준으로 최선의 선택을 정의할 때.","exampleKo":"가장 좋은 활동은 지속할 수 있는 활동이다.","exampleEn":"The best activity is one that is sustainable.","topicIds":["child-family","career","nz-life"],"tags":["best-fit","sustainable"],"searchKeywords":["가장 좋은","지속 가능한","적합한 선택"]},{"id":"p70","pattern":"In the end, what matters is ___.","explanationKo":"여러 고민을 정리해 최종 판단 기준을 말할 때.","exampleKo":"결국 중요한 것은 우리 둘 다 즐길 수 있는지다.","exampleEn":"In the end, what matters is whether both of us can enjoy it.","topicIds":["child-family","career","study","wellbeing"],"tags":["in-the-end","decision"],"searchKeywords":["결국 중요한 건","최종 기준","핵심"]},{"id":"p71","pattern":"It is not enough to ___; I need to ___.","explanationKo":"단순한 경험이나 행동만으로 부족하고 추가로 보여 줄 것이 있을 때.","exampleKo":"경험했다고 말하는 것만으로 부족하고 실제 결과를 보여 줘야 한다.","exampleEn":"It is not enough to say I have experience; I need to show the result.","topicIds":["career","haccp","study"],"tags":["not-enough","evidence"],"searchKeywords":["만으로 부족","더 필요","보여줘야"]},{"id":"p72","pattern":"I can present ___ as ___.","explanationKo":"내 경험이나 특징을 강점과 가치로 구조화해 설명할 때.","exampleKo":"시스템 통합 경험을 강점으로 제시할 수 있다.","exampleEn":"I can present my system integration experience as a strength.","topicIds":["career"],"tags":["present-as","strength"],"searchKeywords":["강점으로 제시","경험 설명","포트폴리오"]},{"id":"p73","pattern":"___ can become ___.","explanationKo":"경험이나 도구가 새로운 가치로 이어질 수 있음을 말할 때.","exampleKo":"현재의 어려움이 다음 선택의 기준이 될 수 있다.","exampleEn":"The current difficulty can become a criterion for the next choice.","topicIds":["career","study","child-family","wellbeing"],"tags":["can-become","growth"],"searchKeywords":["될 수 있다","경험의 가치","다음 기준"]},{"id":"p74","pattern":"I'm looking for ___ that ___.","explanationKo":"내 조건에 맞는 활동, 서비스, 제품을 찾고 있다고 말할 때.","exampleKo":"아이와 함께할 수 있는 게임을 찾고 있다.","exampleEn":"I'm looking for a game that I can play with my child.","topicIds":["nz-life","child-family","career"],"tags":["looking-for","requirements"],"searchKeywords":["찾고 있다","조건에 맞는","추천"]},{"id":"p75","pattern":"I prefer ___ because ___.","explanationKo":"개인적인 선택과 그 이유를 함께 설명할 때.","exampleKo":"아이가 직접 만들 수 있어서 창작 게임을 더 좋아한다.","exampleEn":"I prefer creative games because my child can build things himself.","topicIds":["child-family","nz-life","study"],"tags":["preference","reason"],"searchKeywords":["더 좋아한다","선호","이유"]}],"cards":[{"id":"c001","topicId":"qc","ko":"염도 측정값이 평소와 달라서 다시 확인해야겠다.","en":"The salinity reading looks unusual, so I need to check it again.","patternId":"p01","speaking":"This salinity reading looks unusual. I'll check it again.","writing":"The salinity result was different from the usual range, so I repeated the test after checking the sample and equipment.","tags":["salinity","retest"],"searchKeywords":["염도 측정 안됨","염도 이상","염도 재검"]},{"id":"c002","topicId":"qc","ko":"도징 팁에서 실버 나이트레이트가 나오지 않는다.","en":"I'm not getting any silver nitrate from the dosing tip.","patternId":"p02","speaking":"No silver nitrate is coming out of the dosing tip.","writing":"No silver nitrate was dispensed from the dosing tip during the test, so I stopped and checked the reagent path.","tags":["silver-nitrate","dosing-tip"],"searchKeywords":["실버나이트레 안 나와","silver nitrate 안나옴","질산은 도징 팁"]},{"id":"c003","topicId":"qc","ko":"튜브가 막혔는지 먼저 확인해 줄 수 있나요?","en":"Could you check whether the tube is blocked first?","patternId":"p03","speaking":"Could you check if the tube is blocked?","writing":"Could you please check whether the tube is blocked or kinked before we replace the dosing tip?","tags":["tube","blockage"],"searchKeywords":["튜브 막힘","질산은 안 나옴","도징 라인 확인"]},{"id":"c004","topicId":"qc","ko":"재검하기 전에 전극을 깨끗이 헹구겠다.","en":"Before I retest it, I'll rinse the electrode thoroughly.","patternId":"p04","speaking":"I'll rinse the electrode before I retest it.","writing":"Before repeating the measurement, I rinsed the electrode thoroughly with deionised water and removed excess water.","tags":["electrode","rinse","retest"],"searchKeywords":["전극 린싱","전극 헹굼","재검 전 세척"]},{"id":"c005","topicId":"qc","ko":"샘플을 상온에 오래 둬서 결과가 영향을 받았을 수 있다.","en":"The sample may have been affected by being left at room temperature for too long.","patternId":"p05","speaking":"The sample may have been left out too long.","writing":"The sample had been left at room temperature for an unknown period, which may have affected the result. A fresh sample was collected for retesting.","tags":["sample-condition","room-temperature"],"searchKeywords":["샘플 상온 방치","시료 실온","샘플 오래 둠"]},{"id":"c006","topicId":"qc","ko":"첫 염도 검사는 1.8이었고 재검은 2.2였다.","en":"I got 1.8 on the first salinity test and 2.2 on the retest.","patternId":"p06","speaking":"The first result was 1.8, and the retest was 2.2.","writing":"The initial salinity result was 1.8. A repeat test on the same sample gave 2.2, so a fresh sample was requested.","tags":["salinity","result-comparison"],"searchKeywords":["첫 검사 재검 다름","염도 결과 비교","재시험 값 차이"]},{"id":"c007","topicId":"qc","ko":"pH 결과가 제품의 예상 범위를 벗어났다.","en":"The pH result was outside the expected range for the product.","patternId":"p07","speaking":"The pH is outside the expected range.","writing":"The measured pH was outside the product's expected range. The meter and sample condition were checked before a repeat test.","tags":["pH","out-of-range"],"searchKeywords":["pH 이상","pH 기준 이탈","산도 범위"]},{"id":"c008","topicId":"qc","ko":"전극을 탈이온수로 헹군 뒤 다시 측정했다.","en":"I rinsed the electrode with deionised water and checked it again.","patternId":"p08","speaking":"I rinsed the electrode and measured it again.","writing":"I rinsed the electrode with deionised water, gently blotted it dry, and repeated the measurement.","tags":["electrode","deionised-water"],"searchKeywords":["전극 린싱","전극 세척 방법","프로브 헹굼"]},{"id":"c009","topicId":"qc","ko":"도징 팁 연결 부위에 문제가 있을 수도 있다.","en":"There may be an issue with the dosing tip connection.","patternId":"p09","speaking":"The dosing tip connection might be the problem.","writing":"There may be an issue with the dosing tip connection, but the tubing and reagent level should also be checked before drawing a conclusion.","tags":["dosing-tip","connection"],"searchKeywords":["도징 팁 문제","팁 연결","실버나이트레 문제"]},{"id":"c010","topicId":"qc","ko":"먼저 샘플 온도가 염도값에 미친 영향을 배제하자.","en":"Let's rule out the effect of sample temperature on the salinity reading first.","patternId":"p10","speaking":"Let's check the sample temperature first.","writing":"We should first rule out sample temperature as a contributing factor by testing a fresh sample at the correct temperature.","tags":["sample-temperature","rule-out"],"searchKeywords":["염도 온도 영향","샘플 온도","원인 배제"]},{"id":"c011","topicId":"qc","ko":"새 샘플로 검사해도 같은 문제가 생기는지 보자.","en":"Let's see whether the same issue occurs with a fresh sample.","patternId":"p38","speaking":"Let's try a fresh sample and compare.","writing":"To separate a sample issue from an equipment issue, I tested a freshly collected sample under the same conditions.","tags":["fresh-sample","comparison"],"searchKeywords":["새 샘플 재검","샘플 문제 확인","fresh sample"]},{"id":"c012","topicId":"qc","ko":"한 번에 시약과 전극을 둘 다 바꾸면 원인을 알 수 없다.","en":"If we change both the reagent and the electrode at once, we won't know what caused the issue.","patternId":"p38","speaking":"Let's change only one thing at a time.","writing":"Changing the reagent and electrode at the same time would make it difficult to identify the cause, so each variable should be checked separately.","tags":["one-variable","troubleshooting"],"searchKeywords":["변수 하나씩","시약 전극","원인 확인"]},{"id":"c013","topicId":"qc","ko":"실버 나이트레이트 잔량이 충분한지 확인해야 한다.","en":"I need to check whether there is enough silver nitrate left.","patternId":"p03","speaking":"I'll check the silver nitrate level.","writing":"I checked the silver nitrate level and expiry date before inspecting the dosing line for a blockage.","tags":["silver-nitrate","reagent-level"],"searchKeywords":["질산은 잔량","실버나이트레 시약","reagent level"]},{"id":"c014","topicId":"qc","ko":"교정 상태가 괜찮으면 다음으로 샘플 상태를 확인하겠다.","en":"If the calibration is fine, I'll check the sample condition next.","patternId":"p41","speaking":"First I'll check calibration, then the sample.","writing":"First, I will verify the calibration status. If it is acceptable, I will then check the sample temperature, age, and handling.","tags":["calibration","sample-condition"],"searchKeywords":["교정 확인","캘리브레이션","점검 순서"]},{"id":"c015","topicId":"qc","ko":"전극 보관액이 말라 있으면 측정이 불안정할 수 있다.","en":"The reading may be unstable if the electrode storage solution has dried out.","patternId":"p05","speaking":"A dry electrode can give an unstable reading.","writing":"The electrode bulb appeared dry, which may have contributed to the unstable reading. It was reconditioned according to the work instruction.","tags":["electrode","storage-solution"],"searchKeywords":["전극 말라 있음","전극 보관액","pH 불안정"]},{"id":"c016","topicId":"qc","ko":"현재 결과만으로 장비가 고장 났다고 단정할 수 없다.","en":"We don't have enough information to conclude that the equipment has failed.","patternId":"p39","speaking":"We can't say it's an equipment fault yet.","writing":"The current results are not sufficient to confirm equipment failure. The sample, reagent, calibration, and connections still need to be checked.","tags":["evidence","equipment"],"searchKeywords":["장비 고장 단정","근거 부족","추측 금지"]},{"id":"c017","topicId":"qc","ko":"가장 현실적인 다음 단계는 새 샘플로 한 번 더 재검하는 것이다.","en":"The next practical step is to run one more test with a fresh sample.","patternId":"p40","speaking":"Next, I'll retest a fresh sample.","writing":"The next practical step is to repeat the analysis using a fresh, temperature-controlled sample while keeping the equipment settings unchanged.","tags":["next-step","fresh-sample"],"searchKeywords":["다음 단계","새 샘플 재검","실용적 조치"]},{"id":"c018","topicId":"qc","ko":"현재 결과를 보면 전극 교체 전에 한 번 더 확인하는 것이 좋겠다.","en":"Based on the current results, I recommend one more check before replacing the electrode.","patternId":"p50","speaking":"Let's check it once more before replacing the electrode.","writing":"Based on the current results, I recommend repeating the calibration and testing a control sample before ordering a replacement electrode.","tags":["recommendation","electrode"],"searchKeywords":["전극 교체 전","한번 더 확인","QC 제안"]},{"id":"c019","topicId":"temperature","ko":"오전 8시에 칠러 온도는 3.8도였다.","en":"The chiller temperature was 3.8 degrees at 8 a.m.","patternId":"p11","speaking":"The chiller was at 3.8 degrees at eight.","writing":"The chiller temperature was recorded as 3.8°C at 8:00 a.m., within the required range.","tags":["chiller","temperature-record"],"searchKeywords":["칠러 온도 기록","아침 온도","냉각기 로그"]},{"id":"c020","topicId":"temperature","ko":"공정 온도가 9도까지 올라간 것을 발견했다.","en":"I noticed that the process temperature had risen to 9 degrees.","patternId":"p12","speaking":"The process temperature has risen to nine degrees.","writing":"At the routine check, I noticed that the process temperature had risen to 9°C, above the operating target.","tags":["process-temperature","rise"],"searchKeywords":["공정 온도 상승","온도 높음","9도"]},{"id":"c021","topicId":"temperature","ko":"칠러 문을 완전히 닫은 뒤 온도가 정상으로 돌아왔다.","en":"The temperature returned to normal after the chiller door was fully closed.","patternId":"p13","speaking":"It returned to normal after we closed the door.","writing":"The chiller returned to its normal operating range after the door was fully closed and the seal was checked.","tags":["chiller-door","recovery"],"searchKeywords":["칠러 문","온도 정상 복귀","문 열린 상태"]},{"id":"c022","topicId":"temperature","ko":"오후 공정 온도 기록이 누락되어 있다.","en":"The process temperature record is missing for the afternoon check.","patternId":"p14","speaking":"The afternoon temperature record is missing.","writing":"The process temperature entry for the afternoon check was missing. The operator was asked to confirm whether the check had been completed.","tags":["missing-record","process-temperature"],"searchKeywords":["온도 기록 누락","오후 로그 없음","기록 빠짐"]},{"id":"c023","topicId":"temperature","ko":"제품이 칠러 밖에 얼마나 오래 있었는지 확인해야 한다.","en":"We need to confirm how long the product was outside the chiller.","patternId":"p15","speaking":"How long was the product outside the chiller?","writing":"Please confirm the time the product was removed from and returned to the chiller so we can assess the exposure duration.","tags":["exposure-time","chiller"],"searchKeywords":["칠러 밖 시간","제품 상온","노출 시간"]},{"id":"c024","topicId":"temperature","ko":"온도가 한계값을 넘으면 제품을 먼저 보류해야 한다.","en":"If the temperature exceeds the limit, we need to place the product on hold first.","patternId":"p17","speaking":"If it's over the limit, put the product on hold.","writing":"If the critical temperature limit is exceeded, the affected product must be identified and placed on hold pending assessment.","tags":["temperature-limit","product-hold"],"searchKeywords":["온도 이탈","제품 보류","한계 기준"]},{"id":"c025","topicId":"temperature","ko":"첫 번째로 센서 위치를 확인하고, 괜찮으면 칠러 문을 확인하겠다.","en":"First, I'll check the sensor position. If that's fine, I'll check the chiller door.","patternId":"p41","speaking":"I'll check the sensor first, then the door.","writing":"First, I will verify that the probe is in the correct position. If it is, I will inspect the chiller door and seal.","tags":["sensor","check-sequence"],"searchKeywords":["온도 센서 위치","칠러 점검 순서","프로브 위치"]},{"id":"c026","topicId":"temperature","ko":"온도계 표시값과 기준 온도계를 비교해 보자.","en":"Let's compare the displayed temperature with the reference thermometer.","patternId":"p38","speaking":"Let's compare it with the reference thermometer.","writing":"The unit display was compared with a calibrated reference thermometer to check whether the difference came from the sensor.","tags":["reference-thermometer","comparison"],"searchKeywords":["온도계 비교","센서 정확도","기준 온도계"]},{"id":"c027","topicId":"temperature","ko":"문을 닫은 뒤 20분 후 온도를 다시 확인하겠다.","en":"I'll check the temperature again 20 minutes after closing the door.","patternId":"p04","speaking":"I'll recheck it in twenty minutes.","writing":"After the chiller door was closed, the temperature was monitored and checked again after 20 minutes.","tags":["recheck","chiller-door"],"searchKeywords":["20분 후 재확인","칠러 온도 재검","문 닫은 뒤"]},{"id":"c028","topicId":"temperature","ko":"온도 기록에는 측정 시각과 내 이니셜도 필요하다.","en":"The temperature record also needs the check time and my initials.","patternId":"p11","speaking":"I need to add the time and my initials.","writing":"The record should include the actual temperature, time of check, operator initials, and any corrective action taken.","tags":["documentation","initials"],"searchKeywords":["온도 기록 작성","이니셜","측정 시각"]},{"id":"c029","topicId":"temperature","ko":"현재 온도만 보지 말고 언제부터 높았는지 확인하자.","en":"Let's not look only at the current temperature; we need to check when it started rising.","patternId":"p15","speaking":"We need to know when the temperature started rising.","writing":"Assessment should consider the duration of the deviation, not only the temperature observed at the time of discovery.","tags":["duration","temperature-history"],"searchKeywords":["언제부터 온도 높음","이탈 시간","온도 추세"]},{"id":"c030","topicId":"temperature","ko":"온도 추세를 보면 문이 자주 열린 시간과 관련이 있어 보인다.","en":"Based on the temperature trend, it appears to be related to the period when the door was opened frequently.","patternId":"p50","speaking":"The rise seems linked to frequent door opening.","writing" ed on recurring work and family situations have a clear retrieval cue and are more likely to transfer into real use.","tags":["personalised-learning","review"],"searchKeywords":["개인 영어 데이터","실제 상황 카드","복습 이유"]},{"id":"c079","topicId":"problem-solving","ko":"추측하지 말고 한 번에 변수 하나씩 확인하자.","en":"Let's avoid guessing and check one variable at a time.","patternId":"p38","speaking":"No guessing. Let's check one thing at a time.","writing":"To avoid an unsupported conclusion, we will change or test one variable at a time and record each result.","tags":["one-variable","no-guessing"],"searchKeywords":["변수 하나씩","추측 금지","문제 해결"]},{"id":"c080","topicId":"problem-solving","ko":"이 결과 하나만으로 시약 문제라고 결론 내릴 수 없다.","en":"We don't have enough information to conclude that the reagent is the problem from this result alone.","patternId":"p39","speaking":"One result isn't enough to blame the reagent.","writing":"A single unexpected result does not provide enough evidence to identify the reagent as the cause; other variables should be checked first.","tags":["evidence","reagent"],"searchKeywords":["시약 문제 단정","근거 부족","원인 추측"]},{"id":"c081","topicId":"problem-solving","ko":"지금 할 수 있는 가장 현실적인 단계는 연결부를 다시 끼우는 것이다.","en":"The next practical step is to reconnect the fitting securely.","patternId":"p40","speaking":"First, let's reconnect the fitting properly.","writing":"The next practical step is to reseat the connection, confirm it is secure, and then repeat the dispensing check.","tags":["connection","next-step"],"searchKeywords":["연결부 점검","현실적 다음 단계","먼저 할 일"]},{"id":"c082","topicId":"problem-solving","ko":"먼저 전원을 확인하고, 괜찮으면 케이블을 확인하겠다.","en":"First, I'll check the power. If that's fine, I'll check the cable.","patternId":"p41","speaking":"Power first, then the cable.","writing":"First, I will confirm the unit has power. If it does, I will inspect the cable and connection before restarting it.","tags":["check-sequence","equipment"],"searchKeywords":["전원 케이블 확인","문제 해결 순서","장비 점검"]},{"id":"c083","topicId":"problem-solving","ko":"문제가 다시 생기는 조건을 기록하면 원인을 찾기 쉬워진다.","en":"Recording the conditions when the problem happens again will make the cause easier to identify.","patternId":"p21","speaking":"Let's record exactly when it happens.","writing":"Useful evidence includes the time, sample, operator, equipment setting, environmental condition, and exact symptom each time the issue occurs.","tags":["evidence","conditions"],"searchKeywords":["문제 조건 기록","원인 찾기","트러블슈팅 기록"]},{"id":"c084","topicId":"problem-solving","ko":"같은 조건에서 새 샘플과 기존 샘플을 비교해 보자.","en":"Let's compare the fresh sample with the original sample under the same conditions.","patternId":"p38","speaking":"Let's compare both samples under the same conditions.","writing":"Both samples should be tested using the same equipment, settings, and timing so that sample condition is the only changed variable.","tags":["controlled-comparison","sample"],"searchKeywords":["샘플 비교","같은 조건","변수 통제"]},{"id":"c085","topicId":"problem-solving","ko":"문제가 가끔만 생기면 발생 시각과 작업자를 함께 확인해야 한다.","en":"If the problem is intermittent, we need to check the time and operator when it occurs.","patternId":"p15","speaking":"When does it happen, and who is using it?","writing":"For an intermittent issue, we should compare occurrence times, operators, batches, and equipment conditions to identify a consistent pattern.","tags":["intermittent-issue","pattern"],"searchKeywords":["가끔 문제","발생 시각 작업자","간헐적 오류"]},{"id":"c086","topicId":"problem-solving","ko":"가능한 원인을 적고 가장 확인하기 쉬운 것부터 시작하자.","en":"Let's list the possible causes and start with the easiest one to check.","patternId":"p40","speaking":"List the causes and check the easiest first.","writing":"The practical approach is to list plausible causes, rank them by likelihood and ease of testing, and begin with a safe reversible check.","tags":["prioritise","possible-causes"],"searchKeywords":["원인 목록","쉬운 것부터","문제 해결 방법"]},{"id":"c087","topicId":"problem-solving","ko":"조치 후 결과가 바뀌지 않았다면 그 변수는 원인이
