English first. I will take one manageable action and review the result before adding more.","difficulty":"standard","priority":"regular","sourceSet":"personal-conversation-300","sourceNumber":294,"tags":["self-management","wellbeing"],"searchKeywords":["내가 자주 쓰는 생각부터 영어로 바꾸자.","내가 자주 쓰는 생각부터","자기관리·멘탈·하루 정리"]},{"id":"c395","topicId":"wellbeing","ko":"잘 안 외워지는 문장이 진짜 훈련할 문장이다.","en":"The sentences I struggle to remember are the ones I really need to practice.","patternId":"p40","speaking":"The sentences I struggle to remember are the ones I really need to practice.","writing":"The sentences I struggle to remember are the ones I really need to practice. I will take one manageable action and review the result before adding more.","difficulty":"expanded","priority":"regular","sourceSet":"personal-conversation-300","sourceNumber":295,"tags":["self-management","wellbeing"],"searchKeywords":["잘 안 외워지는 문장이 진짜 훈련할 문장이다.","잘 안 외워지는 문장이","자기관리·멘탈·하루 정리"]},{"id":"c396","topicId":"wellbeing","ko":"매일 조금씩 쌓이면 말하기 속도가 빨라진다.","en":"If I build it up little by little every day, my speaking speed will improve.","patternId":"p54","speaking":"If I build it up little by little every day, my speaking speed will improve.","writing":"If I build it up little by little every day, my speaking speed will improve. I will take one manageable action and review the result before adding more.","difficulty":"expanded","priority":"regular","sourceSet":"personal-conversation-300","sourceNumber":296,"tags":["self-management","wellbeing"],"searchKeywords":["매일 조금씩 쌓이면 말하기 속도가 빨라진다.","매일 조금씩 쌓이면 말하기","자기관리·멘탈·하루 정리"]},{"id":"c397","topicId":"wellbeing","ko":"영어는 시험이 아니라 생활 도구로 써야 한다.","en":"I should use English as a life tool, not just as a test subject.","patternId":"p52","speaking":"I should use English as a life tool, not just as a test subject.","writing":"I should use English as a life tool, not just as a test subject. I will take one manageable action and review the result before adding more.","difficulty":"expanded","priority":"regular","sourceSet":"personal-conversation-300","sourceNumber":297,"tags":["self-management","wellbeing"],"searchKeywords":["영어는 시험이 아니라 생활 도구로 써야 한다.","영어는 시험이 아니라 생활","자기관리·멘탈·하루 정리"]},{"id":"c398","topicId":"wellbeing","ko":"오늘의 목표는 완벽함이 아니라 반복이다.","en":"Today's goal is not perfection, but repetition.","patternId":"p40","speaking":"Today's goal is not perfection, but repetition.","writing":"Today's goal is not perfection, but repetition. I will take one manageable action and review the result before adding more.","difficulty":"expanded","priority":"regular","sourceSet":"personal-conversation-300","sourceNumber":298,"tags":["self-management","wellbeing"],"searchKeywords":["오늘의 목표는 완벽함이 아니라 반복이다.","오늘의 목표는 완벽함이 아니라","자기관리·멘탈·하루 정리"]},{"id":"c399","topicId":"wellbeing","ko":"나는 내 상황에 맞는 영어를 익히고 있다.","en":"I am learning English that fits my real situation.","patternId":"p40","speaking":"I am learning English that fits my real situation.","writing":"I am learning English that fits my real situation. I will take one manageable action and review the result before adding more.","difficulty":"expanded","priority":"regular","sourceSet":"personal-conversation-300","sourceNumber":299,"tags":["self-management","wellbeing"],"searchKeywords":["나는 내 상황에 맞는 영어를 익히고 있다.","나는 내 상황에 맞는","자기관리·멘탈·하루 정리"]},{"id":"c400","topicId":"wellbeing","ko":"결국 내 영어는 내 삶을 더 쉽게 만드는 도구가 되어야 한다.","en":"In the end, my English should become a tool that makes my life easier.","patternId":"p70","speaking":"In the end, my English should become a tool that makes my life easier.","writing":"In the end, my English should become a tool that makes my life easier. I will take one manageable action and review the result before adding more.","difficulty":"expanded","priority":"regular","sourceSet":"personal-conversation-300","sourceNumber":300,"tags":["self-management","wellbeing"],"searchKeywords":["결국 내 영어는 내 삶을 더 쉽게 만드는 도구가 되어야 한다.","결국 내 영어는 내","자기관리·멘탈·하루 정리"]}],"scripts":[{"id":"s001","topicId":"qc","titleKo":"염도값이 갑자기 다를 때","ko":"결과를 바로 믿거나 장비 고장이라고 단정하지 않는다. 샘플 온도와 상태를 확인하고, 전극을 헹군 뒤 같은 조건에서 재검한다.","en":"I won't accept the result immediately or assume the equipment has failed. I'll check the sample temperature and condition, rinse the electrode, and retest under the same conditions.","patternId":"p38","speaking":"This result is unusual. I'll check the sample, rinse the electrode, and retest one variable at a time.","writing":"The salinity result was unusual. Before drawing a conclusion, I checked the sample temperature and condition, rinsed the electrode, and repeated the test under controlled conditions.","steps":["결과와 예상 범위 비교","샘플 상태 확인","전극 린싱","같은 조건으로 재검","두 결과 기록"],"tags":["salinity","retest","one-variable"],"searchKeywords":["염도 측정 안됨","염도값 이상","염도 문제 해결"]},{"id":"s002","topicId":"qc","titleKo":"실버 나이트레이트가 나오지 않을 때","ko":"시약이 안 나온다고 바로 팁을 버리지 않는다. 잔량, 튜브 꺾임, 연결부, 막힘을 순서대로 확인하고 한 번씩 분사 시험을 한다.","en":"I won't discard the tip as soon as the reagent stops dispensing. I'll check the reagent level, tubing, connection, and possible blockage in order, testing the dispense after each step.","patternId":"p41","speaking":"First I'll check the reagent level and tubing. Then I'll check the connection and dosing tip.","writing":"No silver nitrate was dispensed. I checked the reagent level, tubing for kinks, the connection, and the dosing tip one at a time, recording the outcome after each dispense test.","steps":["시약 잔량 확인","튜브 꺾임 확인","연결부 다시 끼우기","도징 팁 막힘 확인","분사 시험"],"tags":["silver-nitrate","dosing-tip","troubleshooting"],"searchKeywords":["실버나이트레 안 나와","질산은 안나옴","도징 팁 막힘"]},{"id":"s003","topicId":"qc","titleKo":"전극을 올바르게 린싱하기","ko":"이전 샘플이 남지 않도록 탈이온수로 전극을 헹군다. 문지르지 않고 가볍게 물기를 제거한 뒤 다음 샘플에 넣는다.","en":"I'll rinse the electrode with deionised water so no previous sample remains. I'll gently remove excess water without rubbing it, then place it in the next sample.","patternId":"p08","speaking":"Rinse it with deionised water, gently remove the excess, and don't rub the electrode.","writing":"Between samples, the electrode was rinsed with deionised water and gently blotted to remove excess water without damaging the sensing surface.","steps":["탈이온수 준비","전극 전체 헹굼","가볍게 물기 제거","전극 문지르지 않기","다음 샘플 측정"],"tags":["electrode","rinsing","cross-contamination"],"searchKeywords":["전극 린싱","프로브 세척","전극 헹굼 방법"]},{"id":"s004","topicId":"qc","titleKo":"상온에 방치된 샘플 처리","ko":"샘플이 언제 채취됐고 얼마나 오래 밖에 있었는지 확인한다. 시간이 불명확하면 그 사실을 기록하고 새 샘플을 받아 비교한다.","en":"I'll confirm when the sample was collected and how long it was left out. If the timing is unclear, I'll record that and compare it with a fresh sample.","patternId":"p05","speaking":"This sample may have been left out too long. I'll get a fresh one and compare.","writing":"The sample had been left at room temperature for an unknown duration and may not have represented the process condition. This was recorded, and a fresh sample was collected for comparison.","steps":["채취 시각 확인","실온 노출 시간 확인","샘플 상태 기록","새 샘플 요청","결과 비교"],"tags":["sample-condition","room-temperature","fresh-sample"],"searchKeywords":["샘플 상온 방치","시료 오래 둠","샘플 다시 받기"]},{"id":"s005","topicId":"qc","titleKo":"pH 재검 결과 보고","ko":"첫 결과와 재검 결과를 따로 적고, 재검 전에 무엇을 확인했는지 남긴다. 최종값만 골라 쓰지 않는다.","en":"I'll record the initial and repeat results separately and note what I checked before retesting. I won't report only the preferred final value.","patternId":"p06","speaking":"I'll report both results and explain what I checked before the retest.","writing":"The initial pH result and retest result were recorded separately. The report also notes the calibration status, electrode rinse, sample condition, and reason for repeating the test.","steps":["첫 결과 기록","재검 이유 기록","교정·전극·샘플 확인","재검 결과 기록","최종 판단 설명"],"tags":["pH","retest","reporting"],"searchKeywords":["pH 재검 보고","첫 값 재시험 값","QC 기록"]},{"id":"s006","topicId":"qc","titleKo":"장비 고장 여부를 차분히 확인","ko":"한 번의 이상값으로 고장이라고 결론 내리지 않는다. 표준액, 새 샘플, 연결 상태를 확인한 뒤에도 문제가 반복되는지 본다.","en":"I won't conclude that the equipment has failed because of one unusual result. I'll check the standard, a fresh sample, and the connections, then see whether the issue repeats.","patternId":"p39","speaking":"One unusual result isn't enough. Let's check the standard, sample, and connections first.","writing":"One abnormal result was not sufficient to confirm equipment failure. A control standard, fresh sample, and all accessible connections were checked before escalation.","steps":["이상값 재확인","표준액 확인","새 샘플 시험","연결 상태 확인","반복 여부 기록"],"tags":["equipment","evidence","no-guessing"],"searchKeywords":["장비 고장 확인","QC 추측 금지","기계 문제"]},{"id":"s007","topicId":"temperature","titleKo":"아침 칠러 기록 작성","ko":"표시 온도를 보고 실제 시각과 함께 적는다. 범위 안인지 확인하고 이니셜을 남긴다. 이상하면 기록만 하지 말고 바로 알린다.","en":"I'll read the displayed temperature and record it with the actual time. I'll confirm it is within range and add my initials. If it is abnormal, I won't just record it; I'll report it immediately.","patternId":"p11","speaking":"The chiller is at 3.8 degrees at eight. It's within range, and I've signed the record.","writing":"At 8:00 a.m., the chiller temperature was 3.8°C. It was within the required range, and the entry was completed with the actual check time and initials.","steps":["표시값 읽기","실제 시각 기록","허용 범위 확인","이니셜 작성","이상 시 보고"],"tags":["chiller","temperature-record","routine-check"],"searchKeywords":["칠러 온도 기록","아침 점검","냉장 온도 로그"]},{"id":"s008","topicId":"temperature","titleKo":"칠러 온도 이탈 대응","ko":"높은 온도를 발견하면 제품을 보류하고 문과 센서 위치를 확인한다. 노출 시간을 파악하고 온도가 회복되는 과정을 기록한다.","en":"If I find a high temperature, I'll place the product on hold and check the door and sensor position. I'll establish the exposure time and record how the temperature recovers.","patternId":"p17","speaking":"The temperature is over the limit. Put the product on hold while we check the door, sensor, and exposure time.","writing":"A chiller temperature above the limit was identified. Affected product was placed on hold, the door and probe position were checked, and the temperature recovery and exposure duration were documented.","steps":["이탈값 기록","제품 보류","문·실링 확인","센서 위치 확인","노출 시간과 회복 기록"],"tags":["temperature-deviation","product-hold","corrective-action"],"searchKeywords":["칠러 온도 높음","온도 이탈 조치","제품 보류"]},{"id":"s009","topicId":"temperature","titleKo":"온도 기록 누락을 발견했을 때","ko":"빈칸을 추측해서 채우지 않는다. 점검이 실제로 이뤄졌는지 작업자에게 확인하고, 제품 영향과 후속 조치를 기록한다.","en":"I won't guess a value to fill the blank. I'll ask the operator whether the check actually occurred, assess any product impact, and document the follow-up.","patternId":"p14","speaking":"The record is missing. Let's confirm whether the check was done rather than guessing the value.","writing":"The afternoon temperature entry was missing. The value was not backfilled from memory; the monitoring activity and potential product impact were investigated and documented.","steps":["누락 시간 확인","값 추정 금지","담당자에게 점검 여부 확인","제품 영향 평가","후속 내용 기록"],"tags":["missing-record","documentation","integrity"],"searchKeywords":["온도 기록 누락","로그 빈칸","기록 없을 때"]},{"id":"s010","topicId":"temperature","titleKo":"공정 온도 상승 원인 좁히기","ko":"현재 값만 보지 말고 추세를 본다. 문이 열린 시간, 제품 투입, 센서 위치를 하나씩 기록과 비교한다.","en":"I won't look only at the current value; I'll review the trend. I'll compare door opening, product loading, and sensor position with the record one factor at a time.","patternId":"p38","speaking":"Let's review the trend and compare one factor at a time.","writing":"The temperature trend was reviewed against door-opening periods, product loading, and probe position. Each factor was considered separately to avoid an unsupported conclusion.","steps":["온도 추세 확인","문 개방 시간 비교","제품 투입 시간 비교","센서 위치 확인","가능성 정리"],"tags":["process-temperature","trend","one-variable"],"searchKeywords":["공정 온도 상승","온도 원인 분석","칠러 추세"]},{"id":"s011","topicId":"haccp","titleKo":"HACCP 평가 답변 만들기","ko":"정의만 쓰지 않고 우리 현장의 위해요소, 관리 수단, 모니터링, 기록을 한 사례로 연결한다.","en":"I won't provide only a definition. I'll connect a workplace hazard, control measure, monitoring activity, and record in one practical example.","patternId":"p20","speaking":"I'll explain the concept using one real workplace example.","writing":"A practical example is chilled product temperature: temperature growth is controlled through chilled storage, monitored at set times, and evidenced by the completed temperature record.","steps":["질문 핵심어 찾기","개념 한 줄 정의","현장 사례 선택","조치와 기록 연결","답변 다시 읽기"],"tags":["HACCP","assessment","workplace-example"],"searchKeywords":["HACCP 평가","현장 사례 답안","assessment example"]},{"id":"s012","topicId":"haccp","titleKo":"시정조치 설명하기","ko":"즉시 조치만 말하지 않는다. 영향 제품 처리, 원인 확인, 재발 방지, 효과 확인까지 구분해서 설명한다.","en":"I won't describe only the immediate action. I'll separate product disposition, cause investigation, recurrence prevention, and effectiveness review.","patternId":"p19","speaking":"Corrective action covers the product now and prevention for the future.","writing":"The corrective action included immediate product control, investigation of the deviation, a change to prevent recurrence, and follow-up verification that the change was effective.","steps":["즉시 통제","제품 영향·처리","원인 조사","재발 방지","효과 확인"],"tags":["corrective-action","prevention","verification"],"searchKeywords":["시정조치 설명","corrective action","재발 방지"]},{"id":"s013","topicId":"haccp","titleKo":"심사 증거 준비","ko":"‘우리는 하고 있다’고 말하는 것만으로는 부족하다. 최신 절차서, 완료 기록, 검증 서명, 실제 시정조치 예를 함께 준비한다.","en":"Saying 'we do it' is not enough. I'll prepare the current procedure, completed records, verification sign-offs, and a real corrective-action example.","patternId":"p21","speaking":"We'll support the answer with procedures, records, and a real corrective-action example.","writing":"Objective evidence prepared for the assessment includes the approved procedure, recent monitoring records, verification sign-offs, and a completed corrective-action record.","steps":["요구사항 확인","현재 절차서 준비","최근 기록 선택","검증 증거 확인","시정조치 사례 준비"],"tags":["audit","evidence","records"],"searchKeywords":["HACCP 심사 준비","평가 증거","기록 제출"]},{"id":"s014","topicId":"haccp","titleKo":"모르는 교육 용어 질문하기","ko":"아는 척하지 않는다. 내가 이해한 뜻을 먼저 말하고, 맞는지 확인한 뒤 우리 작업장 예를 요청한다.","en":"I won't pretend I understand. I'll state my current understanding, ask whether it is correct, and request a workplace example.","patternId":"p47","speaking":"My understanding is that verification checks the system. Is that right, and could you give a workplace example?","writing":"My understanding is that verification confirms the control system is operating as intended. Is that correct? A workplace example would help me apply it accurately.","steps":["모르는 용어 표시","현재 이해 한 문장","맞는지 질문","현장 예 요청","답 메모"],"tags":["training","clarification","understanding"],"searchKeywords":["교육 질문","HACCP 용어","이해 확인"]},{"id":"s015","topicId":"nz-life","titleKo":"휴대폰 통화 문제로 고객센터에 연락","ko":"증상과 시작 시점을 먼저 말한다. 이미 해 본 재시작, SIM 확인, 설정 확인을 알려 주고 다음 점검을 요청한다.","en":"I'll start with the symptom and when it began. I'll explain that I already restarted the phone, checked the SIM and settings, then ask for the next diagnostic step.","patternId":"p27","speaking":"I haven't been able to receive calls since yesterday. I've restarted the phone and checked the SIM, but it still isn't working.","writing":"Incoming calls have failed since yesterday afternoon. I have restarted the device, reinserted the SIM, and checked network settings. Please advise the next troubleshooting step.","steps":["증상 말하기","시작 시점 말하기","이미 한 조치 설명","남은 문제 확인","다음 단계 요청"],"tags":["mobile","customer-service","troubleshooting"],"searchKeywords":["전화 문제 고객센터","휴대폰 수신 안됨","폰 문의"]},{"id":"s016","topicId":"nz-life","titleKo":"모바일·인터넷·전기 플랜 비교","ko":"광고 할인만 보지 않는다. 할인 후 월 총액, 계약 기간, 종료 후 가격, 변경 비용을 같은 기준으로 비교한다.","en":"I won't compare only the advertised discount. I'll compare the total monthly cost, contract term, post-promotion price, and change fees on the same basis.","patternId":"p24","speaking":"I'm comparing the full monthly cost, contract term, and price after the discount ends.","writing":"Please provide the total monthly cost for the mobile, broadband, and electricity options, including contract terms, fees, and the price after introductory discounts expire.","steps":["필요한 서비스 정리","월 총액 확인","계약 기간 확인","프로모션 후 가격 확인","변경·해지 비용 비교"],"tags":["mobile","internet","electricity","comparison"],"searchKeywords":["모바일 인터넷 전기 비교","요금제 비교","NZ 서비스 플랜"]},{"id":"s017","topicId":"nz-life","titleKo":"잘못 온 주문 교환 요청","ko":"주문 번호, 주문한 상품, 받은 상품을 간단히 말한다. 사진을 준비하고 교환 절차와 반품 배송비를 확인한다.","en":"I'll briefly give the order number, what I ordered, and what arrived. I'll prepare a photo and ask about the exchange process and return postage.","patternId":"p22","speaking":"I received the wrong item. Could you arrange an exchange and tell me how to return this one?","writing":"The item received does not match my order confirmation. I have attached a photo. Please arrange an exchange and confirm whether a prepaid return label will be provided.","steps":["주문 번호 준비","주문·수령 상품 비교","사진 첨부","교환 요청","반품 비용 확인"],"tags":["order","exchange","service-inquiry"],"searchKeywords":["잘못 배송 교환","주문 문제","다른 상품 옴"]},{"id":"s018","topicId":"nz-life","titleKo":"이사할 때 인터넷 이전 문의","ko":"새 주소와 이사 날짜를 준비한다. 같은 플랜 가능 여부, 설치 날짜, 중단 시간, 이전 비용을 묻는다.","en":"I'll prepare the new address and moving date. I'll ask whether the same plan is available, the installation date, likely downtime, and any relocation fee.","patternId":"p28","speaking":"I'm moving house. Can I keep this plan, and is there a relocation fee?","writing":"I am moving on the date below and would like to transfer my broadband service. Please confirm plan availability, installation timing, expected downtime, and any relocation charge.","steps":["새 주소 준비","이사 날짜 준비","플랜 가능 여부","설치·중단 일정","이전 비용 확인"],"tags":["moving-house","broadband","inquiry"],"searchKeywords":["이사 인터넷 이전","브로드밴드 문의","새 주소 서비스"]},{"id":"s019","topicId":"child-family","titleKo":"아이 테니스 레슨 문의","ko":"아이 나이와 경험을 말하고 초보반 가능 여부를 묻는다. 시간, 비용, 라켓, 체험 수업, 결석 정책도 확인한다.","en":"I'll give my child's age and experience and ask about a suitable beginner class. I'll also check timing, cost, racket requirements, trial lessons, and the absence policy.","patternId":"p22","speaking":"I'm asking about a beginner tennis class for my child. Could you tell me the times, fees, and whether a trial is available?","writing":"I'd like to enquire about a beginner tennis class for my child. Please advise suitable sessions, term fees, equipment requirements, trial options, and the policy for missed lessons.","steps":["나이·경험 설명","적합한 반 질문","시간·비용 확인","장비·체험 확인","결석 정책 확인"],"tags":["tennis","child","inquiry"],"searchKeywords":["아이 테니스 문의","주니어 테니스","어린이 레슨"]},{"id":"s020","topicId":"child-family","titleKo":"테니스와 로보틱스 중 가족 결정","ko":"어느 활동이 더 좋아 보이는지만 보지 않는다. 아이 관심, 이동, 비용, 주간 일정, 시험 기간을 함께 놓고 결정한다.","en":"I won't decide only on which activity looks better. We'll consider our child's interest, travel, cost, weekly schedule, and a possible trial period together.","patternId":"p31","speaking":"Let's balance our child's interest with cost, travel, and the weekly schedule.","writing":"We will compare tennis and robotics using the same factors: sustained interest, timing, travel, full cost, and the option to try one term before a longer commitment.","steps":["아이 관심 듣기","요일·이동 비교","전체 비용 비교","체험 가능 여부","한 학기 후 재평가"],"tags":["tennis","robotics","family-decision"],"searchKeywords":["아이 활동 결정","테니스 로보틱스 비교","가족 선택"]},{"id":"s021","topicId":"child-family","titleKo":"게임 시간 가족 대화","ko":"바로 금지하기보다 무엇이 문제인지 구체적으로 말한다. 숙제, 수면, 가족 시간과 균형을 맞춘 규칙을 함께 정하고 다시 검토한다.","en":"Rather than banning games immediately, we'll describe the specific concern. We'll agree on rules that balance homework, sleep, and family time, then review how they work.","patternId":"p31","speaking":"Let's agree on game-time rules that still protect homework, sleep, and family time.","writing":"We will agree on clear gaming times and responsibilities together, then review after two weeks whether the arrangement supports sleep, schoolwork, and family routines.","steps":["구체적인 문제 말하기","아이 의견 듣기","시간·조건 합의","규칙 적기","2주 후 검토"],"tags":["gaming","family-rules","balance"],"searchKeywords":["아이 게임 시간","가족 결정","게임 규칙"]},{"id":"s022","topicId":"study","titleKo":"오디오북으로 능동 공부하기","ko":"길게 틀어 놓기만 하지 않는다. 짧은 구간을 듣고 핵심을 내 말로 요약한 뒤, 유용한 한 문장을 한국어에서 영어로 다시 떠올린다.","en":"I won't only leave the audiobook playing for a long time. I'll listen to a short section, summarise the main point in my own words, and recall one useful sentence from Korean into English.","patternId":"p35","speaking":"Listen to a short part, summarise it, and recall one useful sentence.","writing":"For each short audiobook section, I will listen twice, give a brief spoken summary, select one useful expression, and create a Korean-to-English recall prompt.","steps":["짧은 구간 선택","두 번 듣기","영어로 짧게 요약","유용한 표현 선택","회상 카드 만들기"],"tags":["audiobook","active-study","recall"],"searchKeywords":["영어 오디오북 공부","오디오북 공부법","듣고 요약"]},{"id":"s023","topicId":"study","titleKo":"Anki 카드 복습 루틴","ko":"영어를 먼저 읽지 않는다. 한국어 상황을 보고 영어를 떠올려 말한 뒤 정답과 비교한다. 어려운 카드만 표시해 다시 본다.","en":"I won't read the English first. I'll look at the Korean situation, recall and say the English, compare it with the answer, and mark only difficult cards for another review.","patternId":"p33","speaking":"Korean first, recall the English, say it, then check the answer.","writing":"The review sequence is Korean prompt first, active English recall, spoken production, answer comparison, and selective marking of difficult cards for spaced review.","steps":["한국어 프롬프트 읽기","영어 떠올리기","소리 내어 말하기","정답 비교","어려움 표시"],"tags":["Anki","Korean-to-English","spaced-review"],"searchKeywords":["안키 공부","한국어 영어 회상","어려운 카드 복습"]},{"id":"s024","topicId":"study","titleKo":"말하기와 쓰기 버전 확장","ko":"먼저 짧고 말하기 쉬운 문장을 만든다. 그다음 이메일이나 기록에 필요한 시간, 근거, 조치, 다음 단계를 덧붙인다.","en":"I'll first create a short sentence that is easy to say. Then I'll add the time, evidence, action, and next step needed for an email or record.","patternId":"p44","speaking":"The result was unusual, so I checked it again.","writing":"The initial result was outside the expected range. I checked the sample condition and equipment, repeated the test, and recorded both results for review.","steps":["핵심 뜻 한 문장","말하기 버전 줄이기","시간·상황 추가","근거·조치 추가","다음 단계 추가"],"tags":["speaking","writing","expansion"],"searchKeywords":["말하기 쓰기 연습","영어 문장 확장","업무 영어 공부"]},{"id":"s025","topicId":"problem-solving","titleKo":"한 변수씩 확인하는 루틴","ko":"증상을 정확히 적고 가능한 원인을 나열한다. 안전하고 쉽게 확인할 수 있는 것부터 하나만 바꾼 뒤 결과를 기록한다.","en":"I'll describe the symptom accurately and list possible causes. I'll change only one safe, easy-to-check factor first and record the result.","patternId":"p38","speaking":"Describe the problem, change one thing, and record what happens.","writing":"The issue was defined using observable facts. Possible causes were listed, one low-risk variable was tested, and the result was recorded before the next variable was considered.","steps":["관찰 사실 적기","가능 원인 나열","순서 정하기","변수 하나 시험","결과 기록"],"tags":["one-variable","troubleshooting","evidence"],"searchKeywords":["변수 하나씩","문제 해결 루틴","추측 피하기"]},{"id":"s026","topicId":"problem-solving","titleKo":"추측과 사실 분리하기","ko":"‘장비가 고장 났다’ 대신 실제로 본 증상을 말한다. 확인한 조치와 아직 확인하지 않은 것을 구분한다.","en":"Instead of saying 'the equipment is broken,' I'll describe what I actually observed. I'll separate completed checks from things not yet checked.","patternId":"p39","speaking":"The tip isn't dispensing. We don't yet know why.","writing":"The observed symptom is that no reagent is dispensing from the tip. The reagent level and tubing have been checked; the connection and tip blockage have not yet been ruled out.","steps":["관찰한 증상","추정 표현 제거","완료 점검 목록","미확인 목록","다음 확인 선택"],"tags":["facts","no-guessing","reporting"],"searchKeywords":["추측 금지","사실과 의견","문제 보고"]},{"id":"s027","topicId":"problem-solving","titleKo":"현실적인 다음 단계 고르기","ko":"가장 큰 조치부터 하지 않는다. 안전하고 되돌릴 수 있으며 정보가 늘어나는 작은 조치를 먼저 고른다.","en":"I won't begin with the biggest action. I'll choose a small step that is safe, reversible, and gives us more information.","patternId":"p40","speaking":"Let's start with the safest check that gives us useful information.","writing":"The selected next step is low risk, reversible, and likely to distinguish between the two most plausible causes before replacement or escalation.","steps":["안전성 확인","되돌릴 수 있는지 확인","얻을 정보 확인","작은 조치 실행","결과로 다음 결정"],"tags":["next-step","practical","decision"],"searchKeywords":["현실적 다음 단계","뭘 먼저","문제 해결 선택"]},{"id":"s028","topicId":"workplace","titleKo":"업체에 가격과 납기 문의 메일","ko":"필요한 품목과 규격을 분명히 쓰고 가격, GST, 배송비, 재고, 납기를 한 번에 묻는다. 언제까지 답이 필요한지도 정중히 적는다.","en":"I'll clearly state the item and specification, then ask about price, GST, freight, stock, and lead time in one message. I'll politely include when the reply is needed.","patternId":"p42","speaking":"Could you quote this item and confirm stock and lead time?","writing":"Could you please provide a quotation for the item specified below, including GST and freight? Please also confirm current stock and lead time. A response by Friday would be appreciated.","steps":["품목·규격 적기","수량 적기","가격·GST·배송비","재고·납기","회신 희망일"],"tags":["supplier","price","lead-time","email"],"searchKeywords":["업체에 가격 문의","견적 이메일","supplier quote"]},{"id":"s029","topicId":"workplace","titleKo":"업무 이메일로 이슈 보고","ko":"제목과 첫 문장에 문제를 분명히 쓴다. 관찰 사실, 영향 범위, 즉시 조치, 현재 상태, 필요한 다음 결정을 순서대로 적는다.","en":"I'll state the issue clearly in the subject and first sentence. Then I'll give the observed facts, scope, immediate action, current status, and decision needed in that order.","patternId":"p44","speaking":"I'm reporting a temperature deviation. The product is on hold while we assess the exposure time.","writing":"I'm writing to report a temperature deviation identified at 8:00 a.m. The affected product is on hold, the chiller has returned to range, and exposure time is being confirmed before disposition.","steps":["명확한 제목","관찰 사실·시각","영향 범위","즉시 조치·현재 상태","요청 또는 다음 단계"],"tags":["work-email","issue-report","corrective-action"],"searchKeywords":["업무 이메일로 보고","문제 보고 메일","이슈 업데이트"]},{"id":"s030","topicId":"workplace","titleKo":"교육 중 이해 확인 질문","ko":"모르는 부분을 숨기지 않는다. 내가 이해한 내용을 짧게 말하고 맞는지 물은 뒤 실제 기록 예를 요청한다.","en":"I won't hide what I don't understand. I'll briefly state my understanding, ask whether it is correct, and request an example using the actual record.","patternId":"p47","speaking":"My understanding is that we complete this every batch. Is that correct, and could you show me an example?","writing":"My understanding is that this check and record are required for every batch. Could you confirm and show me a completed example so I can follow the expected format?","steps":["질문할 지점 표시","내 이해 말하기","맞는지 확인","실제 예 요청","배운 내용 메모"],"tags":["training","clarification","workplace-question"],"searchKeywords":["교육 질문","기록 방법 확인","업무 트레이닝"]},{"id":"s031","topicId":"qc","titleKo":"중복 샘플의 염도값이 다를 때","ko":"같은 배치에서 받은 두 샘플의 값이 다르면 평균부터 내지 않는다. 샘플 혼합, 채취 위치, 온도, 측정 순서를 확인한 뒤 같은 조건에서 다시 비교한다.","en":"If two samples from the same batch give different salinity results, I won't average them immediately. I'll check mixing, sampling location, temperature, and test order, then compare them again under the same conditions.","patternId":"p06","speaking":"These two results don't agree. Let's check how the samples were taken and test them again under the same conditions.","writing":"Duplicate samples from the same batch produced different salinity results. Sampling point, mixing, temperature, and test sequence were reviewed before both samples were retested under matched conditions.","steps":["두 결과 따로 기록","채취 위치 확인","샘플 혼합·온도 확인","측정 순서 통일","동일 조건 재검"],"tags":["salinity","duplicate-sample","comparison"],"searchKeywords":["염도값 서로 다름","중복 샘플","같은 배치 결과 차이","평균 내도 되나"]},{"id":"s032","topicId":"qc","titleKo":"도징 라인에 기포가 보일 때","ko":"실버 나이트레이트가 불규칙하게 나오면 팁만 교체하지 않는다. 라인의 기포, 연결부, 시약 잔량을 보고 절차에 따라 프라이밍한 뒤 한 방울씩 일정하게 나오는지 확인한다.","en":"If the silver nitrate dispenses inconsistently, I won't replace only the tip. I'll check for air in the line, inspect the connections and reagent level, then prime it according to the procedure and confirm a consistent drop.","patternId":"p41","speaking":"There's air in the dosing line. I'll check the connection, prime it, and confirm the drops are consistent.","writing":"Air was visible in the dosing line and dispensing was inconsistent. The reagent level and connections were checked, the line was primed according to procedure, and consistent dosing was confirmed before use.","steps":["불규칙 분사 관찰","기포 위치 확인","잔량·연결부 점검","절차대로 프라이밍","방울 크기·간격 확인"],"tags":["silver-nitrate","air-bubble","priming"],"searchKeywords":["도징 라인 기포","실버나이트레 불규칙","프라이밍","질산은 방울"]},{"id":"s033","topicId":"qc","titleKo":"pH 값이 안정되지 않을 때","ko":"숫자가 계속 움직이면 가장 그럴듯한 값을 골라 적지 않는다. 전극이 충분히 잠겼는지, 교반이 과하지 않은지, 온도가 안정됐는지 보고 안정화 시간을 기록한다.","en":"If the pH keeps drifting, I won't choose the most convenient number. I'll check electrode immersion, excessive stirring, and temperature stability, and record how long the reading takes to settle.","patternId":"p09","speaking":"The pH isn't stabilising. I'll check the electrode position, stirring, and sample temperature before recording a value.","writing":"The pH reading did not stabilise within the usual time. Electrode immersion, sample movement, temperature, and electrode condition were checked before the result was repeated or escalated.","steps":["값 움직임 관찰","전극 잠김 깊이 확인","교반·기포 확인","샘플 온도 안정","안정화 시간 기록"],"tags":["pH","electrode-drift","stabilisation"],"searchKeywords":["pH 값 계속 움직임","전극 안정 안됨","측정값 드리프트","pH 느림"]},{"id":"s034","topicId":"qc","titleKo":"샘플 혼합 상태가 의심될 때","ko":"위와 아래에서 결과가 다르면 장비 문제보다 샘플 균질성을 먼저 확인한다. 정해진 방법으로 다시 혼합하고 대표 샘플을 채취해 비교한다.","en":"If results differ between the top and bottom of a sample, I'll check sample homogeneity before blaming the equipment. I'll remix it using the specified method and collect a representative portion for comparison.","patternId":"p10","speaking":"Let's rule out poor mixing first and test a representative sample.","writing":"The difference between subsamples suggested that the material may not have been homogeneous. The sample was remixed according to the method and a representative portion was retested.","steps":["채취 위치별 결과 비교","혼합 방법 확인","정해진 시간만큼 재혼합","대표 부분 채취","재검 결과 비교"],"tags":["sample-homogeneity","mixing","representative-sample"],"searchKeywords":["샘플 혼합 부족","위아래 값 다름","균질성","대표 샘플"]},{"id":"s035","topicId":"temperature","titleKo":"칠러 공기온도와 제품 중심온도 구분","ko":"칠러 표시 온도가 높다고 제품도 같은 온도라고 가정하지 않는다. 공기온도, 제품 중심온도, 노출 시간을 구분해 측정하고 판단 근거를 남긴다.","en":"I won't assume the product is at the same temperature as a high chiller display. I'll distinguish air temperature, product core temperature, and exposure time, then document the evidence used for the decision.","patternId":"p38","speaking":"The air temperature is high, but we still need the product temperature and exposure time before deciding.","writing":"The chiller air temperature was above target; however, product disposition was based on the measured product core temperature, exposure duration, and the applicable food-safety criteria.","steps":["표시 공기온도 기록","제품 중심온도 측정","노출 시간 확인","기준과 비교","판단 근거 기록"],"tags":["air-temperature","core-temperature","product-assessment"],"searchKeywords":["공기온도 제품온도","중심온도","칠러 표시만 높음","제품 영향 평가"]},{"id":"s036","topicId":"temperature","titleKo":"제상 사이클 중 온도 상승 판단","ko":"짧은 온도 상승이 보이면 곧바로 고장이라고 하지 않는다. 제상 시간과 일치하는지, 얼마나 지속됐는지, 이후 정상으로 회복됐는지 추세로 확인한다.","en":"If I see a short temperature rise, I won't immediately call it a fault. I'll check whether it matches the defrost cycle, how long it lasted, and whether the temperature recovered normally.","patternId":"p39","speaking":"This rise may match the defrost cycle, but let's confirm the timing and recovery before we conclude anything.","writing":"A short rise was visible on the temperature trend. Its timing and duration were compared with the programmed defrost cycle, and normal recovery was confirmed before the event was classified.","steps":["상승 시작·종료 시각","제상 일정 비교","최고 온도 확인","정상 회복 확인","반복 패턴 기록"],"tags":["defrost-cycle","temperature-trend","evidence"],"searchKeywords":["제상 사이클","칠러 온도 잠깐 상승","디프로스트","고장인지 확인"]},{"id":"s037","topicId":"temperature","titleKo":"잘못 적은 온도 기록 정정","ko":"잘못 쓴 값을 지우거나 덮어쓰지 않는다. 원래 기록이 보이도록 한 줄로 긋고 정확한 값, 이니셜, 날짜와 정정 이유를 남긴다.","en":"I won't erase or overwrite an incorrect temperature entry. I'll keep the original visible, enter the correct value, and add my initials, date, and reason for the correction.","patternId":"p14","speaking":"I entered the wrong value. I'll correct it without hiding the original entry.","writing":"The incorrect entry was corrected in line with record-control requirements. The original remained legible, and the correct value, date, initials, and reason were documented.","steps":["오류 발견","원래 값 보존","정확한 값 기입","날짜·이니셜","정정 이유 기록"],"tags":["record-correction","data-integrity","temperature-log"],"searchKeywords":["온도 기록 잘못 씀","기록 정정","화이트로 지우기","이니셜 수정"]},{"id":"s038","topicId":"haccp","titleKo":"Correction과 corrective action 구분","ko":"문제를 바로 고친 것과 다시 생기지 않게 한 조치를 같은 것으로 쓰지 않는다. 즉시 수정, 제품 처리, 원인, 재발 방지를 분리해 설명한다.","en":"I won't treat fixing the immediate problem as the whole corrective action. I'll separate the correction, product disposition, cause, and action to prevent recurrence.","patternId":"p19","speaking":"The correction fixed today's issue; the corrective action needs to stop it happening again.","writing":"The immediate correction restored control, while the corrective action addressed affected product, investigated the cause, introduced a preventive change, and verified its effectiveness.","steps":["즉시 수정 구분","제품 처리","원인 확인","재발 방지 조치","효과 확인"],"tags":["correction","corrective-action","HACCP"],"searchKeywords":["correction corrective action 차이","즉시 수정","시정조치 구분","재발 방지"]},{"id":"s039","topicId":"haccp","titleKo":"CCP 모니터링을 놓쳤을 때","ko":"나중에 정상값 하나를 적는 것으로 끝내지 않는다. 마지막 정상 확인 이후의 제품 범위를 정하고 보류한 뒤, 실제 관리 여부를 평가한다.","en":"If CCP monitoring is missed, I won't close the gap by entering one normal value later. I'll define the product since the last satisfactory check, place it on hold, and assess whether control was maintained.","patternId":"p17","speaking":"We missed the CCP check. Let's identify and hold the product since the last confirmed good check.","writing":"A scheduled CCP check was missed. Product produced since the last satisfactory monitoring result was identified and placed on hold while control and product safety were assessed.","steps":["누락 시각 확인","마지막 정상 점검","영향 제품 범위","제품 보류·평가","누락 원인·예방"],"tags":["CCP","missed-monitoring","product-hold"],"searchKeywords":["CCP 점검 놓침","모니터링 누락","해썹 기록 빠짐","영향 제품"]},{"id":"s040","topicId":"haccp","titleKo":"시정조치 효과 확인","ko":"교육이나 체크리스트를 바꿨다는 사실만으로 완료 처리하지 않는다. 이후 기록과 현장 행동을 확인해 같은 문제가 실제로 줄었는지 본다.","en":"I won't close a corrective action just because training was delivered or a checklist changed. I'll review later records and workplace behaviour to confirm the problem has actually reduced.","patternId":"p21","speaking":"We've made the change; now we need evidence that it is working.","writing":"Effectiveness was verified by reviewing subsequent records, observing the task, and confirming that the deviation did not recur during the defined follow-up period.","steps":["기대 효과 정의","확인 기간 설정","후속 기록 검토","현장 행동 관찰","재발 여부 결론"],"tags":["effectiveness-check","verification","corrective-action"],"searchKeywords":["시정조치 효과 확인","조치 완료 증거","재발 여부","verification"]},{"id":"s041","topicId":"nz-life","titleKo":"기존 모바일 번호를 새 통신사로 이동","ko":"새 플랜 가격만 보지 않는다. 번호 이동 가능 여부, 현재 계정 정보, 전환 날짜, 서비스가 끊길 수 있는 시간을 확인하고 기존 서비스를 먼저 취소하지 않는다.","en":"I won't look only at the new plan price. I'll confirm number portability, account details, transfer timing, and possible downtime, and I won't cancel the old service first.","patternId":"p28","speaking":"I'd like to keep my number. What do you need from me, and when should I cancel the old plan?","writing":"I would like to transfer my existing mobile number to your service. Please confirm the account information required, expected transfer time, and whether I should keep the current service active until completion.","steps":["번호 이동 가능 확인","계정명·번호 준비","전환 시각 확인","기존 서비스 유지","완료 후 해지 확인"],"tags":["mobile-porting","keep-number","NZ-service"],"searchKeywords":["번호 이동","통신사 바꾸기","기존 번호 유지","모바일 포팅"]},{"id":"s042","topicId":"nz-life","titleKo":"인터넷 해지 통보 기간 확인","ko":"다른 회사로 바꾸기 전에 해지 날짜만 정하지 않는다. 통보 기간, 마지막 청구일, 장비 반납, 새 서비스 시작일을 맞춰 이중요금과 인터넷 공백을 피한다.","en":"Before changing providers, I won't choose only a cancellation date. I'll align the notice period, final bill, equipment return, and new connection date to avoid double charges or a gap in service.","patternId":"p23","speaking":"What's the notice period, and when should I cancel to avoid paying for both services?","writing":"Could you confirm the required cancellation notice, final billing date, equipment return process, and the earliest date the service can end without an additional charge?","steps":["통보 기간 확인","마지막 청구일","장비 반납 조건","새 설치일 조정","서면 해지 확인"],"tags":["broadband","cancellation","notice-period"],"searchKeywords":["인터넷 해지","통보 기간","이중 요금","모뎀 반납"]},{"id":"s043","topicId":"nz-life","titleKo":"전기 Low User와 Standard 비교","ko":"한 달 할인만 보고 고르지 않는다. 하루 고정요금과 kWh 요금, 우리 집 연간 사용량을 넣어 두 플랜의 연간 총비용을 비교한다.","en":"I won't choose based on one month's discount. I'll compare the daily fixed charge, per-kWh rate, and our annual usage to calculate the total yearly cost of both plans.","patternId":"p24","speaking":"Could you compare the annual cost of the low-user and standard plans using our actual usage?","writing":"Please compare the low-user and standard options using our last 12 months of consumption, including daily charges, variable rates, discounts, and any plan-change conditions.","steps":["12개월 사용량 준비","일일 고정요금","kWh 단가","할인·조건","연간 총액 비교"],"tags":["electricity-plan","low-user","annual-cost"],"searchKeywords":["로우 유저 스탠다드","전기 요금제 비교","연간 사용량","파워 플랜"]},{"id":"s044","topicId":"child-family","titleKo":"체험 수업과 대기 명단 문의","ko":"바로 한 학기 등록하기 전에 체험 수업이 있는지 묻는다. 자리가 없으면 대기 순서, 예상 시기, 취소 연락 방법까지 확인한다.","en":"Before enrolling for a full term, I'll ask whether a trial is available. If the class is full, I'll check the waiting-list position, likely timing, and how cancellations are offered.","patternId":"p22","speaking":"Is a trial available? If the class is full, could you add us to the waiting list?","writing":"I'd like to ask whether my child can attend a trial session. If the class is currently full, please advise how the waiting list works and the likely timeframe for a place.","steps":["적합한 반 확인","체험 가능 여부","대기 명단 등록","예상 시기","취소 자리 연락 방법"],"tags":["trial-class","waiting-list","child-activity"],"searchKeywords":["아이 체험 수업","대기 명단","테니스 자리 없음","trial class"]},{"id":"s045","topicId":"child-family","titleKo":"아이가 활동을 그만두고 싶을 때","ko":"한 번 힘들었다고 바로 취소하거나 억지로 계속시키지 않는다. 재미가 없는지, 난이도인지, 사람 관계인지 듣고 짧은 검토 기간 뒤 결정한다.","en":"I won't cancel immediately after one difficult session or force my child to continue. I'll find out whether the issue is enjoyment, difficulty, or relationships, then decide after a short review period.","patternId":"p31","speaking":"Let's understand what's making it difficult before we decide whether to stop.","writing":"Before changing the enrolment, we will discuss the specific concern with our child and review enjoyment, confidence, class fit, and the remaining commitment.","steps":["아이 이유 듣기","일시적 문제인지","강사와 확인","짧은 검토 기간","계속·변경 결정"],"tags":["child-choice","quit-activity","family-decision"],"searchKeywords":["아이 수업 그만두기","활동 싫어함","계속 시킬까","가족 결정"]},{"id":"s046","topicId":"child-family","titleKo":"게임 내 결제 규칙 정하기","ko":"결제가 발생한 뒤 화만 내지 않는다. 구매 전 허락, 월 한도, 비밀번호, 환불이 어려울 수 있다는 점을 함께 정하고 설정을 바꾼다.","en":"I won't only react after an in-game purchase happens. We'll agree on permission before buying, a monthly limit, password controls, and the fact that refunds may be difficult, then change the settings.","patternId":"p31","speaking":"No in-game purchases without asking first. Let's set a clear limit and require a password.","writing":"Our family rule is that all in-game purchases require prior approval. Purchase authentication and spending limits will be enabled, and the rule will be reviewed together.","steps":["결제 내역 확인","아이 설명 듣기","사전 허락 규칙","비밀번호·한도 설정","한 달 뒤 검토"],"tags":["gaming","in-app-purchase","family-rules"],"searchKeywords":["아이 게임 결제","인앱 구매","게임 돈 씀","가족 규칙"]},{"id":"s047","topicId":"child-family","titleKo":"가족 일정 충돌로 수업 변경 요청","ko":"결석만 통보하지 않고 가능한 대안을 함께 묻는다. 다른 요일, 보강, 크레딧, 다음 학기 변경 중 현실적인 선택을 확인한다.","en":"I won't only report the absence; I'll ask about practical alternatives. I'll check another day, a make-up lesson, credit, or a change next term.","patternId":"p22","speaking":"This time no longer works for our family. Is another session or a make-up option available?","writing":"Our family schedule has changed and the current session is no longer workable. Could you please advise whether a transfer, make-up session, or credit is available?","steps":["충돌 일정 확인","미리 연락","대체 요일 문의","보강·크레딧","변경 내용 확인"],"tags":["schedule-clash","class-transfer","family"],"searchKeywords":["수업 시간 변경","가족 일정 충돌","보강 문의","요일 바꾸기"]},{"id":"s048","topicId":"study","titleKo":"오디오북이 너무 어려울 때","ko":"끝까지 버티거나 포기하는 두 선택만 하지 않는다. 5분 구간의 이해도를 보고 속도, 텍스트 병행, 더 쉬운 책 중 하나를 조정한다.","en":"I won't choose only between struggling to the end and giving up. I'll assess a five-minute section and adjust one thing: speed, text support, or the book level.","patternId":"p40","speaking":"This audiobook is too dense for active study. I'll try a short section with the text or choose an easier book.","writing":"The current audiobook requires too much decoding for useful recall practice. I will test a short section with transcript support before deciding whether to reduce the speed or change level.","steps":["5분 구간 듣기","핵심 이해도 확인","속도 하나 조정","텍스트 병행 시험","계속·교체 결정"],"tags":["audiobook","difficulty","study-adjustment"],"searchKeywords":["오디오북 너무 어려움","영어 듣기 수준","속도 낮추기","책 바꿀까"]},{"id":"s049","topicId":"study","titleKo":"실제 영어 실수를 Anki 카드로 바꾸기","ko":"틀린 문장만 저장하지 않는다. 그 말을 하려던 한국어 상황, 자연스러운 정답, 재사용 패턴, 다음에 쓸 변형까지 한 카드로 만든다.","en":"I won't save only the incorrect sentence. I'll capture the Korean situation, natural correction, reusable pattern, and one variation I can use next time.","patternId":"p36","speaking":"Turn the real mistake into one card I can use in the same situation next time.","writing":"The card should preserve the original communicative intention, provide a natural corrected sentence, identify the reusable frame, and include one related workplace variation.","steps":["실제 상황 한글로","내가 한 영어","자연스러운 교정","패턴 추출","변형 한 문장"],"tags":["Anki","error-correction","real-situation"],"searchKeywords":["영어 실수 카드","안키 만들기","틀린 문장 복습","실전 오류"]},{"id":"s050","topicId":"study","titleKo":"쉐도잉과 능동 회상 연결","ko":"소리를 따라 하는 데서 끝내지 않는다. 한 문장을 쉐도잉한 뒤 오디오를 끄고 한국어 뜻만 보고 다시 말해 본다.","en":"I won't stop after copying the sound. After shadowing one sentence, I'll turn off the audio and reproduce it from the Korean meaning alone.","patternId":"p37","speaking":"Shadow it twice, turn off the audio, and recall it from Korean.","writing":"Instead of using shadowing as passive repetition, I will follow it with Korean-to-English retrieval so pronunciation practice becomes usable spoken recall.","steps":["문장 의미 확인","두 번 쉐도잉","오디오 끄기","한국어로 영어 회상","내 상황으로 변형"],"tags":["shadowing","active-recall","speaking"],"searchKeywords":["쉐도잉 공부법","따라 말하기","한국어 영어 회상","듣고 말하기"]},{"id":"s051","topicId":"study","titleKo":"주간 카드 정리와 문장 교체","ko":"카드 수만 늘리지 않는다. 일주일에 한 번 너무 길거나 실제로 쓰지 않을 문장을 삭제·수정하고, 자주 필요한데 없는 상황을 추가한다.","en":"I won't only increase the card count. Once a week, I'll remove or rewrite sentences that are too long or unrealistic and add recurring situations that are still missing.","patternId":"p50","speaking":"Keep the useful cards, simplify the awkward ones, and add what I actually needed this week.","writing":"The weekly review will prioritise transfer to real use: difficult but valuable cards will be simplified, low-value duplicates removed, and new recurring situations added.","steps":["어려운 카드 확인","실제 사용 가능성","중복 삭제","긴 문장 단순화","이번 주 상황 추가"],"tags":["weekly-review","card-quality","maintenance"],"searchKeywords":["안키 카드 정리","문장 너무 김","카드 삭제","영어 데이터 관리"]},{"id":"s052","topicId":"problem-solving","titleKo":"같은 조건에서 문제 재현하기","ko":"문제가 한 번 사라졌다고 해결됐다고 하지 않는다. 발생 당시 조건을 다시 만들되 안전 범위 안에서 하나씩 맞추고 같은 증상이 나오는지 확인한다.","en":"I won't call the issue solved just because it disappeared once. Within safe limits, I'll recreate the original conditions one factor at a time and see whether the same symptom returns.","patternId":"p38","speaking":"Let's reproduce the original conditions safely and see which factor brings the problem back.","writing":"A controlled reproduction test was conducted using the original operating conditions within safe limits. Variables were introduced one at a time and each outcome was recorded.","steps":["원래 조건 목록","안전 범위 확인","기준 상태 시험","변수 하나씩 추가","증상 재현 기록"],"tags":["reproduction-test","one-variable","troubleshooting"],"searchKeywords":["문제 재현","같은 조건 시험","가끔 생기는 문제","원인 확인"]},{"id":"s053","topicId":"problem-solving","titleKo":"같이 일어난 것과 원인 구분","ko":"두 일이 같은 시간에 있었다고 하나가 원인이라고 단정하지 않는다. 반복되는지, 다른 설명은 없는지, 한 변수를 바꿨을 때 결과가 달라지는지 본다.","en":"I won't assume one event caused another just because they happened together. I'll check whether the pattern repeats, consider other explanations, and see what changes when one variable is tested.","patternId":"p39","speaking":"They happened at the same time, but that doesn't prove one caused the other.","writing":"The timing suggests a possible association, but the available evidence does not establish causation. Repetition, alternative explanations, and a controlled check are still required.","steps":["동시 발생 사실","반복 여부","다른 설명","변수 시험","근거 수준 표현"],"tags":["correlation","causation","evidence"],"searchKeywords":["같이 일어남 원인","상관관계","원인 단정 금지","증거 부족"]},{"id":"s054","topicId":"problem-solving","titleKo":"언제 혼자 멈추고 에스컬레이션할지","ko":"계속 만지다가 문제를 키우지 않는다. 안전, 제품 영향, 권한 범위, 반복 실패 중 하나가 기준을 넘으면 현재 상태를 보존하고 담당자에게 넘긴다.","en":"I won't keep adjusting things until the problem gets worse. If safety, product impact, authority limits, or repeated failure reaches the stop point, I'll preserve the current state and escalate.","patternId":"p17","speaking":"We've reached the stop point. I'll leave the setup as it is and escalate with the checks completed.","writing":"Further adjustment was stopped because the issue met the escalation criteria. The equipment state, affected product, observations, and checks completed were documented for handover.","steps":["중단 기준 확인","추가 조작 멈춤","현재 상태 보존","영향 제품 통제","증거와 함께 보고"],"tags":["escalation","stop-criteria","risk"],"searchKeywords":["언제 보고할까","에스컬레이션","혼자 해결 중단","문제 넘기기"]},{"id":"s055","topicId":"problem-solving","titleKo":"비용·시간·위험으로 다음 조치 비교","ko":"가장 싼 방법이나 가장 빠른 방법만 고르지 않는다. 안전과 품질 위험을 먼저 지키고 비용, 소요시간, 얻을 정보, 되돌릴 수 있는지를 함께 비교한다.","en":"I won't choose only the cheapest or fastest option. I'll protect safety and quality first, then compare cost, time, information gained, and reversibility.","patternId":"p50","speaking":"Option A is faster, but option B gives better evidence with less risk. I recommend option B.","writing":"Based on safety, product risk, cost, time, reversibility, and diagnostic value, I recommend the controlled test before purchasing replacement equipment.","steps":["안전·품질 우선","선택지 나열","비용·시간","정보·되돌림 가능","근거 있는 추천"],"tags":["decision-matrix","risk","recommendation"],"searchKeywords":["다음 조치 비교","비용 시간 위험","어떤 방법 선택","실용적 결정"]},{"id":"s056","topicId":"workplace","titleKo":"답이 없는 공급업체에 재문의","ko":"같은 메일을 그대로 다시 보내거나 감정적으로 재촉하지 않는다. 원래 요청 날짜, 필요한 품목, 필요한 결정 시점을 짧게 적고 회신 가능 시간을 묻는다.","en":"I won't simply resend the same email or chase emotionally. I'll state the original request date, item needed, and decision deadline, then ask when a response is likely.","patternId":"p43","speaking":"I'm following up on the quote sent on Monday. Could you let me know when we can expect a response?","writing":"I'm following up on the quotation request sent on Monday for the item below. We need to make a purchasing decision by Friday, so an update on price and lead time would be appreciated.","steps":["원래 메일 날짜","요청 품목 요약","필요한 정보","결정 기한","정중한 회신 요청"],"tags":["supplier-follow-up","no-response","email"],"searchKeywords":["업체 답장 없음","견적 재문의","supplier follow up","회신 독촉"]},{"id":"s057","topicId":"workplace","titleKo":"업체가 다른 규격을 보냈을 때","ko":"‘잘못 보냈다’고만 쓰지 않는다. 주문서 규격과 받은 제품의 차이를 사진·라벨로 보여 주고, 사용하지 않은 상태에서 교체와 반품 절차를 요청한다.","en":"I won't write only that the supplier sent the wrong item. I'll show the difference between the order specification and received product using the label and photos, then request replacement and return instructions before use.","patternId":"p44","speaking":"The item received doesn't match our order. I've attached the label and order details so we can arrange a replacement.","writing":"I'm writing to report that the delivered item does not match the specification on our purchase order. It has not been used. Photos and label details are attached; please advise replacement and return arrangements.","steps":["주문 규격 확인","받은 제품 격리","라벨·사진","차이 객관적으로","교체·반품 요청"],"tags":["wrong-specification","supplier","replacement"],"searchKeywords":["업체 다른 제품","규격 틀림","잘못 배송","교체 요청 메일"]},{"id":"s058","topicId":"workplace","titleKo":"교대자에게 미완료 이슈 인계","ko":"‘아직 안 됨’이라고만 남기지 않는다. 무엇을 발견했고, 무엇을 확인했으며, 현재 제품·장비 상태와 다음 확인 시점을 짧게 인계한다.","en":"I won't leave only a note saying it is unfinished. I'll hand over what was found, checks completed, current product or equipment status, and the next required check.","patternId":"p45","speaking":"The product is on hold. I've checked the sample and calibration; the next step is to repeat the test with the fr function normalizeText(value = "") {
  return String(value)
    .toLowerCase()
    .normalize("NFKC")
    .replace(/[’']/g, "")
    .replace(/[^\p{L}\p{N}]+/gu, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function expandQuery(query) {
  const normalized = normalizeText(query);
  const expanded = new Set([normalized]);
  const compact = normalized.replace(/\s/g, "");

  SYNONYM_GROUPS.forEach((group) => {
    const normalizedGroup = group.map(normalizeText);
    const isRelated = normalizedGroup.some((term) => {
      const termCompact = term.replace(/\s/g, "");
      return normalized.includes(term) || term.includes(normalized) || compact.includes(termCompact);
    });
    if (isRelated) normalizedGroup.forEach((term) => expanded.add(term));
  });

  normalized.split(" ").filter((token) => token.length > 1).forEach((token) => expanded.add(token));
  return [...expanded].filter(Boolean);
}

function searchableFields(item, type, topic, pattern) {
  const korean = type === "card" ? item.ko : type === "script" ? `${item.titleKo} ${item.ko}` : `${item.exampleKo} ${item.explanationKo}`;
  const english = type === "pattern" ? `${item.pattern} ${item.exampleEn}` : `${item.en} ${item.speaking} ${item.writing}`;
  return {
    korean: normalizeText(korean),
    english: normalizeText(english),
    keywords: normalizeText((item.searchKeywords || []).join(" ")),
    tags: normalizeText((item.tags || []).join(" ")),
    topic: normalizeText([topic?.labelKo, topic?.labelEn, ...(topic?.aliases || [])].join(" ")),
    pattern: normalizeText(pattern ? `${pattern.pattern} ${pattern.explanationKo} ${(pattern.searchKeywords || []).join(" ")}` : "")
  };
}

function scoreItem(terms, fields) {
  let score = 0;
  const reasons = new Set();
  const weights = [
    ["korean", 10, "한국어 상황"],
    ["keywords", 8, "검색 키워드"],
    ["tags", 6, "태그"],
    ["topic", 5, "주제 별칭"],
    ["pattern", 3, "연결 패턴"],
    ["english", 2, "영어 표현"]
  ];

  terms.forEach((term, termIndex) => {
    weights.forEach(([field, weight, reason]) => {
      if (!term || !fields[field].includes(term)) return;
      score += weight + (termIndex === 0 ? 4 : 0) + Math.min(term.length, 8) / 4;
      reasons.add(reason);
    });
  });

  return { score, reasons: [...reasons] };
}

function resultView(item, type, topic, pattern, match) {
  if (type === "pattern") {
    return {
      id: item.id, type, topicId: item.topicIds?.[0] || "problem-solving",
      topicLabel: topic?.labelKo || "여러 주제", ko: item.exampleKo,
      en: item.exampleEn, pattern: item.pattern, explanationKo: item.explanationKo,
      speaking: item.exampleEn, writing: `Use this frame in a fuller message: ${item.pattern}`,
      matchedReason: match.reasons.join(" · "), score: match.score
    };
  }
  return {
    id: item.id, type, topicId: item.topicId, topicLabel: topic?.labelKo || item.topicId,
    ko: type === "script" ? `${item.titleKo}: ${item.ko}` : item.ko,
    en: item.en, pattern: pattern?.pattern || "—",
    explanationKo: pattern?.explanationKo || "연결된 패턴 설명 없음",
    speaking: item.speaking, writing: item.writing,
    matchedReason: match.reasons.join(" · "), score: match.score
  };
}

function searchLearningData(query, data, limit = 24) {
  const terms = expandQuery(query);
  if (!terms.length) return [];

  const topics = new Map(data.topics.map((topic) => [topic.id, topic]));
  const patterns = new Map(data.patterns.map((pattern) => [pattern.id, pattern]));
  const all = [
    ...data.cards.map((item) => ({ item, type: "card" })),
    ...data.scripts.map((item) => ({ item, type: "script" })),
    ...data.patterns.map((item) => ({ item, type: "pattern" }))
  ];

  return all.map(({ item, type }) => {
    const pattern = type === "pattern" ? item : patterns.get(item.patternId);
    const topicId = type === "pattern" ? item.topicIds?.[0] : item.topicId;
    const topic = topics.get(topicId);
    const match = scoreItem(terms, searchableFields(item, type, topic, pattern));
    return resultView(item, type, topic, pattern, match);
  })
    .filter((result) => result.score > 0)
    .sort((a, b) => b.score - a.score || a.id.localeCompare(b.id))
    .slice(0, limit);
}



function csvCell(value) {
  const text = Array.isArray(value) ? value.join(" ") : String(value ?? "");
  return `"${text.replace(/"/g, '""')}"`;
}

function exportCardsToCsv(cards, patterns) {
  const patternMap = new Map(patterns.map((pattern) => [pattern.id, pattern]));
  const headers = ["Korean", "English", "Pattern", "Pattern_Korean", "Speaking", "Writing", "Difficulty", "Priority", "Source", "Tags", "ID"];
  const rows = cards.map((card) => {
    const pattern = patternMap.get(card.patternId) || {};
    return [card.ko, card.en, pattern.pattern, pattern.explanationKo, card.speaking, card.writing, card.difficulty, card.priority, card.sourceSet, card.tags, card.id];
  });
  const csv = `\uFEFF${[headers, ...rows].map((row) => row.map(csvCell).join(",")).join("\r\n")}`;
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement("a");
  anchor.href = url;
  anchor.download = `nz-self-thinking-anki-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.append(anchor);
  anchor.click();
  anchor.remove();
  window.setTimeout(() => URL.revokeObjectURL(url), 1000);
}


const STORAGE_KEY = "nzEnglishTrainer.review.v1";

function readState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    return {};
  }
}

function writeState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (error) {
    console.warn("Review progress could not be saved in this browser.", error);
  }
}

function getReviewState(cardId) {
  return readState()[cardId] || null;
}

function rateCard(cardId, rating) {
  const state = readState();
  const previous = state[cardId] || { repetitions: 0, intervalDays: 0 };
  const now = Date.now();

  if (rating === "hard") {
    state[cardId] = {
      repetitions: previous.repetitions,
      intervalDays: 0,
      dueAt: now,
      hard: true,
      lastReviewed: now
    };
  } else {
    const intervals = [1, 3, 7, 14, 30, 60];
    const repetitions = Math.min(previous.repetitions + 1, intervals.length);
    const intervalDays = intervals[repetitions - 1];
    state[cardId] = {
      repetitions,
      intervalDays,
      dueAt: now + intervalDays * 86400000,
      hard: false,
      lastReviewed: now
    };
  }

  writeState(state);
  return state[cardId];
}

function getReviewCardIds(cards) {
  const state = readState();
  const now = Date.now();
  return cards
    .filter((card) => state[card.id] && (state[card.id].hard || state[card.id].dueAt <= now))
    .sort((a, b) => state[a.id].dueAt - state[b.id].dueAt)
    .map((card) => card.id);
}

function getReviewCount(cards) {
  return getReviewCardIds(cards).length;
}

    : state.contentType === "daily"
      ? state.data.cards.filter((card) => card.priority === "daily-core")
      : state.data.cards;
  let cards = state.topicId === "all" ? source : source.filter((card) => card.topicId === state.topicId);

    const ids = new Set(getReviewCardIds(cards));
    cards = cards.filter((card) => ids.has(card.id));

        <p class="english">${escapeHtml(copy.answer)}</p>
        <div class="detail"><strong>REUSABLE PATTERN</strong><p>${escapeHtml(pattern.pattern || "—")}</p><p>${escapeHtml(pattern.explanationKo || "")}</p></div>
        <div class="detail"><strong>${copy.extraLabel}</strong><p>${escapeHtml(copy.extra)}</p></div>
        ${isScript ? `<div class="detail"><strong>THINKING STEPS</strong><ol class="thinking-steps">${card.steps.map((step) => `<li>${escapeHtml(step)}</li>`).join("")}</ol></div>` : ""}
      </div>
      <div class="card-actions">
        <button class="button reveal-button" data-action="reveal" type="button">${state.revealed ? "영어 숨기기" : "영어 보기"}</button>
        ${state.revealed ? (isScript ? `<button class="button rating-good reveal-button" data-action="next" type="button">다음 스크립트</button>` : `<button class="button rating-hard" data-action="hard" type="button">어려움</button><button class="button rating-good" data-action="good" type="button">알겠음</button>`) : ""}
      </div>
    </article>`;

  el.practiceArea.querySelector('[data-action="reveal"]').addEventListener("click", () => {
    state.revealed = !state.revealed;
    renderPractice();
  });
  el.practiceArea.querySelector('[data-action="hard"]')?.addEventListener("click", () => rateAndNext(card.id, "hard"));
  el.practiceArea.querySelector('[data-action="good"]')?.addEventListener("click", () => rateAndNext(card.id, "good"));
  el.practiceArea.querySelector('[data-action="next"]')?.addEventListener("click", () => {
    state.cardIndex += 1; state.revealed = false; renderPractice();
  });
}

function rateAndNext(cardId, rating) {
  rateCard(cardId, rating);
  updateReviewCount();
  state.revealed = false;
  if (state.reviewOnly && rating === "good") state.cardIndex = 0;
  else state.cardIndex += 1;
  renderPractice();
}

function renderSearchResults(query) {
  const results = searchLearningData(query, state.data);
  const typeLabels = { card: "카드", script: "스크립트", pattern: "패턴" };
  el.searchResults.hidden = false;
  el.practiceArea.hidden = true;
  el.searchResults.innerHTML = `
    <div class="results-header"><h2>“${escapeHtml(query)}” 검색 결과 ${results.length}개</h2><button class="text-button" id="closeResults" type="button">연습으로 돌아가기</button></div>
    ${results.length ? `<div class="result-list">${results.map((result) => `
      <article class="result-card">
        <div class="result-head"><span class="type-badge">${typeLabels[result.type]}</span><span class="badge">${escapeHtml(result.topicLabel)}</span><span class="match-reason">매칭: ${escapeHtml(result.matchedReason)}</span></div>
        <h3>${escapeHtml(result.ko)}</h3>
        <p class="english">${escapeHtml(result.en)}</p>
        <dl class="result-grid">
          <div class="result-field"><dt>REUSABLE PATTERN</dt><dd>${escapeHtml(result.pattern)}<br>${escapeHtml(result.explanationKo)}</dd></div>
          <div class="result-field"><dt>SPEAKING</dt><dd>${escapeHtml(result.speaking)}</dd></div>
          <div class="result-field"><dt>WRITING</dt><dd>${escapeHtml(result.writing)}</dd></div>
        </dl>
      </article>`).join("")}</div>` : `<div class="empty">관련 표현을 찾지 못했습니다. 더 짧은 핵심어로 검색해 보세요.</div>`}`;
  document.querySelector("#closeResults").addEventListener("click", closeResults);
  el.status.textContent = results.length ? "관련도 높은 순서로 카드·스크립트·패턴을 함께 표시합니다." : "검색 결과 없음";
}

function closeResults() {
  el.searchResults.hidden = true;
  el.practiceArea.hidden = false;
  el.searchInput.value = "";
  renderPractice();
}

function performSearch() {
  const query = el.searchInput.value.trim();
  if (query) renderSearchResults(query);
}

function bindEvents() {
  el.searchButton.addEventListener("click", performSearch);
  el.searchInput.addEventListener("keydown", (event) => { if (event.key === "Enter") performSearch(); });
  el.topicFilter.addEventListener("change", () => {
    state.topicId = el.topicFilter.value;
    state.reviewOnly = false; state.cardIndex = 0; state.revealed = false;
    closeResults();
  });
  el.contentFilter.addEventListener("change", () => {
    state.contentType = el.contentFilter.value;
    state.reviewOnly = false; state.cardIndex = 0; state.revealed = false;
    el.reviewButton.disabled = state.contentType === "scripts";
    closeResults();
  });
  el.randomButton.addEventListener("click", () => {
    state.reviewOnly = false;
    const cards = currentItems();
    state.cardIndex = cards.length ? Math.floor(Math.random() * cards.length) : 0;
    state.revealed = false; closeResults();
  });
  el.reviewButton.addEventListener("click", () => {
    state.reviewOnly = true; state.cardIndex = 0; state.revealed = false; closeResults();
  });
  el.exportButton.addEventListener("click", () => exportCardsToCsv(state.data.cards, state.data.patterns));
  document.querySelectorAll(".mode-tab").forEach((button) => button.addEventListener("click", () => {
    document.querySelectorAll(".mode-tab").forEach((tab) => tab.classList.toggle("is-active", tab === button));
    state.mode = button.dataset.mode; state.revealed = false; renderPractice();
  }));
}

function init() {
  ["searchInput", "searchButton", "suggestions", "contentFilter", "topicFilter", "randomButton", "reviewButton", "reviewCount", "status", "practiceArea", "searchResults", "exportButton"].forEach((id) => { el[id] = document.getElementById(id); });
  el.suggestions.innerHTML = examples.map((example) => `<button class="suggestion" type="button">${escapeHtml(example)}</button>`).join("");
  el.suggestions.querySelectorAll("button").forEach((button) => button.addEventListener("click", () => { el.searchInput.value = button.textContent; performSearch(); }));

  try {
    el.topicFilter.innerHTML += state.data.topics.map((topic) => `<option value="${escapeHtml(topic.id)}">${escapeHtml(topic.icon)} ${escapeHtml(topic.labelKo)}</option>`).join("");
    bindEvents(); updateReviewCount(); renderPractice();
  } catch (error) {
    console.error(error);
    el.status.textContent = "앱을 시작하지 못했습니다. 파일을 다시 열어 주세요.";
    el.practiceArea.innerHTML = '<div class="empty">앱 초기화 오류</div>';
  }
}

init();

if ("serviceWorker" in navigator && /^https?:$/.test(window.location.protocol)) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch((error) => {
      console.warn("Offline mode could not be enabled.", error);
    });
  });
}

</script>
</body>
</html>
