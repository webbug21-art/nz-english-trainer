<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173f38">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NZ English">
  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="Korean-to-English recall practice for real New Zealand life and work">
  <title>NZ Self-Thinking English</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
:root {
  color-scheme: light;
  --ink: #17312d;
  --muted: #60716d;
  --paper: #fffdf8;
  --canvas: #f0f5ef;
  --green: #176b5b;
  --green-dark: #0f5145;
  --mint: #dcece6;
  --gold: #e9b44c;
  --line: #d6e1dc;
  --danger: #a4453f;
  --shadow: 0 12px 30px rgba(20, 60, 52, 0.09);
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-width: 280px;
  background: linear-gradient(180deg, #e5f0eb 0, var(--canvas) 260px);
  color: var(--ink);
  line-height: 1.55;
  overflow-wrap: anywhere;
  -webkit-text-size-adjust: 100%;
}

button, input, select { font: inherit; }
button { touch-action: manipulation; }

.topbar, main, footer {
  width: min(100% - 28px, 920px);
  margin-inline: auto;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: max(22px, env(safe-area-inset-top)) 0 18px;
}

.eyebrow { margin: 0; color: var(--green); font-size: .72rem; font-weight: 800; letter-spacing: .14em; }
h1 { margin: 2px 0 0; font-family: Georgia, serif; font-size: clamp(1.45rem, 6vw, 2.25rem); line-height: 1.1; }

.search-panel, .practice-card, .result-card {
  background: rgba(255, 253, 248, .96);
  border: 1px solid rgba(214, 225, 220, .9);
  border-radius: 20px;
  box-shadow: var(--shadow);
}

.search-panel { padding: 18px; }
.search-panel label { display: block; margin-bottom: 8px; font-weight: 750; }
.search-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }

input, select {
  min-height: 46px;
  width: 100%;
  border: 1px solid #b9cbc4;
  border-radius: 12px;
  background: #fff;
  color: var(--ink);
  padding: 10px 12px;
  font-size: 16px;
}

input:focus, select:focus, button:focus-visible { outline: 3px solid rgba(233, 180, 76, .55); outline-offset: 2px; }

.button {
  min-height: 44px;
  border: 0;
  border-radius: 12px;
  background: var(--green);
  color: white;
  padding: 10px 14px;
  font-weight: 750;
  cursor: pointer;
}
.button:hover { background: var(--green-dark); }
.button--secondary { background: var(--mint); color: var(--green-dark); }
.button--secondary:hover { background: #c8e0d7; }
.button--quiet { min-height: 38px; border: 1px solid #b8d0c6; background: rgba(255,255,255,.55); color: var(--green-dark); white-space: nowrap; }

.suggestions { display: flex; gap: 7px; margin-top: 11px; overflow-x: auto; scrollbar-width: none; }
.suggestion { flex: none; border: 1px solid var(--line); border-radius: 999px; background: white; color: var(--muted); padding: 6px 10px; font-size: .82rem; }

.mode-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 18px 0 10px; padding: 5px; border-radius: 14px; background: #dfe9e4; }
.mode-tab { min-height: 42px; border: 0; border-radius: 10px; background: transparent; color: var(--muted); font-weight: 750; }
.mode-tab.is-active { background: var(--paper); color: var(--green-dark); box-shadow: 0 2px 9px rgba(20,60,52,.1); }

.toolbar { display: grid; grid-template-columns: auto 1fr; gap: 8px; align-items: center; }
.toolbar .button { min-width: 0; }
.select-label { font-size: .86rem; font-weight: 700; color: var(--muted); }
.status { min-height: 1.5em; margin: 14px 2px 8px; color: var(--muted); font-size: .88rem; }

.practice-card { padding: 22px 19px; }
.card-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 16px; }
.badge, .type-badge { display: inline-flex; align-items: center; border-radius: 999px; background: var(--mint); color: var(--green-dark); padding: 4px 9px; font-size: .76rem; font-weight: 800; }
.card-number { color: var(--muted); font-size: .8rem; }
.prompt-label, .answer-label { margin: 0 0 5px; color: var(--muted); font-size: .78rem; font-weight: 800; letter-spacing: .06em; }
.ko-prompt { margin: 0 0 21px; font-size: clamp(1.25rem, 5vw, 1.7rem); font-weight: 800; line-height: 1.45; word-break: keep-all; }
.answer { border-top: 1px solid var(--line); padding-top: 18px; }
.english { margin: 0 0 16px; font-family: Georgia, serif; font-size: 1.2rem; line-height: 1.5; }
.detail { margin-top: 14px; padding: 13px; border-radius: 12px; background: #f3f7f4; }
.detail strong { display: block; margin-bottom: 3px; color: var(--green-dark); font-size: .83rem; }
.detail p { margin: 0; }
.card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 18px; }
.reveal-button { grid-column: 1 / -1; }
.rating-hard { background: #f7e5e3; color: var(--danger); }
.rating-good { background: var(--mint); color: var(--green-dark); }

.results-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 18px 2px 10px; }
.results-header h2 { margin: 0; font-size: 1.1rem; }
.text-button { border: 0; background: transparent; color: var(--green); font-weight: 750; }
.result-list { display: grid; gap: 12px; }
.result-card { padding: 17px; }
.result-head { display: flex; gap: 7px; align-items: center; margin-bottom: 10px; }
.match-reason { color: var(--muted); font-size: .78rem; }
.result-card h3 { margin: 0 0 8px; font-size: 1.05rem; word-break: keep-all; }
.result-card .english { font-size: 1.02rem; }
.result-grid { display: grid; gap: 8px; }
.result-field { padding-top: 8px; border-top: 1px solid var(--line); }
.result-field dt { color: var(--green-dark); font-size: .75rem; font-weight: 800; }
.result-field dd { margin: 2px 0 0; }
.empty { padding: 30px 16px; border: 1px dashed #aec2ba; border-radius: 16px; text-align: center; color: var(--muted); }

footer { padding: 25px 0 calc(30px + env(safe-area-inset-bottom)); color: var(--muted); text-align: center; font-size: .82rem; }
[hidden] { display: none !important; }

@media (min-width: 620px) {
  .toolbar { grid-template-columns: auto minmax(180px, 1fr) auto auto; }
  .practice-card { padding: 30px; }
  .result-grid { grid-template-columns: 1fr 1fr; }
  .result-field:last-child { grid-column: 1 / -1; }
}

@media (max-width: 380px) {
  .topbar { align-items: flex-start; }
  .button--quiet { padding-inline: 9px; font-size: .82rem; }
  .toolbar { grid-template-columns: auto 1fr; }
  .toolbar .button { font-size: .84rem; padding-inline: 8px; }
}

</style>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">MY REAL NZ ENGLISH</p>
      <h1>Self-Thinking Trainer</h1>
    </div>
    <button id="exportButton" class="button button--quiet" type="button">Anki CSV</button>
  </header>

  <main>
    <section class="search-panel" aria-label="상황 검색">
      <label for="searchInput">지금 영어로 말하고 싶은 상황</label>
      <div class="search-row">
        <input id="searchInput" type="search" inputmode="search" autocomplete="off" placeholder="예: 염도 측정 안됨">
        <button id="searchButton" class="button" type="button">검색</button>
      </div>
      <div id="suggestions" class="suggestions" aria-label="검색 예시"></div>
    </section>

    <nav class="mode-tabs" aria-label="연습 모드">
      <button class="mode-tab is-active" data-mode="recall" type="button">떠올리기</button>
      <button class="mode-tab" data-mode="speaking" type="button">말하기</button>
      <button class="mode-tab" data-mode="writing" type="button">쓰기 확장</button>
    </nav>

    <section class="toolbar" aria-label="연습 설정">
      <label class="select-label" for="topicFilter">주제</label>
      <select id="topicFilter"><option value="all">전체 주제</option></select>
      <button id="randomButton" class="button button--secondary" type="button">랜덤 연습</button>
      <button id="reviewButton" class="button button--secondary" type="button">복습 <span id="reviewCount">0</span></button>
    </section>

    <p id="status" class="status" role="status" aria-live="polite">앱을 준비하는 중…</p>
    <section id="practiceArea" class="practice-area" aria-label="연습 카드"></section>
    <section id="searchResults" class="results" aria-label="검색 결과" hidden></section>
  </main>

  <footer>
    <p>한국어 생각부터 시작하세요. 완벽함보다 실제로 쓸 수 있는 한 문장.</p>
  </footer>

  <script>
"use strict";

const TRAINER_DATA = {"topics":[{"id":"qc","labelKo":"QC·염도·pH","labelEn":"QC and lab checks","icon":"🧪","descriptionKo":"염도, pH, 전극, 질산은, 도징 팁, 샘플 상태와 재검","aliases":["QC","품질관리","식품 품질","염도","pH","전극","실버 나이트레이트","질산은","샘플","재검"]},{"id":"temperature","labelKo":"칠러·공정 온도","labelEn":"Chiller and process temperature","icon":"🌡️","descriptionKo":"칠러와 공정 온도 확인, 기록, 이탈과 후속 조치","aliases":["칠러","냉각기","공정 온도","온도 기록","온도 로그","냉장","temperature"]},{"id":"haccp","labelKo":"HACCP·식품안전","labelEn":"HACCP and food safety","icon":"✅","descriptionKo":"위해요소, 평가, 시정조치, 현장 사례와 증거","aliases":["HACCP","해썹","식품안전","심사","평가","시정조치","corrective action","audit"]},{"id":"nz-life","labelKo":"NZ 생활·서비스","labelEn":"New Zealand life and services","icon":"🇳🇿","descriptionKo":"전화, 인터넷, 전기, 주문, 서비스 문의와 플랜 비교","aliases":["뉴질랜드 생활","NZ 생활","서비스 문의","모바일","인터넷","전기","주문","요금제","플랜 비교"]},{"id":"child-family","labelKo":"아이·가족 결정","labelEn":"Child activities and family decisions","icon":"🎾","descriptionKo":"테니스, 로보틱스, 게임과 현실적인 가족 결정","aliases":["아이","자녀","어린이","테니스","로보틱스","로봇","게임","가족 결정","방과후 활동"]},{"id":"study","labelKo":"영어 공부·회상","labelEn":"English study and recall","icon":"🎧","descriptionKo":"오디오북, Anki, 한국어에서 영어로 떠올리기","aliases":["영어 공부","오디오북","안키","Anki","회상","말하기 연습","듣기","플래시카드"]},{"id":"problem-solving","labelKo":"문제 해결·다음 단계","labelEn":"Problem solving and next steps","icon":"🔎","descriptionKo":"추측을 피하고 변수를 하나씩 확인해 현실적인 다음 단계 선택","aliases":["문제 해결","트러블슈팅","원인 확인","변수","추측 금지","다음 단계","점검"]},{"id":"workplace","labelKo":"업무 이메일·보고","labelEn":"Workplace messages and reporting","icon":"✉️","descriptionKo":"업체 문의, 교육 질문, 이슈 보고와 후속 이메일","aliases":["업무 이메일","회사 메일","업체","공급업체","가격 문의","견적","교육 질문","이슈 보고","supplier"]}],"patterns":[{"id":"p01","pattern":"The ___ looks unusual, so I need to check it again.","explanationKo":"결과가 평소와 달라 재확인이 필요할 때 쓰는 기본형.","exampleKo":"측정값이 이상해서 다시 확인해야겠다.","exampleEn":"The reading looks unusual, so I need to check it again.","topicIds":["qc","temperature"],"tags":["unusual","recheck"],"searchKeywords":["측정 이상","값 이상","다시 확인","재검"]},{"id":"p02","pattern":"I'm not getting ___ from ___.","explanationKo":"장비나 용액에서 기대한 출력이 나오지 않을 때.","exampleKo":"도징 팁에서 질산은이 나오지 않는다.","exampleEn":"I'm not getting any silver nitrate from the dosing tip.","topicIds":["qc"],"tags":["no-output","equipment"],"searchKeywords":["실버나이트레 안 나와","질산은 안나옴","도징 팁 문제"]},{"id":"p03","pattern":"Could you check whether ___ is ___?","explanationKo":"상대에게 한 가지 상태를 정중히 확인해 달라고 할 때.","exampleKo":"튜브가 막혔는지 확인해 줄래요?","exampleEn":"Could you check whether the tube is blocked?","topicIds":["qc","workplace"],"tags":["request","check"],"searchKeywords":["확인 요청","막힘 확인","체크 부탁"]},{"id":"p04","pattern":"Before I retest it, I'll ___.","explanationKo":"재검 전에 먼저 할 조치를 순서대로 말할 때.","exampleKo":"재검하기 전에 전극을 헹구겠다.","exampleEn":"Before I retest it, I'll rinse the electrode.","topicIds":["qc","problem-solving"],"tags":["retest","sequence"],"searchKeywords":["전극 린싱","재검 전","헹군 뒤 재시험"]},{"id":"p05","pattern":"The sample may have been affected by ___.","explanationKo":"샘플 결과에 영향을 준 가능성을 조심스럽게 말할 때.","exampleKo":"샘플이 실온에 있었던 시간의 영향을 받았을 수 있다.","exampleEn":"The sample may have been affected by the time it spent at room temperature.","topicIds":["qc"],"tags":["sample-condition","cause"],"searchKeywords":["샘플 상온 방치","시료 실온","샘플 상태 영향"]},{"id":"p06","pattern":"I got ___ on the first test and ___ on the retest.","explanationKo":"첫 결과와 재검 결과를 명확히 비교 보고할 때.","exampleKo":"첫 검사에서는 2.1, 재검에서는 2.4가 나왔다.","exampleEn":"I got 2.1 on the first test and 2.4 on the retest.","topicIds":["qc"],"tags":["results","comparison"],"searchKeywords":["첫 검사 재검 비교","결과 비교","재시험 값"]},{"id":"p07","pattern":"The ___ was outside the expected range.","explanationKo":"허용 또는 예상 범위를 벗어난 결과를 객관적으로 말할 때.","exampleKo":"pH가 예상 범위를 벗어났다.","exampleEn":"The pH was outside the expected range.","topicIds":["qc","temperature"],"tags":["out-of-range","result"],"searchKeywords":["범위 벗어남","기준 이탈","pH 이상"]},{"id":"p08","pattern":"I rinsed ___ with ___ and checked it again.","explanationKo":"세척 방법과 재확인을 한 문장으로 기록할 때.","exampleKo":"전극을 탈이온수로 헹군 뒤 다시 확인했다.","exampleEn":"I rinsed the electrode with deionised water and checked it again.","topicIds":["qc"],"tags":["rinse","electrode"],"searchKeywords":["전극 린싱","전극 세척","deionised water"]},{"id":"p09","pattern":"There may be an issue with ___.","explanationKo":"원인을 단정하지 않고 특정 부품의 문제 가능성을 제시할 때.","exampleKo":"도징 팁에 문제가 있을 수 있다.","exampleEn":"There may be an issue with the dosing tip.","topicIds":["qc","problem-solving"],"tags":["possible-issue","cautious"],"searchKeywords":["장비 문제 가능성","도징 팁 고장","원인 추정"]},{"id":"p10","pattern":"Let's rule out ___ first.","explanationKo":"여러 원인 중 하나를 먼저 배제하며 점검할 때.","exampleKo":"먼저 샘플 온도의 영향을 배제하자.","exampleEn":"Let's rule out the sample temperature first.","topicIds":["qc","problem-solving"],"tags":["rule-out","troubleshooting"],"searchKeywords":["하나씩 확인","원인 배제","변수 점검"]},{"id":"p11","pattern":"The temperature was ___ at ___.","explanationKo":"온도와 측정 시각 또는 위치를 함께 기록하는 형태.","exampleKo":"오전 9시에 칠러 온도는 4.2도였다.","exampleEn":"The chiller temperature was 4.2 degrees at 9 a.m.","topicIds":["temperature"],"tags":["temperature","record"],"searchKeywords":["칠러 온도 기록","몇 시 온도","온도 로그"]},{"id":"p12","pattern":"I noticed that ___ had risen to ___.","explanationKo":"온도가 올라간 사실을 발견했을 때 변화 중심으로 보고.","exampleKo":"공정 온도가 8도까지 올라간 것을 확인했다.","exampleEn":"I noticed that the process temperature had risen to 8 degrees.","topicIds":["temperature"],"tags":["temperature-rise","observation"],"searchKeywords":["온도 상승","공정 온도 높음","칠러 올라감"]},{"id":"p13","pattern":"It returned to ___ after ___.","explanationKo":"조치 후 정상 상태로 돌아온 결과를 말할 때.","exampleKo":"문을 닫은 뒤 온도가 4도로 돌아왔다.","exampleEn":"It returned to 4 degrees after the door was closed.","topicIds":["temperature","problem-solving"],"tags":["recovery","after-action"],"searchKeywords":["온도 정상 복귀","조치 후","다시 내려감"]},{"id":"p14","pattern":"The record is missing for ___.","explanationKo":"특정 시간대나 항목의 기록 누락을 명확히 ld be ___.","explanationKo":"추상적인 식품안전 개념에 실제 현장 예를 붙일 때.","exampleKo":"현장 예로는 알레르겐 교체 후 라벨을 확인하는 것이 있다.","exampleEn":"A practical workplace example would be checking the label after an allergen changeover.","topicIds":["haccp"],"tags":["workplace-example","assessment"],"searchKeywords":["현장 사례","평가 예시","HACCP 예"]},{"id":"p21","pattern":"The evidence we can provide is ___.","explanationKo":"심사나 평가에서 제시할 기록·증거를 설명할 때.","exampleKo":"제시할 수 있는 증거는 완료된 온도 기록이다.","exampleEn":"The evidence we can provide is the completed temperature record.","topicIds":["haccp","workplace"],"tags":["evidence","assessment"],"searchKeywords":["심사 증거","제출 기록","assessment evidence"]},{"id":"p22","pattern":"I'd like to ask about ___.","explanationKo":"서비스나 활동에 관한 문의를 자연스럽게 시작하는 문장.","exampleKo":"어린이 테니스 레슨에 대해 문의하고 싶어요.","exampleEn":"I'd like to ask about tennis lessons for children.","topicIds":["nz-life","child-family","workplace"],"tags":["inquiry","opening"],"searchKeywords":["문의 시작","물어보고 싶다","아이 테니스 문의"]},{"id":"p23","pattern":"Could you tell me whether ___ is included?","explanationKo":"요금제나 서비스에 특정 항목이 포함되는지 확인할 때.","exampleKo":"이 플랜에 데이터 공유가 포함되는지 알려 주세요.","exampleEn":"Could you tell me whether data sharing is included?","topicIds":["nz-life"],"tags":["included","plan"],"searchKeywords":["포함 여부","요금제 문의","플랜 구성"]},{"id":"p24","pattern":"I'm comparing ___ with ___.","explanationKo":"두 서비스·옵션을 비교 중임을 먼저 밝힐 때.","exampleKo":"모바일 결합 플랜과 별도 플랜을 비교하고 있다.","exampleEn":"I'm comparing the mobile bundle with separate plans.","topicIds":["nz-life","child-family"],"tags":["comparison","options"],"searchKeywords":["모바일 인터넷 전기 비교","플랜 비교","두 옵션"]},{"id":"p25","pattern":"What would the total monthly cost be?","explanationKo":"할인까지 반영한 실제 월 총비용을 물을 때.","exampleKo":"월 총비용은 얼마인가요?","exampleEn":"What would the total monthly cost be?","topicIds":["nz-life"],"tags":["cost","monthly"],"searchKeywords":["월 비용","총 요금","가격 비교"]},{"id":"p26","pattern":"My phone has been ___ since ___.","explanationKo":"전화나 서비스 문 ","exampleEn":"Let's try it for one term and then decide.","topicIds":["child-family","problem-solving"],"tags":["trial","decision"],"searchKeywords":["먼저 해보기","한 학기 체험","나중에 결정"]},{"id":"p33","pattern":"I want to practise turning ___ into ___.","explanationKo":"학습 목표를 ‘무엇에서 무엇으로’ 바꾸는 연습으로 표현.","exampleKo":"한국어 생각을 자연스러운 영어로 바꾸는 연습을 하고 싶다.","exampleEn":"I want to practise turning my Korean thoughts into natural English.","topicIds":["study"],"tags":["recall","goal"],"searchKeywords":["한국어 영어 회상","생각 영어로","영작 연습"]},{"id":"p34","pattern":"I can understand it, but I can't recall it quickly.","explanationKo":"이해는 되지만 즉시 말로 나오지 않는 학습 문제를 표현.","exampleKo":"이해는 하지만 빨리 떠올리지 못한다.","exampleEn":"I can understand it, but I can't recall it quickly.","topicIds":["study"],"tags":["recall-gap","speaking"],"searchKeywords":["알지만 안 나옴","영어 회상 느림","말이 안 나와"]},{"id":"p35","pattern":"I listen to ___ while ___.","explanationKo":"오디오북 같은 듣기 습관을 일상 행동과 연결할 때.","exampleKo":"운전하는 동안 영어 오디오북을 듣는다.","exampleEn":"I listen to an English audiobook while driving.","topicIds":["study"],"tags":["audiobook","habit"],"searchKeywords":["영어 오디오북 공부","운전 중 듣기","듣기 습관"]},{"id":"p36","pattern":"This card is useful because I can use it when ___.","explanationKo":"카드를 실제 사용 상황과 연결해 기억할 때.","exampleKo":"이 카드는 업체에 가격을 물을 때 쓸 수 있어서 유용하다.","exampleEn":"This card is useful because I can use it when I ask a supplier for pricing.","topicIds":["study","workplace"],"tags":["anki","context"],"searchKeywords":["안키 카드","실전 문장","사용 상황"]},{"id":"p37","pattern":"Instead of memorising ___, I'll practise ___.","explanationKo":"수동 암기 대신 실제 회상·발화 행동을 선택할 때.","exampleKo":"단어만 외우는 대신 문장 전체를 떠올리는 연습을 하겠다.","exampleEn":"Instead of memorising isolated words, I'll practise recalling the whole sentence.","topicIds":["study","problem-solving"],"tags":["study-method","practice"],"searchKeywords":["암기 대신 회상","문장 연습","공부 방법"]},{"id":"p38","pattern":"Let's check one variable at a time.","explanationKo":"추측을 줄이기 위해 변수를 하나씩 점검하자는 핵심 문제 해결 문 슈 보고 목적을 첫 문장에 분명히 밝힐 때.","exampleKo":"오늘 아침 확인된 온도 이탈을 보고드립니다.","exampleEn":"I'm writing to report a temperature deviation identified this morning.","topicIds":["workplace","temperature"],"tags":["email","report"],"searchKeywords":["업무 이메일로 보고","이슈 보고 메일","문제 알리기"]},{"id":"p45","pattern":"For your information, ___.","explanationKo":"상대가 알아야 할 진행 상황을 부담 없이 공유할 때.","exampleKo":"참고로 해당 제품은 현재 보류 중입니다.","exampleEn":"For your information, the affected product is currently on hold.","topicIds":["workplace"],"tags":["fyi","update"],"searchKeywords":["참고로 알림","업데이트 공유","상황 전달"]},{"id":"p46","pattern":"Could you clarify what is meant by ___?","explanationKo":"교육이나 지침에서 모호한 용어를 정중히 질문할 때.","exampleKo":"‘적절한 모니터링’이 무엇을 뜻하는지 설명해 주시겠어요?","exampleEn":"Could you clarify what is meant by 'adequate monitoring'?","topicIds":["workplace","haccp"],"tags":["training","clarify"],"searchKeywords":["교육 질문","뜻 확인","지침 문의"]},{"id":"p47","pattern":"My understanding is that ___. Is that correct?","explanationKo":"내 이해를 먼저 말하고 맞는지 확인해 오해를 줄일 때.","exampleKo":"제 이해로는 매 배치마다 기록해야 합니다. 맞나요?","exampleEn":"My understanding is that we need to record it for every batch. Is that correct?","topicIds":["workplace","haccp"],"tags":["confirm-understanding","training"],"searchKeywords":["이해 확인","제가 이해한 게 맞나요","교육 내용 확인"]},{"id":"p48","pattern":"I've attached ___ for your review.","explanationKo":"검토할 파일이나 기록을 첨부했다고 알릴 때.","exampleKo":"검토를 위해 완료된 기록을 첨부했습니다.","exampleEn":"I've attached the completed record for your review.","topicIds":["workplace"],"tags":["attachment","email"],"searchKeywords":["파일 첨부","검토 요청","기록 보냄"]},{"id":"p49","pattern":"Please let me know if you need any further information.","explanationKo":"업무 메일을 협조적으로 마무리하는 범용 표현.","exampleKo":"추가 정보가 필요하시면 알려 주세요.","exampleEn":"Please let me know if you need any further information.","topicIds":["workplace"],"tags":["email-closing","information"],"searchKeywords":["업무 이메일 마무리","추가 정보","회신 요청"]},{"id":"p50","pattern":"Based on ___, I recommend ___.","explanationKo":"근거를 먼저 제시하고 실용적인 제안을 할 때.","exampleKo":"현재 결과를 바탕으로 새 샘플로 한 번 더 검사할 것을 제안한다.","exampleEn":"Based on the current results, I recommend one more test with a fresh sample.","topicIds":["workplace","problem-solving","qc"],"tags":["recommendation","evidence"],"searchKeywords":["근거로 제안","추천 조치","보고 의견"]}],"cards":[{"id":"c001","topicId":"qc","ko":"염도 측정값이 평소와 달라서 다시 확인해야겠다.","en":"The salinity reading looks unusual, so I need to check it again.","patternId":"p01","speaking":"This salinity reading looks unusual. I'll check it again.","writing":"The salinity result was different from the usual range, so I repeated the test after checking the sample and equipment.","tags":["salinity","retest"],"searchKeywords":["염도 측정 안됨","염도 이상","염도 재검"]},{"id":"c002","topicId":"qc","ko":"도징 팁에서 실버 나이트레이트가 나오지 않는다.","en":"I'm not getting any silver nitrate from the dosing tip.","patternId":"p02","speaking":"No silver nitrate is coming out of the dosing tip.","writing":"No silver nitrate was dispensed from the dosing tip during the test, so I stopped and checked the reagent path.","tags":["silver-nitrate","dosing-tip"],"searchKeywords":["실버나이트레 안 나와","silver nitrate 안나옴","질산은 도징 팁"]},{"id":"c003","topicId":"qc","ko":"튜브가 막혔는지 먼저 확인해 줄 수 있나요?","en":"Could you check whether the tube is blocked first?","patternId":"p03","speaking":"Could you check if the tube is blocked?","writing":"Could you please check whether the tube is blocked or kinked before we replace the dosing tip?","tags":["tube","blockage"],"searchKeywords":["튜브 막힘","질산은 안 나옴","도징 라인 확인"]},{"id":"c004","topicId":"qc","ko":"재검하기 전에 전극을 깨끗이 헹구겠다.","en":"Before I retest it, I'll rinse the electrode thoroughly.","patternId":"p04","speaking":"I'll rinse the electrode before I retest it.","writing":"Before repeating the measurement, I rinsed the electrode thoroughly with deionised water and removed excess water.","tags":["electrode","rinse","retest"],"searchKeywords":["전극 린싱","전극 헹굼","재검 전 세척"]},{"id":"c005","topicId":"qc","ko":"샘플을 상온에 오래 둬서 결과가 영향을 받았을 수 있다.","en":"The sample may have been affected by being left at room temperature for too long.","patternId":"p05","speaking":"The sample may have been left out too long.","writing":"The sample had been left at room temperature for an unknown period, which may have affected the result. A fresh sample was collected for retesting.","tags":["sample-condition","room-temperature"],"searchKeywords":["샘플 상온 방치","시료 실온","샘플 오래 둠"]},{"id":"c006","topicId":"qc","ko":"첫 염도 검사는 1.8이었고 재검은 2.2였다.","en":"I got 1.8 on the first salinity test and 2.2 on the retest.","patternId":"p06","speaking":"The first result was 1.8, and the retest was 2.2.","writing":"The initial salinity result was 1.8. A repeat test on the same sample gave 2.2, so a fresh sample was requested.","tags":["salinity","result-comparison"],"searchKeywords":["첫 검사 재검 다름","염도 결과 비교","재시험 값 차이"]},{"id":"c007","topicId":"qc","ko":"pH 결과가 제품의 예상 범위를 벗어났다.","en":"The pH result was outside the expected range for the product.","patternId":"p07","speaking":"The pH is outside the expected range.","writing":"The measured pH was outside the product's expected range. The meter and sample condition were checked before a repeat test.","tags":["pH","out-of-range"],"searchKeywords":["pH 이상","pH 기준 이탈","산도 범위"]},{"id":"c008","topicId":"qc","ko":"전극을 탈이온수로 헹군 뒤 다시 측정했다.","en":"I rinsed the electrode with deionised water and checked it again.","patternId":"p08","speaking":"I rinsed the electrode and measured it again.","writing":"I rinsed the electrode with deionised water, gently blotted it dry, and repeated the measurement.","tags":["electrode","deionised-water"],"searchKeywords":["전극 린싱","전극 세척 방법","프로브 헹굼"]},{"id":"c009","topicId":"qc","ko":"도징 팁 연결 부위에 문제가 있을 수도 있다.","en":"There may be an issue with the dosing tip connection.","patternId":"p09","speaking":"The dosing tip connection might be the problem.","writing":"There may be an issue with the dosing tip connection, but the tubing and reagent level should also be checked before drawing a conclusion.","tags":["dosing-tip","connection"],"searchKeywords":["도징 팁 문제","팁 연결","실버나이트레 문제"]},{"id":"c010","topicId":"qc","ko":"먼저 샘플 온도가 염도값에 미친 영향을 배제하자.","en":"Let's rule out the effect of sample temperature on the salinity reading first.","patternId":"p10","speaking":"Let's check the sample temperature first.","writing":"We should first rule out sample temperature as a contributing factor by testing a fresh sample at the correct temperature.","tags":["sample-temperature","rule-out"],"searchKeywords":["염도 온도 영향","샘플 온도","원인 배제"]},{"id":"c011","topicId":"qc","ko":"새 샘플로 검사해도 같은 문제가 생기는지 보자.","en":"Let's see whether the same issue occurs with a fresh sample.","patternId":"p38","speaking":"Let's try a fresh sample and compare.","writing":"To separate a sample issue from an equipment issue, I tested a freshly collected sample under the same conditions.","tags":["fresh-sample","comparison"],"searchKeywords":["새 샘플 재검","샘플 문제 확인","fresh sample"]},{"id":"c012","topicId":"qc","ko":"한 번에 시약과 전극을 둘 다 바꾸면 원인을 알 수 없다.","en":"If we change both the reagent and the electrode at once, we won't know what caused the issue.","patternId":"p38","speaking":"Let's change only one thing at a time.","writing":"Changing the reagent and electrode at the same time would make it difficult to identify the cause, so each variable should be checked separately.","tags":["one-variable","troubleshooting"],"searchKeywords":["변수 하나씩","시약 전극","원인 확인"]},{"id":"c013","topicId":"qc","ko":"실버 나이트레이트 잔량이 충분한지 확인해야 한다.","en":"I need to check whether there is enough silver nitrate left.","patternId":"p03","speaking":"I'll check the silver nitrate level.","writing":"I checked the silver nitrate level and expiry date before inspecting the dosing line for a blockage.","tags":["silver-nitrate","reagent-level"],"searchKeywords":["질산은 잔량","실버나이트레 시약","reagent level"]},{"id":"c014","topicId":"qc","ko":"교정 상태가 괜찮으면 다음으로 샘플 상태를 확인하겠다.","en":"If the calibration is fine, I'll check the sample condition next.","patternId":"p41","speaking":"First I'll check calibration, then the sample.","writing":"First, I will verify the calibration status. If it is acceptable, I will then check the sample temperature, age, and handling.","tags":["calibration","sample-condition"],"searchKeywords":["교정 확인","캘리브레이션","점검 순서"]},{"id":"c015","topicId":"qc","ko":"전극 보관액이 말라 있으면 측정이 불안정할 수 있다.","en":"The reading may be unstable if the electrode storage solution has dried out.","patternId":"p05","speaking":"A dry electrode can give an unstable reading.","writing":"The electrode bulb appeared dry, which may have contributed to the unstable reading. It was reconditioned according to the work instruction.","tags":["electrode","storage-solution"],"searchKeywords":["전극 말라 있음","전극 보관액","pH 불안정"]},{"id":"c016","topicId":"qc","ko":"현재 결과만으로 장비가 고장 났다고 단정할 수 없다.","en":"We don't have enough information to conclude that the equipment has failed.","patternId":"p39","speaking":"We can't say it's an equipment fault yet.","writing":"The current results are not sufficient to confirm equipment failure. The sample, reagent, calibration, and connections still need to be checked.","tags":["evidence","equipment"],"searchKeywords":["장비 고장 단정","근거 부족","추측 금지"]},{"id":"c017","topicId":"qc","ko":"가장 현실적인 다음 단계는 새 샘플로 한 번 더 재검하는 것이다.","en":"The next practical step is to run one more test with a fresh sample.","patternId":"p40","speaking":"Next, I'll retest a fresh sample.","writing":"The next practical step is to repeat the analysis using a fresh, temperature-controlled sample while keeping the equipment settings unchanged.","tags":["next-step","fresh-sample"],"searchKeywords":["다음 단계","새 샘플 재검","실용적 조치"]},{"id":"c018","topicId":"qc","ko":"현재 결과를 보면 전극 교체 전에 한 번 더 확인하는 것이 좋겠다.","en":"Based on the current results, I recommend one more check before replacing the electrode.","patternId":"p50","speaking":"Let's check it once more before replacing the electrode.","writing":"Based on solving","ko":"이 결과 하나만으로 시약 문제라고 결론 내릴 수 없다.","en":"We don't have enough information to conclude that the reagent is the problem from this result alone.","patternId":"p39","speaking":"One result isn't enough to blame the reagent.","writing":"A single unexpected result does not provide enough evidence to identify the reagent as the cause; other variables should be checked first.","tags":["evidence","reagent"],"searchKeywords":["시약 문제 단정","근거 부족","원인 추측"]},{"id":"c081","topicId":"problem-solving","ko":"지금 할 수 있는 가장 현실적인 단계는 연결부를 다시 끼우는 것이다.","en":"The next practical step is to reconnect the fitting securely.","patternId":"p40","speaking":"First, let's reconnect the fitting properly.","writing":"The next practical step is to reseat the connection, confirm it is secure, and then repeat the dispensing check.","tags":["connection","next-step"],"searchKeywords":["연결부 점검","현실적 다음 단계","먼저 할 일"]},{"id":"c082","topicId":"problem-solving","ko":"먼저 전원을 확인하고, 괜찮으면 케이블을 확인하겠다.","en":"First, I'll check the power. If that's fine, I'll check the cable.","patternId":"p41","speaking":"Power first, then the cable.","writing":"First, I will confirm the unit has power. If it does, I will inspect the cable and connection before restarting it.","tags":["check-sequence","equipment"],"searchKeywords":["전원 케이블 확인","문제 해결 순서","장비 점검"]},{"id":"c083","topicId":"problem-solving","ko":"문제가 다시 생기는 조건을 기록하면 원인을 찾기 쉬워진다.","en":"Recording the conditions when the problem happens again will make the cause easier to identify.","patternId":"p21","speaking":"Let's record exactly when it happens.","writing":"Useful evidence includes the time, sample, operator, equipment setting, environmental condition, and exact symptom each time the issue occurs.","tags":["evidence","conditions"],"searchKeywords":["문제 조건 기록","원인 찾기","트러블슈팅 기록"]},{"id":"c084","topicId":"problem-solving","ko":"같은 조건에서 새 샘플과 기존 샘플을 비교해 보자.","en":"Let's compare the fresh sample with the original sample under the same conditions.","patternId":  reproduce the issue once more before ordering a part.","writing":"Based on the evidence collected so far, I recommend one controlled reproduction test before committing to a replacement part.","tags":["recommendation","reproduction-test"],"searchKeywords":["부품 주문 전","재현 시험","근거 기반 제안"]},{"id":"c089","topicId":"workplace","ko":"교체용 pH 전극 가격을 업체에 문의하고 싶다.","en":"Could you please provide a price for a replacement pH electrode?","patternId":"p42","speaking":"Could you send me the price for a replacement pH electrode?","writing":"Could you please provide a quotation for one compatible replacement pH electrode, including freight and GST?","tags":["supplier","pH-electrode","price"],"searchKeywords":["업체에 가격 문의","전극 견적","supplier price"]},{"id":"c090","topicId":"workplace","ko":"실버 나이트레이트 배송 납기가 얼마나 되는지 확인해 주세요.","en":"Could you confirm the lead time for the silver nitrate delivery?","patternId":"p43","speaking":"What's the lead time for the silver nitrate?","writing":"Could you please confirm the current lead time and stock availability for the silver nitrate solution?","tags":["supplier","silver-nitrate","lead-time"],"searchKeywords":["질산은 납기","업체 배송 문의","언제 도착"]},{"id":"c091","topicId":"workplace","ko":"오늘 아침 발견한 칠러 온도 이탈을 이메일로 보고해야 한다.","en":"I'm writing to report a chiller temperature deviation identified this morning.","patternId":"p44","speaking":"I need to report a chiller temperature deviation from this morning.","writing":"I'm writing to report a chiller temperature deviation identified at the morning check. The affected product was placed on hold while the exposure time was assessed.","tags":["email","temperature-deviation"],"searchKeywords":["업무 이메일로 보고","칠러 이탈 메일","문제 보고"]},{"id":"c092","topicId":"workplace","ko":"참고로 영향받은 제품은 현재 보류 상태이다.","en":"For your information, the affected product is currently on hold.","patternId":"p45","speaking":"Just so you know, the product is on hold.","writing":"For your information, the affected product has been identified and remains on hold pending a food-safety assessment.","tags":["product-hold","update"],"searchKeywords":["참고로 보고","제품 보류 알림","상황 업데이트"]},{"id":"c093","topicId":"workplace","ko":"교육 자료에서 ‘검증 빈도’가 무엇을 뜻하는지 설명해 주시겠어요?","en":"Could you clarify what is meant by 'verification frequency' in the training material?","patternId":"p46","speaking":"What does 'verification frequency' mean here?","writing":"Could you please clarify what is meant by 'verification frequency' in this section and give a workplace example?","tags":["training-question","verification"],"searchKeywords":["교육 질문","검증 빈도 뜻","training clarification"]},{"id":"c094","topicId":"workplace","ko":"제 이해로는 이 기록을 매 배치마다 작성해야 합니다. 맞나요?","en":"My understanding is that this record needs to be completed for every batch. Is that correct?","patternId":"p47","speaking":"We complete this for every batch, right?","writing":"My understanding is that the form must be completed and signed for every batch, including rework batches. Could you confirm?","tags":["training","record-frequency"],"searchKeywords":["교육 내용 확인","매 배치 기록","제가 이해한 게 맞나요"]},{"id":"c095","topicId":"workplace","ko":"검토를 위해 재검 결과와 사진을 첨부했습니다.","en":"I've attached the retest results and photos for your review.","patternId":"p48","speaking":"I've attached the results and photos.","writing":"I've attached the initial result, retest result, and equipment photos for your review. The samples were tested under the conditions noted below.","tags":["attachment","retest-results"],"searchKeywords":["재검 결과 첨부","사진 보냄","검토 요청"]},{"id":"c096","topicId":"workplace","ko":"추가 정보가 필요하면 알려 달라고 메일을 마무리하자.","en":"Please let me know if you need any further information.","patternId":"p49","speaking":"Let me know if you need anything else.","writing":"Please let me know if you need any further information, records, or samples to complete the assessment.","tags":["email-closing","follow-up"],"searchKeywords":["업무 이메일 마무리","추가 정보","메일 끝인사"]},{"id":"c097","topicId":"workplace","ko":"현재 재고와 연간 사용량을 바탕으로 두 상자를 주문하는 것이 좋겠다.","en":"Based on our current stock and annual usage, I recommend ordering two boxes.","patternId":"p50","speaking":"Based on our usage, I suggest ordering two boxes.","writing":"Based on current stock, expiry dates, and annual usage, I recommend ordering two boxes to maintain supply without overstocking.","tags":["stock","recommendation"],"searchKeywords":["재고 근거 주문","구매 제안","두 상자"]},{"id":"c098","topicId":"workplace","ko":"업체 견적에 배송비와 GST가 포함되어 있는지 확인해야 한다.","en":"Could you tell me whether freight and GST are included in the supplier's quote?","patternId":"p23","speaking":"Does the quote include freight and GST?","writing":"Could you please confirm whether the quoted price includes freight and GST, and advise how long the quote remains valid?","tags":["supplier-quote","GST","freight"],"searchKeywords":["견적 배송비 GST","업체 가격 포함","quotation 확인"]},{"id":"c099","topicId":"workplace","ko":"첫 검사값과 재검값을 구분해서 보고서에 적어야 한다.","en":"I need to record the initial result and the retest result separately in the report.","patternId":"p06","speaking":"I'll report the first result and the retest separately.","writing":"The report will show the initial result, the reason for retesting, the retest conditions, and the final disposition as separate entries.","tags":["report","retest"],"searchKeywords":["업무 보고","재검 결과 기록","첫 검사 비교"]},{"id":"c100","topicId":"workplace","ko":"업체에 문제를 단정하지 않고 관찰한 증상과 확인한 내용을 보내자.","en":"Let's send the supplier the observed symptoms and the checks completed without assuming the cause.","patternId":"p39","speaking":"Let's give the supplier the facts without guessing the cause.","writing":"The message should describe the observed symptom, frequency, operating conditions, and checks completed, without presenting an unconfirmed cause as fact.","tags":["supplier-message","evidence","no-guessing"],"searchKeywords":["업체 문제 문의","증상 보고","추측 없이 이메일"]}],"scripts":[{"id":"s001","topicId":"qc","titleKo":"염도값이 갑자기 다를 때","ko":"결과를 바로 믿거나 장비 고장이라고 단정하지 않는다. 샘플 온도와 상태를 확인하고, 전극을 헹군 뒤 같은 조건에서 재검한다.","en":"I won't accept the result immediately or assume the equipment has failed. I'll check the sample temperature and condition, rinse the electrode, and retest under the same conditions.","patternId":"p38","speaking":"This result is unusual. I'll check the sample, rinse the electrode, and retest one variable at a time.","writing":"The salinity result was unusual. Before drawing a conclusion, I checked the sample temperature and condition, rinsed the electrode, and repeated the test under controlled conditions.","steps":["결과와 예상 범위 비교","샘플 상태 확인","전극 린싱","같은 조건으로 재검","두 결과 기록"],"tags":["salinity","retest","one-variable"],"searchKeywords":["염도 측정 안됨","염도값 이상","염도 문제 해결"]},{"id":"s002","topicId":"qc","titleKo":"실버 나이트레이트가 나오지 않을 때","ko":"시약이 안 나온다고 바로 팁을 버리지 않는다. 잔량, 튜브 꺾임, 연결부, 막힘을 순서대로 확인하고 한 번씩 분사 시험을 한다.","en":"I won't discard the tip as soon as the reagent stops dispensing. I'll check the reagent level, tubing, connection, and possible blockage in order, testing the dispense after each step.","patternId":"p41","speaking":"First I'll check the reagent level and tubing. Then I'll check the connection and dosing tip.","writing":"No silver nitrate was dispensed. I checked the reagent level, tubing for kinks, the connection, and the dosing tip one at a time, recording the outcome after each dispense test.","steps":["시약 잔량 확인","튜브 꺾임 확인","연결부 다시 끼우기","도징 팁 막힘 확인","분사 시험"],"tags":["silver-nitrate","dosing-tip","troubleshooting"],"searchKeywords":["실버나이트레 안 나와","질산은 안나옴","도징 팁 막힘"]},{"id":"s003","topicId":"qc","titleKo":"전극을 올바르게 린싱하기","ko":"이전 샘플이 남지 않도록 탈이온수로 전극을 헹군다. 문지르지 않고 가볍게 물기를 제거한 뒤 다음 샘플에 넣는다.","en":"I'll rinse the electrode with deionised water so no previous sample remains. I'll gently remove excess water without rubbing it, then place it in the next sample.","patternId":"p08","speaking":"Rinse it with deionised water, gently remove the excess, and don't rub the electrode.","writing":"Between samples, the electrode was rinsed with deionised water and gently blotted to remove excess water without damaging the sensing surface.","steps":["탈이온수 준비","전극 전체 헹굼","가볍게 물기 제거","전극 문지르지 않기","다음 샘플 측정"],"tags":["electrode","rinsing","cross-contamination"],"searchKeywords":["전극 린싱","프로브 세척","전극 헹굼 방법"]},{"id":"s004","topicId":"qc","titleKo":"상온에 방치된 샘플 처리","ko":"샘플이 언제 채취됐고 얼마나 오래 밖에 있었는지 확인한다. 시간이 불명확하면 그 사실을 기록하고 새 샘플을 받아 비교한다.","en":"I'll confirm when the sample was collected and how long it was left out. If the timing is unclear, I'll record that and compare it with a fresh sample.","patternId":"p05","speaking":"This sample may have been left out too long. I'll get a fresh one and compare.","writing":"The sample had been left at room temperature for an unknown duration and may not have represented the process condition. This was recorded, and a fresh sample was collected for comparison.","steps":["채취 시각 확인","실온 노출 시간 확인","샘플 상태 기록","새 샘플 요청","결과 비교"],"tags":["sample-condition","room-temperature","fresh-sample"],"searchKeywords":["샘플 상온 방치","시료 오래 둠","샘플 다시 받기"]},{"id":"s005","topicId":"qc","titleKo":"pH 재검 결과 보고","ko":"첫 결과와 재검 결과를 따로 적고, 재검 전에 무엇을 확인했는지 남긴다. 최종값만 골라 쓰지 않는다.","en":"I'll record the initial and repeat results separately and note what I checked before retesting. I won't report only the preferred final value.","patternId":"p06","speaking":"I'll report both results and explain what I checked before the retest.","writing":"The initial pH result and retest result were recorded separately. The report also notes the calibration status, electrode rinse, sample condition, and reason for repeating the test.","steps":["첫 결과 기록","재검 이유 기록","교정·전극·샘플 확인","재검 결과 기록","최종 판단 설명"],"tags":["pH","retest","reporting"],"searchKeywords":["pH 재검 보고","첫 값 재시험 값","QC 기록"]},{"id":"s006","topicId":"qc","titleKo":"장비 고장 여부를 차분히 확인","ko":"한 번의 이상값으로 고장이라고 결론 내리지 않는다. 표준액, 새 샘플, 연결 상태를 확인한 뒤에도 문제가 반복되는지 본다.","en":"I won't conclude that the equipment has failed because of one unusual result. I'll check the standard, a fresh sample, and the connections, then see whether the issue repeats.","patternId":"p39","speaking":"One unusual result isn't enough. Let's check the standard, sample, and connections first.","writing":"One abnormal result was not sufficient to confirm equipment failure. A control standard, fresh sample, and all accessible connections were checked before escalation.","steps":["이상값 재확인","표준액 확인","새 샘플 시험","연결 상태 확인","반복 여부 기록"],"tags":["equipment","evidence","no-guessing"],"searchKeywords":["장비 고장 확인","QC 추측 금지","기계 문제"]},{"id":"s007","topicId":"temperature","titleKo":"아침 칠러 기록 작성","ko":"표시 온도를 보고 실제 시각과 함께 적는다. 범위 안인지 확인하고 이니셜을 남긴다. 이상하면 기록만 하지 말고 바로 알린다.","en":"I'll read the displayed temperature and record it with the actual time. I'll confirm it is within range and add my initials. If it is abnormal, I won't just record it; I'll report it immediately.","patternId":"p11","speaking":"The chiller is at 3.8 degrees at eight. It's within range, and I've signed the record.","writing":"At 8:00 a.m., the chiller temperature was 3.8°C. It was within the required range, and the entry was completed with the actual check time and initials.","steps":["표시값 읽기","실제 시각 기록","허용 범위 확인","이니셜 작성","이상 시 보고"],"tags":["chiller","temperature-record","routine-check"],"searchKeywords":["칠러 온도 기록","아침 점검","냉장 온도 로그"]},{"id":"s008","topicId":"temperature","titleKo":"칠러 온도 이탈 대응","ko":"높은 온도를 발견하면 제품을 보류하고 문과 센서 위치를 확인한다. 노출 시간을 파악하고 온도가 회복되는 과정을 기록한다.","en":"If I find a high temperature, I'll place the product on hold and check the door and sensor position. I'll establish the exposure time and record how the temperature recovers.","patternId":"p17","speaking":"The temperature is over the limit. Put the product on hold while we check the door, sensor, and exposure time.","writing":"A chiller temperature above the limit was identified. Affected product was placed on hold, the door and probe position were checked, and the temperature recovery and exposure duration were documented.","steps":["이탈값 기록","제품 보류","문·실링 확인","센서 위치 확인","노출 시간과 회복 기록"],"tags":["temperature-deviation","product-hold","corrective-action"],"searchKeywords":["칠러 온도 높음","온도 이탈 조치","제품 보류"]},{"id":"s009","topicId":"temperature","titleKo":"온도 기록 누락을 발견했을 때","ko":"빈칸을 추측해서 채우지 않는다. 점검이 실제로 이뤄졌는지 작업자에게 확인하고, 제품 영향과 후속 조치를 기록한다.","en":"I won't guess a value to fill the blank. I'll ask the operator whether the check actually occurred, assess any product impact, and document the follow-up.","patternId":"p14","speaking":"The record is missing. Let's confirm whether the check was done rather than guessing the value.","writing":"The afternoon temperature entry was missing. The value was not backfilled from memory; the monitoring activity and potential product impact were investigated and documented.","steps":["누락 시간 확인","값 추정 금지","담당자에게 점검 여부 확인","제품 영향 평가","후속 내용 기록"],"tags":["missing-record","documentation","integrity"],"searchKeywords":["온도 기록 누락","로그 빈칸","기록 없을 때"]},{"id":"s010","topicId":"temperature","titleKo":"공정 온도 상승 원인 좁히기","ko":"현재 값만 보지 말고 추세를 본다. 문이 열린 시간, 제품 투입, 센서 위치를 하나씩 기록과 비교한다.","en":"I won't look only at the current value; I'll review the trend. I'll compare door opening, product loading, and sensor position with the record one factor at a time.","patternId":"p38","speaking":"Let's review the trend and compare one factor at a time.","writing":"The temperature trend was reviewed against door-opening periods, product loading, and probe position. Each factor was considered separately to avoid an unsupported conclusion.","steps":["온도 추세 확인","문 개방 시간 비교","제품 투입 시간 비교","센서 위치 확인","가능성 정리"],"tags":["process-temperature","trend","one-variable"],"searchKeywords":["공정 온도 상승","온도 원인 분석","칠러 추세"]},{"id":"s011","topicId":"haccp","titleKo":"HACCP 평가 답변 만들기","ko":"정의만 쓰지 않고 우리 현장의 위해요소, 관리 수단, 모니터링, 기록을 한 사례로 연결한다.","en":"I won't provide only a definition. I'll connect a workplace hazard, control measure, monitoring activity, and record in one practical example.","patternId":"p20","speaking":"I'll explain the concept using one real workplace example.","writing":"A practical example is chilled product temperature: temperature growth is controlled through chilled storage, monitored at set times, and evidenced by the completed temperature record.","steps":["질문 핵심어 찾기","개념 한 줄 정의","현장 사례 선택","조치와 기록 연결","답변 다시 읽기"],"tags":["HACCP","assessment","workplace-example"],"searchKeywords":["HACCP 평가","현장 사례 답안","assessment example"]},{"id":"s012","topicId":"haccp","titleKo":"시정조치 설명하기","ko":"즉시 조치만 말하지 않는다. 영향 제품 처리, 원인 확인, 재발 방지, 효과 확인까지 구분해서 설명한다.","en":"I won't describe only the immediate action. I'll separate product disposition, cause investigation, recurrence prevention, and effectiveness review.","patternId":"p19","speaking":"Corrective action covers the product now and prevention for the future.","writing":"The corrective action included immediate product control, investigation of the deviation, a change to prevent recurrence, and follow-up verification that the change was effective.","steps":["즉시 통제","제품 영향·처리","원인 조사","재발 방지","효과 확인"],"tags":["corrective-action","prevention","verification"],"searchKeywords":["시정조치 설명","corrective action","재발 방지"]},{"id":"s013","topicId":"haccp","titleKo":"심사 증거 준비","ko":"‘우리는 하고 있다’고 말하는 것만으로는 부족하다. 최신 절차서, 완료 기록, 검증 서명, 실제 시정조치 예를 함께 준비한다.","en":"Saying 'we do it' is not enough. I'll prepare the current procedure, completed records, verification sign-offs, and a real corrective-action example.","patternId":"p21","speaking":"We'll support the answer with procedures, records, and a real corrective-action example.","writing":"Objective evidence prepared for the assessment includes the approved procedure, recent monitoring records, verification sign-offs, and a completed corrective-action record.","steps":["요구사항 확인","현재 절차서 준비","최근 기록 선택","검증 증거 확인","시정조치 사례 준비"],"tags":["audit","evidence","records"],"searchKeywords":["HACCP 심사 준비","평가 증거","기록 제출"]},{"id":"s014","topicId":"haccp","titleKo":"모르는 교육 용어 질문하기","ko":"아는 척하지 않는다. 내가 이해한 뜻을 먼저 말하고, 맞는지 확인한 뒤 우리 작업장 예를 요청한다.","en":"I won't pretend I understand. I'll state my current understanding, ask whether it is correct, and request a workplace example.","patternId":"p47","speaking":"My understanding is that verification checks the system. Is that right, and could you give a workplace example?","writing":"My understanding is that verification confirms the control system is operating as intended. Is that correct? A workplace example would help me apply it accurately.","steps":["모르는 용어 표시","현재 이해 한 문장","맞는지 질문","현장 예 요청","답 메모"],"tags":["training","clarification","understanding"],"searchKeywords":["교육 질문","HACCP 용어","이해 확인"]},{"id":"s015","topicId":"nz-life","titleKo":"휴대폰 통화 문제로 고객센터에 연락","ko":"증상과 시작 시점을 먼저 말한다. 이미 해 본 재시작, SIM 확인, 설정 확인을 알려 주고 다음 점검을 요청한다.","en":"I'll start with the symptom and when it began. I'll explain that I already restarted the phone, checked the SIM and settings, then ask for the next diagnostic step.","patternId":"p27","speaking":"I haven't been able to receive calls since yesterday. I've restarted the phone and checked the SIM, but it still isn't working.","writing":"Incoming calls have failed since yesterday afternoon. I have restarted the device, reinserted the SIM, and checked network settings. Please advise the next troubleshooting step.","steps":["증상 말하기","시작 시점 말하기","이미 한 조치 설명","남은 문제 확인","다음 단계 요청"],"tags":["mobile","customer-service","troubleshooting"],"searchKeywords":["전화 문제 고객센터","휴대폰 수신 안됨","폰 문의"]},{"id":"s016","topicId":"nz-life","titleKo":"모바일·인터넷·전기 플랜 비교","ko":"광고 할인만 보지 않는다. 할인 후 월 총액, 계약 기간, 종료 후 가격, 변경 비용을 같은 기준으로 비교한다.","en":"I won't compare only the advertised discount. I'll compare the total monthly cost, contract term, post-promotion price, and change fees on the same basis.","patternId":"p24","speaking":"I'm comparing the full monthly cost, contract term, and price after the discount ends.","writing":"Please provide the total monthly cost for the mobile, broadband, and electricity options, including contract terms, fees, and the price after introductory discounts expire.","steps":["필요한 서비스 정리","월 총액 확인","계약 기간 확인","프로모션 후 가격 확인","변경·해지 비용 비교"],"tags":["mobile","internet","electricity","comparison"],"searchKeywords":["모바일 인터넷 전기 비교","요금제 비교","NZ 서비스 플랜"]},{"id":"s017","topicId":"nz-life","titleKo":"잘못 온 주문 교환 요청","ko":"주문 번호, 주문한 상품, 받은 상품을 간단히 말한다. 사진을 준비하고 교환 절차와 반품 배송비를 확인한다.","en":"I'll briefly give the order number, what I ordered, and what arrived. I'll prepare a photo and ask about the exchange process and return postage.","patternId":"p22","speaking":"I received the wrong item. Could you arrange an exchange and tell me how to return this one?","writing":"The item received does not match my order confirmation. I have attached a photo. Please arrange an exchange and confirm whether a prepaid return label will be provided.","steps":["주문 번호 준비","주문·수령 상품 비교","사진 첨부","교환 요청","반품 비용 확인"],"tags":["order","exchange","service-inquiry"],"searchKeywords":["잘못 배송 교환","주문 문제","다른 상품 옴"]},{"id":"s018","topicId":"nz-life","titleKo":"이사할 때 인터넷 이전 문의","ko":"새 주소와 이사 날짜를 준비한다. 같은 플랜 가능 여부, 설치 날짜, 중단 시간, 이전 비용을 묻는다.","en":"I'll prepare the new address and moving date. I'll ask whether the same plan is available, the installation date, likely downtime, and any relocation fee.","patternId":"p28","speaking":"I'm moving house. Can I keep this plan, and is there a relocation fee?","writing":"I am moving on the date below and would like to transfer my broadband service. Please confirm plan availability, installation timing, expected downtime, and any relocation charge.","steps":["새 주소 준비","이사 날짜 준비","플랜 가능 여부","설치·중단 일정","이전 비용 확인"],"tags":["moving-house","broadband","inquiry"],"searchKeywords":["이사 인터넷 이전","브로드밴드 문의","새 주소 서비스"]},{"id":"s019","topicId":"child-family","titleKo":"아이 테니스 레슨 문의","ko":"아이 나이와 경험을 말하고 초보반 가능 여부를 묻는다. 시간, 비용, 라켓, 체험 수업, 결석 정책도 확인한다.","en":"I'll give my child's age and experience and ask about a suitable beginner class. I'll also check timing, cost, racket requirements, trial lessons, and the absence policy.","patternId":"p22","speaking":"I'm asking about a beginner tennis class for my child. Could you tell me the times, fees, and whether a trial is available?","writing":"I'd like to enquire about a beginner tennis class for my child. Please advise suitable sessions, term fees, equipment requirements, trial options, and the policy for missed lessons.","steps":["나이·경험 설명","적합한 반 질문","시간·비용 확인","장비·체험 확인","결석 정책 확인"],"tags":["tennis","child","inquiry"],"searchKeywords":["아이 테니스 문의","주니어 테니스","어린이 레슨"]},{"id":"s020","topicId":"child-family","titleKo":"테니스와 로보틱스 중 가족 결정","ko":"어느 활동이 더 좋아 보이는지만 보지 않는다. 아이 관심, 이동, 비용, 주간 일정, 시험 기간을 함께 놓고 결정한다.","en":"I won't decide only on which activity looks better. We'll consider our child's interest, travel, cost, weekly schedule, and a possible trial period together.","patternId":"p31","speaking":"Let's balance our child's interest with cost, travel, and the weekly schedule.","writing":"We will compare tennis and robotics using the same factors: sustained interest, timing, travel, full cost, and the option to try one term before a longer commitment.","steps":["아이 관심 듣기","요일·이동 비교","전체 비용 비교","체험 가능 여부","한 학기 후 재평가"],"tags":["tennis","robotics","family-decision"],"searchKeywords":["아이 활동 결정","테니스 로보틱스 비교","가족 선택"]},{"id":"s021","topicId":"child-family","titleKo":"게임 시간 가족 대화","ko":"바로 금지하기보다 무엇이 문제인지 구체적으로 말한다. 숙제, 수면, 가족 시간과 균형을 맞춘 규칙을 함께 정하고 다시 검토한다.","en":"Rather than banning games immediately, we'll describe the specific concern. We'll agree on rules that balance homework, sleep, and family time, then review how they work.","patternId":"p31","speaking":"Let's agree on game-time rules that still protect homework, sleep, and family time.","writing":"We will agree on clear gaming times and responsibilities together, then review after two weeks whether the arrangement supports sleep, schoolwork, and family routines.","steps":["구체적인 문제 말하기","아이 의견 듣기","시간·조건 합의","규칙 적기","2주 후 검토"],"tags":["gaming","family-rules","balance"],"searchKeywords":["아이 게임 시간","가족 결정","게임 규칙"]},{"id":"s022","topicId":"study","titleKo":"오디오북으로 능동 공부하기","ko":"길게 틀어 놓기만 하지 않는다. 짧은 구간을 듣고 핵심을 내 말로 요약한 뒤, 유용한 한 문장을 한국어에서 영어로 다시 떠올린다.","en":"I won't only leave the audiobook playing for a long time. I'll listen to a short section, summarise the main point in my own words, and recall one useful sentence from Korean into English.","patternId":"p35","speaking":"Listen to a short part, summarise it, and recall one useful sentence.","writing":"For each short audiobook section, I will listen twice, give a brief spoken summary, select one useful expression, and create a Korean-to-English recall prompt.","steps":["짧은 구간 선택","두 번 듣기","영어로 짧게 요약","유용한 표현 선택","회상 카드 만들기"],"tags":["audiobook","active-study","recall"],"searchKeywords":["영어 오디오북 공부","오디오북 공부법","듣고 요약"]},{"id":"s023","topicId":"study","titleKo":"Anki 카드 복습 루틴","ko":"영어를 먼저 읽지 않는다. 한국어 상황을 보고 영어를 떠올려 말한 뒤 정답과 비교한다. 어려운 카드만 표시해 다시 본다.","en":"I won't read the English first. I'll look at the Korean situation, recall and say the English, compare it with the answer, and mark only difficult cards for another review.","patternId":"p33","speaking":"Korean first, recall the English, say it, then check the answer.","writing":"The review sequence is Korean prompt first, active English recall, spoken production, answer comparison, and selective marking of difficult cards for spaced review.","steps":["한국어 프롬프트 읽기","영어 떠올리기","소리 내어 말하기","정답 비교","어려움 표시"],"tags":["Anki","Korean-to-English","spaced-review"],"searchKeywords":["안키 공부","한국어 영어 회상","어려운 카드 복습"]},{"id":"s024","topicId":"study","titleKo":"말하기와 쓰기 버전 확장","ko":"먼저 짧고 말하기 쉬운 문장을 만든다. 그다음 이메일이나 기록에 필요한 시간, 근거, 조치, 다음 단계를 덧붙인다.","en":"I'll first create a short sentence that is easy to say. Then I'll add the time, evidence, action, and next step needed for an email or record.","patternId":"p44","speaking":"The result was unusual, so I checked it again.","writing":"The initial result was outside the expected range. I checked the sample condition and equipment, repeated the test, and recorded both results for review.","steps":["핵심 뜻 한 문장","말하기 버전 줄이기","시간·상황 추가","근거·조치 추가","다음 단계 추가"],"tags":["speaking","writing","expansion"],"searchKeywords":["말하기 쓰기 연습","영어 문장 확장","업무 영어 공부"]},{"id":"s025","topicId":"problem-solving","titleKo":"한 변수씩 확인하는 루틴","ko":"증상을 정확히 적고 가능한 원인을 나열한다. 안전하고 쉽게 확인할 수 있는 것부터 하나만 바꾼 뒤 결과를 기록한다.","en":"I'll describe the symptom accurately and list possible causes. I'll change only one safe, easy-to-check factor first and record the result.","patternId":"p38","speaking":"Describe the problem, change one thing, and record what happens.","writing":"The issue was defined using observable facts. Possible causes were listed, one low-risk variable was tested, and the result was recorded before the next variable was considered.","steps":["관찰 사실 적기","가능 원인 나열","순서 정하기","변수 하나 시험","결과 기록"],"tags":["one-variable","troubleshooting","evidence"],"searchKeywords":["변수 하나씩","문제 해결 루틴","추측 피하기"]},{"id":"s026","topicId":"problem-solving","titleKo":"추측과 사실 분리하기","ko":"‘장비가 고장 났다’ 대신 실제로 본 증상을 말한다. 확인한 조치와 아직 확인하지 않은 것을 구분한다.","en":"Instead of saying 'the equipment is broken,' I'll describe what I actually observed. I'll separate completed checks from things not yet checked.","patternId":"p39","speaking":"The tip isn't dispensing. We don't yet know why.","writing":"The observed symptom is that no reagent is dispensing from the tip. The reagent level and tubing have been checked; the connection and tip blockage have not yet been ruled out.","steps":["관찰한 증상","추정 표현 제거","완료 점검 목록","미확인 목록","다음 확인 선택"],"tags":["facts","no-guessing","reporting"],"searchKeywords":["추측 금지","사실과 의견","문제 보고"]},{"id":"s027","topicId":"problem-solving","titleKo":"현실적인 다음 단계 고르기","ko":"가장 큰 조치부터 하지 않는다. 안전하고 되돌릴 수 있으며 정보가 늘어나는 작은 조치를 먼저 고른다.","en":"I won't begin with the biggest action. I'll choose a small step that is safe, reversible, and gives us more information.","patternId":"p40","speaking":"Let's start with the safest check that gives us useful information.","writing":"The selected next step is low risk, reversible, and likely to distinguish between the two most plausible causes before replacement or escalation.","steps":["안전성 확인","되돌릴 수 있는지 확인","얻을 정보 확인","작은 조치 실행","결과로 다음 결정"],"tags":["next-step","practical","decision"],"searchKeywords":["현실적 다음 단계","뭘 먼저","문제 해결 선택"]},{"id":"s028","topicId":"workplace","titleKo":"업체에 가격과 납기 문의 메일","ko":"필요한 품목과 규격을 분명히 쓰고 가격, GST, 배송비, 재고, 납기를 한 번에 묻는다. 언제까지 답이 필요한지도 정중히 적는다.","en":"I'll clearly state the item and specification, then ask about price, GST, freight, stock, and lead time in one message. I'll politely include when the reply is needed.","patternId":"p42","speaking":"Could you quote this item and confirm stock and lead time?","writing":"Could you please provide a quotation for the item specified below, including GST and freight? Please also confirm current stock and lead time. A response by Friday would be appreciated.","steps":["품목·규격 적기","수량 적기","가격·GST·배송비","재고·납기","회신 희망일"],"tags":["supplier","price","lead-time","email"],"searchKeywords":["업체에 가격 문의","견적 이메일","supplier quote"]},{"id":"s029","topicId":"workplace","titleKo":"업무 이메일로 이슈 보고","ko":"제목과 첫 문장에 문제를 분명히 쓴다. 관찰 사실, 영향 범위, 즉시 조치, 현재 상태, 필요한 다음 결정을 순서대로 적는다.","en":"I'll state the issue clearly in the subject and first sentence. Then I'll give the observed facts, scope, immediate action, current status, and decision needed in that order.","patternId":"p44","speaking":"I'm reporting a temperature deviation. The product is on hold while we assess the exposure time.","writing":"I'm writing to report a temperature deviation identified at 8:00 a.m. The affected product is on hold, the chiller has returned to range, and exposure time is being confirmed before disposition.","steps":["명확한 제목","관찰 사실·시각","영향 범위","즉시 조치·현재 상태","요청 또는 다음 단계"],"tags":["work-email","issue-report","corrective-action"],"searchKeywords":["업무 이메일로 보고","문제 보고 메일","이슈 업데이트"]},{"id":"s030","topicId":"workplace","titleKo":"교육 중 이해 확인 질문","ko":"모르는 부분을 숨기지 않는다. 내가 이해한 내용을 짧게 말하고 맞는지 물은 뒤 실제 기록 예를 요청한다.","en":"I won't hide what I don't understand. I'll briefly state my understanding, ask whether it is correct, and request an example using the actual record.","patternId":"p47","speaking":"My understanding is that we complete this every batch. Is that correct, and could you show me an example?","writing":"My understanding is that this check and record are required for every batch. Could you confirm and show me a completed example so I can follow the expected format?","steps":["질문할 지점 표시","내 이해 말하기","맞는지 확인","실제 예 요청","배운 내용 메모"],"tags":["training","clarification","workplace-question"],"searchKeywords":["교육 질문","기록 방법 확인","업무 트레이닝"]}]};

  ["업무 이메일", "회사 이메일", "work email", "메일"],
  ["보고", "리포트", "report", "알리기", "업데이트"],
  ["문제 해결", "트러블슈팅", "troubleshooting", "점검"],
  ["추측", "guess", "짐작"],
  ["변수", "요인", "variable", "factor"],
  ["교육", "훈련", "training", "트레이닝"],
  ["해썹", "haccp", "식품안전", "food safety"]
];

function normalizeText(value = "") {
  return String(value)
    .toLowerCase()
    .normalize("NFKC")
    .replace(/[’']/g, "")
    .replace(/[^\p{L}\p{N}]+/gu, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function expandQuery(query) {
  const normalized = normalizeText(query);
  const expanded = new Set([normalized]);
  const compact = normalized.replace(/\s/g, "");

  SYNONYM_GROUPS.forEach((group) => {
    const normalizedGroup = group.map(normalizeText);
    const isRelated = normalizedGroup.some((term) => {
      const termCompact = term.replace(/\s/g, "");
      return normalized.includes(term) || term.includes(normalized) || compact.includes(termCompact);
    });
    if (isRelated) normalizedGroup.forEach((term) => expanded.add(term));
  });

  normalized.split(" ").filter((token) => token.length > 1).forEach((token) => expanded.add(token));
  return [...expanded].filter(Boolean);
}

function searchableFields(item, type, topic, pattern) {
  const korean = type === "card" ? item.ko : type === "script" ? `${item.titleKo} ${item.ko}` : `${item.exampleKo} ${item.explanationKo}`;
  const english = type === "pattern" ? `${item.pattern} ${item.exampleEn}` : `${item.en} ${item.speaking} ${item.writing}`;
  return {
    korean: normalizeText(korean),
    english: normalizeText(english),
    keywords: normalizeText((item.searchKeywords || []).join(" ")),
    tags: normalizeText((item.tags || []).join(" ")),
    topic: normalizeText([topic?.labelKo, topic?.labelEn, ...(topic?.aliases || [])].join(" ")),
    pattern: normalizeText(pattern ? `${pattern.pattern} ${pattern.explanationKo} ${(pattern.searchKeywords || []).join(" ")}` : "")
  };
}

function scoreItem(terms, fields) {
  let score = 0;
  const reasons = new Set();
  const weights = [
    ["korean", 10, "한국어 상황"],
    ["keywords", 8, "검색 키워드"],
    ["tags", 6, "태그"],
    ["topic", 5, "주제 별칭"],
    ["pattern", 3, "연결 패턴"],
    ["english", 2, "영어 표현"]
  ];

  terms.forEach((term, termIndex) => {
    weights.forEach(([field, weight, reason]) => {
      if (!term || !fields[field].includes(term)) return;
      score += weight + (termIndex === 0 ? 4 : 0) + Math.min(term.length, 8) / 4;
      reasons.add(reason);
    });
  });

  return { score, reasons: [...reasons] };
}

function resultView(item, type, topic, pattern, match) {
  if (type === "pattern") {
    return {
      id: item.id, type, topicId: item.topicIds?.[0] || "problem-solving",
      topicLabel: topic?.labelKo || "여러 주제", ko: item.exampleKo,
      en: item.exampleEn, pattern: item.pattern, explanationKo: item.explanationKo,
      speaking: item.exampleEn, writing: `Use this frame in a fuller message: ${item.pattern}`,
      matchedReason: match.reasons.join(" · "), score: match.score
    };
  }
  return {
    id: item.id, type, topicId: item.topicId, topicLabel: topic?.labelKo || item.topicId,
    ko: type === "script" ? `${item.titleKo}: ${item.ko}` : item.ko,
    en: item.en, pattern: pattern?.pattern || "—",
    explanationKo: pattern?.explanationKo || "연결된 패턴 설명 없음",
    speaking: item.speaking, writing: item.writing,
    matchedReason: match.reasons.join(" · "), score: match.score
  };
}

function searchLearningData(query, data, limit = 24) {
  const terms = expandQuery(query);
  if (!terms.length) return [];

  const topics = new Map(data.topics.map((topic) => [topic.id, topic]));
  const patterns = new Map(data.patterns.map((pattern) => [pattern.id, pattern]));
  const all = [
    ...data.cards.map((item) => ({ item, type: "card" })),
    ...data.scripts.map((item) => ({ item, type: "script" })),
    ...data.patterns.map((item) => ({ item, type: "pattern" }))
  ];

  return all.map(({ item, type }) => {
    const pattern = type === "pattern" ? item : patterns.get(item.patternId);
    const topicId = type === "pattern" ? item.topicIds?.[0] : item.topicId;
    const topic = topics.get(topicId);
    const match = scoreItem(terms, searchableFields(item, type, topic, pattern));
    return resultView(item, type, topic, pattern, match);
  })
    .filter((result) => result.score > 0)
    .sort((a, b) => b.score - a.score || a.id.localeCompare(b.id))
    .slice(0, limit);
}



function csvCell(value) {
  const text = Array.isArray(value) ? value.join(" ") : String(value ?? "");
  return `"${text.replace(/"/g, '""')}"`;
}

function exportCardsToCsv(cards, patterns) {
  const patternMap = new Map(patterns.map((pattern) => [pattern.id, pattern]));
  const headers = ["Korean", "English", "Pattern", "Pattern_Korean", "Speaking", "Writing", "Tags", "ID"];
  const rows = cards.map((card) => {
    const pattern = patternMap.get(card.patternId) || {};
    return [card.ko, card.en, pattern.pattern, pattern.explanationKo, card.speaking, card.writing, card.tags, card.id];
  });
  const csv = `\uFEFF${[headers, ...rows].map((row) => row.map(csvCell).join(",")).join("\r\n")}`;
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement("a");
  anchor.href = url;
  anchor.download = `nz-self-thinking-anki-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.append(anchor);
  anchor.click();
  anchor.remove();
  window.setTimeout(() => URL.revokeObjectURL(url), 1000);
}


const STORAGE_KEY = "nzEnglishTrainer.review.v1";

function readState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    return {};
  }
}

function writeState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (error) {
    console.warn("Review progress could not be saved in this browser.", error);
  }
}

function getReviewState(cardId) {
  return readState()[cardId] || null;
}

function rateCard(cardId, rating) {
  const state = readState();
  const previous = state[cardId] || { repetitions: 0, intervalDays: 0 };
  const now = Date.now();

  if (rating === "hard") {
    state[cardId] = {
      repetitions: previous.repetitions,
      intervalDays: 0,
      dueAt: now,
      hard: true,
      lastReviewed: now
    };
  } else {
    const intervals = [1, 3, 7, 14, 30, 60];
    const repetitions = Math.min(previous.repetitions + 1, intervals.length);
    const intervalDays = intervals[repetitions - 1];
    state[cardId] = {
      repetitions,
      intervalDays,
      dueAt: now + intervalDays * 86400000,
      hard: false,
      lastReviewed: now
    };
  }

  writeState(state);
  return state[cardId];
}

function getReviewCardIds(cards) {
  const state = readState();
  const now = Date.now();
  return cards
    .filter((card) => state[card.id] && (state[card.id].hard || state[card.id].dueAt <= now))
    .sort((a, b) => state[a.id].dueAt - state[b.id].dueAt)
    .map((card) => card.id);
}

function getReviewCount(cards) {
  return getReviewCardIds(cards).length;
}





const state = {
  data: TRAINER_DATA,
  mode: "recall",
  topicId: "all",
  cardIndex: 0,
  revealed: false,
  reviewOnly: false
};

const el = {};
const examples = ["염도 측정 안됨", "전극 린싱", "샘플 상온 방치", "아이 테니스 문의", "업체에 가격 문의"];

function escapeHtml(value = "") {
  return String(value).replace(/[&<>'"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[char]));
}

function currentCards() {
  let cards = state.topicId === "all" ? state.data.cards : state.data.cards.filter((card) => card.topicId === state.topicId);
  if (state.reviewOnly) {
    const ids = new Set(getReviewCardIds(cards));
    cards = cards.filter((card) => ids.has(card.id));
  }
  return cards;
}

function patternFor(card) {
  return state.data.patterns.find((pattern) => pattern.id === card.patternId);
}

function topicFor(topicId) {
  return state.data.topics.find((topic) => topic.id === topicId);
}

function updateReviewCount() {
  el.reviewCount.textContent = getReviewCount(state.data.cards);
}

function modeCopy(card) {
  if (state.mode === "speaking") return { label: "SPEAK IT", answer: card.speaking, extraLabel: "기본 영어", extra: card.en };
  if (state.mode === "writing") return { label: "EXPAND IT", answer: card.writing, extraLabel: "짧은 기본 문장", extra: card.en };
  return { label: "ENGLISH", answer: card.en, extraLabel: "말하기 버전", extra: card.speaking };
}

function renderPractice() {
  const cards = currentCards();
  if (!cards.length) {
    el.practiceArea.innerHTML = `<div class="empty">${state.reviewOnly ? "현재 복습할 어려운 카드가 없습니다." : "이 주제에는 카드가 없습니다."}</div>`;
    el.status.textContent = state.reviewOnly ? "복습 완료 — 잘했어요." : "카드 없음";
    return;
  }

  state.cardIndex = ((state.cardIndex % cards.length) + cards.length) % cards.length;
  const card = cards[state.cardIndex];
  const pattern = patternFor(card) || {};
  const topic = topicFor(card.topicId) || {};
  const copy = modeCopy(card);
  const contextLabel = state.topicId === "all" ? "전체 주제" : (topic.labelKo || card.topicId);
  el.status.textContent = `${state.reviewOnly ? "어려운 카드 복습 · " : ""}${contextLabel} · ${cards.length}개`;

  el.practiceArea.innerHTML = `
    <article class="practice-card">
      <div class="card-meta"><span class="badge">${escapeHtml(topic.icon || "•")} ${escapeHtml(topic.labelKo || card.topicId)}</span><span class="card-number">${state.cardIndex + 1} / ${cards.length}</span></div>
      <p class="prompt-label">KOREAN THOUGHT</p>
      <h2 class="ko-prompt">${escapeHtml(card.ko)}</h2>
      <div class="answer" ${state.revealed ? "" : "hidden"}>
        <p class="answer-label">${copy.label}</p>
        <p class="english">${escapeHtml(copy.answer)}</p>
        <div class="detail"><strong>REUSABLE PATTERN</strong><p>${escapeHtml(pattern.pattern || "—")}</p><p>${escapeHtml(pattern.explanationKo || "")}</p></div>
        <div class="detail"><strong>${copy.extraLabel}</strong><p>${escapeHtml(copy.extra)}</p></div>
      </div>
      <div class="card-actions">
        <button class="button reveal-button" data-action="reveal" type="button">${state.revealed ? "영어 숨기기" : "영어 보기"}</button>
        ${state.revealed ? `<button class="button rating-hard" data-action="hard" type="button">어려움</button><button class="button rating-good" data-action="good" type="button">알겠음</button>` : ""}
      </div>
    </article>`;

  el.practiceArea.querySelector('[data-action="reveal"]').addEventListener("click", () => {
    state.revealed = !state.revealed;
    renderPractice();
  });
  el.practiceArea.querySelector('[data-action="hard"]')?.addEventListener("click", () => rateAndNext(card.id, "hard"));
  el.practiceArea.querySelector('[data-action="good"]')?.addEventListener("click", () => rateAndNext(card.id, "good"));
}

function rateAndNext(cardId, rating) {
  rateCard(cardId, rating);
  updateReviewCount();
  state.revealed = false;
  if (state.reviewOnly && rating === "good") state.cardIndex = 0;
  else state.cardIndex += 1;
  renderPractice();
}

function renderSearchResults(query) {
  const results = searchLearningData(query, state.data);
  const typeLabels = { card: "카드", script: "스크립트", pattern: "패턴" };
  el.searchResults.hidden = false;
  el.practiceArea.hidden = true;
  el.searchResults.innerHTML = `
    <div class="results-header"><h2>“${escapeHtml(query)}” 검색 결과 ${results.length}개</h2><button class="text-button" id="closeResults" type="button">연습으로 돌아가기</button></div>
    ${results.length ? `<div class="result-list">${results.map((result) => `
      <article class="result-card">
        <div class="result-head"><span class="type-badge">${typeLabels[result.type]}</span><span class="badge">${escapeHtml(result.topicLabel)}</span><span class="match-reason">매칭: ${escapeHtml(result.matchedReason)}</span></div>
        <h3>${escapeHtml(result.ko)}</h3>
        <p class="english">${escapeHtml(result.en)}</p>
        <dl class="result-grid">
          <div class="result-field"><dt>REUSABLE PATTERN</dt><dd>${escapeHtml(result.pattern)}<br>${escapeHtml(result.explanationKo)}</dd></div>
          <div class="result-field"><dt>SPEAKING</dt><dd>${escapeHtml(result.speaking)}</dd></div>
          <div class="result-field"><dt>WRITING</dt><dd>${escapeHtml(result.writing)}</dd></div>
        </dl>
      </article>`).join("")}</div>` : `<div class="empty">관련 표현을 찾지 못했습니다. 더 짧은 핵심어로 검색해 보세요.</div>`}`;
  document.querySelector("#closeResults").addEventListener("click", closeResults);
  el.status.textContent = results.length ? "관련도 높은 순서로 카드·스크립트·패턴을 함께 표시합니다." : "검색 결과 없음";
}

function closeResults() {
  el.searchResults.hidden = true;
  el.practiceArea.hidden = false;
  el.searchInput.value = "";
  renderPractice();
}

function performSearch() {
  const query = el.searchInput.value.trim();
  if (query) renderSearchResults(query);
}

function bindEvents() {
  el.searchButton.addEventListener("click", performSearch);
  el.searchInput.addEventListener("keydown", (event) => { if (event.key === "Enter") performSearch(); });
  el.topicFilter.addEventListener("change", () => {
    state.topicId = el.topicFilter.value;
    state.reviewOnly = false; state.cardIndex = 0; state.revealed = false;
    closeResults();
  });
  el.randomButton.addEventListener("click", () => {
    state.reviewOnly = false;
    const cards = currentCards();
    state.cardIndex = cards.length ? Math.floor(Math.random() * cards.length) : 0;
    state.revealed = false; closeResults();
  });
  el.reviewButton.addEventListener("click", () => {
    state.reviewOnly = true; state.cardIndex = 0; state.revealed = false; closeResults();
  });
  el.exportButton.addEventListener("click", () => exportCardsToCsv(state.data.cards, state.data.patterns));
  document.querySelectorAll(".mode-tab").forEach((button) => button.addEventListener("click", () => {
    document.querySelectorAll(".mode-tab").forEach((tab) => tab.classList.toggle("is-active", tab === button));
    state.mode = button.dataset.mode; state.revealed = false; renderPractice();
  }));
}

function init() {
  ["searchInput", "searchButton", "suggestions", "topicFilter", "randomButton", "reviewButton", "reviewCount", "status", "practiceArea", "searchResults", "exportButton"].forEach((id) => { el[id] = document.getElementById(id); });
  el.suggestions.innerHTML = examples.map((example) => `<button class="suggestion" type="button">${escapeHtml(example)}</button>`).join("");
  el.suggestions.querySelectorAll("button").forEach((button) => button.addEventListener("click", () => { el.searchInput.value = button.textContent; performSearch(); }));

  try {
    el.topicFilter.innerHTML += state.data.topics.map((topic) => `<option value="${escapeHtml(topic.id)}">${escapeHtml(topic.icon)} ${escapeHtml(topic.labelKo)}</option>`).join("");
    bindEvents(); updateReviewCount(); renderPractice();
  } catch (error) {
    console.error(error);
    el.status.textContent = "앱을 시작하지 못했습니다. 파일을 다시 열어 주세요.";
    el.practiceArea.innerHTML = '<div class="empty">앱 초기화 오류</div>';
  }
}

init();

if ("serviceWorker" in navigator && /^https?:$/.test(window.location.protocol)) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch((error) => {
      console.warn("Offline mode could not be enabled.", error);
    });
  });
}

</script>
